      <span class="tb">+${r.bias.toFixed(3)}</span>
      <span class="tmeta">${meta}</span>
    </div>`;
  }).join('');
}

/* =====================================================================
   BUILD 413-A — 별과 함께 발견한 것들 (개인 기록 시트 + 공유카드)
   전체/global 숫자는 여기에 절대 들어오지 않는다. Profile + habitEngine(개인
   localStorage) 만 읽는다. 시트는 World Event Stage보다 아래 z-index.
   ===================================================================== */
const PR={
  el:null, _open:false, _prevFocus:null,
  _lastTick:0,
  // 게임 루프에서 매 프레임 불리지만, 실제 작업은 2초에 한 번만 한다.
  tick(){
    const now=Date.now();
    if(now-this._lastTick < 2000) return;
    this._lastTick=now;
    Profile.flushTime();
    if(this._open) this.render();     // 시트가 열려 있을 때만 갱신
  },
  _q(id){ return document.getElementById(id); },
  init(){
    this.el=this._q('pr-sheet');
    const taste=this._q('taste');
    const open=()=>this.open();
    taste.addEventListener('click', open);
    taste.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); open(); } });
    this._q('pr-close').addEventListener('click', ()=>this.close());
    this.el.addEventListener('click', e=>{ if(e.target===this.el) this.close(); });   // 바깥 탭 닫기
    document.addEventListener('keydown', e=>{ if(e.key==='Escape'&&this._open) this.close(); });
    this._q('pr-copy').addEventListener('click', e=>{ e.stopPropagation(); this.copyCode(); });
    this._q('pr-share').addEventListener('click', ()=>this.share());
  },
  open(){
    if(this._open) return;
    this._prevFocus=document.activeElement;
    this._open=true; this.render(); this.el.style.display='block';
    this._q('pr-close').focus();
  },
  close(){
    if(!this._open) return;
    this._open=false; this.el.style.display='none'; this._q('pr-note').textContent='';
    if(this._prevFocus&&this._prevFocus.focus) this._prevFocus.focus();
  },
  copyCode(){
    const code=Profile.data.observerId;
    const done=()=>{ this._q('pr-note').textContent='관찰자 코드를 복사했습니다'; };
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(code).then(done,()=>this._fallbackCopy(code,done));
    } else this._fallbackCopy(code,done);
  },
  _fallbackCopy(text,done){
    try{ const ta=document.createElement('textarea'); ta.value=text;
      ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done();
    }catch(e){ this._q('pr-note').textContent=text; }
  },
  /* 개인에게 쌓인 모든 취향.
     주의: habitEngine은 boot()마다 reset되는 "이번 산책의 습관"이라 누적 점수로 쓸 수 없다.
     그래서 개인 취향 점수는 Profile 자신의 누적 행동 횟수로 계산한다.
     score = 총 행동 수를 최다 항목 대비 정규화(0~1). 정렬은 점수 → 횟수 → 최근 순. */
  rows(){
    const list=Object.values(Profile.data.tastes).map(t=>({
      type:t.type, acts:t.acts, total:t.total, firstAt:t.firstAt, lastAt:t.lastAt }));
    const max=list.reduce((m,r)=>Math.max(m,r.total),0)||1;
    for(const r of list) r.score=Math.min(1, r.total/max);
    list.sort((a,b)=> (b.score-a.score) || (b.total-a.total) || (b.lastAt-a.lastAt));
    return list;
  },
  render(){
    const d=Profile.data;
    this._q('pr-code').textContent=d.observerId;
    const rows=this.rows();
    this._q('pr-stats').innerHTML=[
      ['함께한 시간', fmtDuration(Profile.observedMs())],
      ['기억', String(d.memoryCount)],
      ['일기', String(d.diaryCount)],
      ['형성된 취향', String(rows.length)+'개'],
      ['처음 만난 날', fmtWhen(d.firstSeenAt)],
      ['마지막', fmtWhen(Date.now())],
    ].map(([l,v])=>`<div class="s"><div class="sv">${v}</div><div class="sl">${l}</div></div>`).join('');
    const list=this._q('pr-list');
    if(rows.length===0){
      list.innerHTML='<div id="pr-empty">아직 함께 발견한 것이 없습니다.<br>별이 걷다 무언가를 만나면 여기에 쌓입니다.</div>';
      this._q('pr-share').disabled=true; return;
    }
    this._q('pr-share').disabled=false;
    list.innerHTML=rows.map(r=>{
      const def=CATALOG[r.type]||RARE[r.type]||{emoji:'·',ko:r.type};
      const acts=['observe','record','rest','wonder']
        .filter(a=>r.acts[a]>0)
        .map(a=>`<span class="pr-act">${actKo(a)} <b>${r.acts[a]}</b></span>`).join('');
      return `<div class="pr-row">
        <div class="pr-r1"><span class="pr-em">${def.emoji}</span>
          <span class="pr-name">${def.ko}</span>
          <span class="pr-cnt">만남 ${r.total}회</span></div>
        <div class="pr-acts">${acts||'<span class="pr-act">—</span>'}</div>
        <div class="pr-bar"><span class="pr-fill" style="width:${Math.round(r.score*100)}%"></span></div>
        <div class="pr-when">처음 ${fmtWhen(r.firstAt)} · 마지막 ${fmtWhen(r.lastAt)}</div>
      </div>`;
    }).join('');
  },
  /* ---- 공유카드 1080×1350 세로형 ---- */
  async share(){
    const note=this._q('pr-note'); note.textContent='카드 만드는 중…';
    try{
      const blob=await this.buildCard();
      const file=new File([blob],'byeol-record.png',{type:'image/png'});
      if(navigator.canShare&&navigator.canShare({files:[file]})&&navigator.share){
        // 파일만 싣는다 — title 등 텍스트를 섞으면 macOS 공유 시트가
        // '이미지+텍스트 복합'으로 보고 사진 앱을 목록에서 뺀다 (2026-07-19 Vase 리포트)
        await navigator.share({files:[file]});
        note.textContent='공유했습니다';
      } else {                                   // 미지원 → PNG 다운로드
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a'); a.href=url; a.download='byeol-record.png';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(()=>URL.revokeObjectURL(url),4000);
        note.textContent='PNG로 저장했습니다';
      }
    }catch(e){ note.textContent='카드를 만들지 못했습니다'; }
  },
  // 'PNG 저장' 버튼은 제거됨(2026-07-19 Vase) — 공유 시트의 저장/복사가 그 역할을 대신하고,
  // 공유 미지원 브라우저는 share()의 폴백이 여전히 PNG 다운로드로 떨어진다.
  buildCard(){
    const W=1080,H=1350, c=document.createElement('canvas'); c.width=W; c.height=H;
    const g=c.getContext('2d'), d=Profile.data;
    const sage='#A7B49A', ink='#e8e4d8', dim='#7d8790';
    const bg=g.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#0d1116'); bg.addColorStop(0.55,'#131a20'); bg.addColorStop(1,'#0b0f13');
    g.fillStyle=bg; g.fillRect(0,0,W,H);
    for(let i=0;i<90;i++){                        // 배경 별 (카드 장식)
      const x=(i*97731%W), y=(i*54121%(H*0.42));
      g.fillStyle='rgba(226,232,244,'+(0.05+(i%7)*0.02).toFixed(2)+')';
      g.beginPath(); g.arc(x,y,(i%3)*0.7+0.6,0,6.283); g.fill();
    }
    g.textAlign='left';
    g.fillStyle=sage; g.font='600 30px system-ui,sans-serif';
    g.letterSpacing='8px'; g.fillText('BYEOL',80,116); g.letterSpacing='0px';
    g.fillStyle=dim; g.font='400 24px ui-monospace,Menlo,monospace';
    // 카드는 외부로 공유되므로 코드는 앞뒤 일부만 남기고 마스킹한다 (P0-1 → 420-A 강화)
    const maskedId=maskObserverCode(d.observerId);
    g.fillText(maskedId,80,158);
    g.fillStyle=ink; g.font='600 54px system-ui,sans-serif';
    g.fillText('별과 함께',80,268); g.fillText('발견한 것들',80,336);
    // 산책 화면 스냅샷
    const snapY=386, snapH=300;
    try{
      const src=document.getElementById('game');
      if(src&&src.width){
        g.save(); this._roundRect(g,80,snapY,W-160,snapH,16); g.clip();
        const sr=src.width/src.height, dr=(W-160)/snapH;
        let sw=src.width, sh=src.height, sx=0, sy=0;
        if(sr>dr){ sw=src.height*dr; sx=(src.width-sw)/2; } else { sh=src.width/dr; sy=(src.height-sh)/2; }
        g.drawImage(src,sx,sy,sw,sh,80,snapY,W-160,snapH); g.restore();
        g.strokeStyle='rgba(167,180,154,.28)'; g.lineWidth=2;
        this._roundRect(g,80,snapY,W-160,snapH,16); g.stroke();
      }
    }catch(e){}
    // 개인 수치 (전체/global 숫자는 절대 넣지 않음)
    const sy2=snapY+snapH+62;
    const stats=[['기억',String(d.memoryCount)],['일기',String(d.diaryCount)],
                 ['함께한 시간',fmtDuration(Profile.observedMs())]];
    stats.forEach((s,i)=>{ const x=80+i*((W-160)/3);
      g.fillStyle=ink; g.font='600 44px system-ui,sans-serif'; g.fillText(s[1],x,sy2);
      g.fillStyle=dim; g.font='400 20px system-ui,sans-serif'; g.fillText(s[0],x,sy2+30); });
    // 대표 취향 최대 5개 + 초과분은 '외 N개' 한 줄 요약 (P0-1)
    // 7개부터 footer(H-72)를 침범하고 8개부터 카드 밖으로 이탈하던 버그의 수정.
    const LIST_MAX=5, FOOTER_BASE=H-72, FOOTER_MIN_GAP=48;
    const all=this.rows(), rows=all.slice(0,LIST_MAX), extra=all.length-rows.length;
    let y=sy2+96;
    g.fillStyle=sage; g.font='600 22px system-ui,sans-serif'; g.fillText('함께 발견한 것',80,y); y+=42;
    for(const r of rows){
      const def=CATALOG[r.type]||RARE[r.type]||{emoji:'·',ko:r.type};
      g.font='400 34px system-ui,sans-serif'; g.fillStyle=ink;
      g.fillText(def.emoji+'  '+def.ko, 84, y);
      g.font='400 22px system-ui,sans-serif'; g.fillStyle=dim;
      g.textAlign='right'; g.fillText(r.total+'회', W-84, y); g.textAlign='left';
      const bw=W-168, bx=84, by=y+12;
      g.fillStyle='rgba(255,255,255,.07)'; this._roundRect(g,bx,by,bw,5,3); g.fill();
      g.fillStyle=sage; this._roundRect(g,bx,by,Math.max(4,bw*r.score),5,3); g.fill();
      y+=64;
    }
    if(extra>0){                                  // 6번째 행: 초과분 요약
      g.font='400 24px system-ui,sans-serif'; g.fillStyle=dim;
      g.fillText('외 '+extra+'개의 발견', 84, y);
    }
    // footer 위 최소 여백 고정 검증 — 설계상 위반 불가능하지만 회귀를 조기에 잡는다
    if(y>FOOTER_BASE-FOOTER_MIN_GAP) console.warn('[card] list bottom '+y+' violates footer gap');
    g.textAlign='center'; g.fillStyle=dim; g.font='400 24px system-ui,sans-serif';
    g.fillText('함께 걸어준 시간들이 별의 취향이 되었습니다.', W/2, H-72);
    return new Promise((res,rej)=>c.toBlob(b=>b?res(b):rej(new Error('toBlob')),'image/png'));
  },
  _roundRect(g,x,y,w,h,r){
    g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
    g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath();
  },
};
PR.init();

/* =====================================================================
   BUILD 419-B — Recovery (기록 지키기 · 기존 별이 이어가기)
   정본: docs/BUILD_419A_OBSERVER_RECOVERY.md §4~§9 (인터페이스 동결)
   - 자동 백업 트리거는 정확히 3개: 5분 주기 · visibilitychange(hidden) · 발급 직후 1회
   - 409 충돌 → 자동 백업 중지 + 조용한 배지. 덮어쓰기는 수동 확인 경로(force)만
   - Recovery Key는 발급·복구 UI에서만 표시. 카드·일반 화면·로그 노출 금지
   - 보호 백업 성공 = 교체의 전제. 실패 시 중단 ([다시 시도]/[파일 저장 후 계속])
   ===================================================================== */
const Recovery={
  data:null, conflict:false, conflictRevision:null, lastResult:null, _timer:null, _busy:false,
  OBS_RE:/^BYL-[ABCDEFGHJKMNPQRSTUVWXYZ2-9]{4}-[ABCDEFGHJKMNPQRSTUVWXYZ2-9]{4}$/,
  KEY_RE:/^BYLR-[0-9ABCDEFGHJKMNPQRSTVWXYZ]{6}-[0-9ABCDEFGHJKMNPQRSTVWXYZ]{6}-[0-9ABCDEFGHJKMNPQRSTVWXYZ]{6}-[0-9ABCDEFGHJKMNPQRSTVWXYZ]{6}$/,

  load(){
    try{
      const raw=localStorage.getItem(RECOVERY_LS);
      if(raw){ const d=JSON.parse(raw);
        if(d && typeof d.recoveryKey==='string' && typeof d.baseRevision==='number') this.data=d; }
    }catch(e){}
  },
  save(){ try{ localStorage.setItem(RECOVERY_LS, JSON.stringify(this.data)); }catch(e){} },
  instanceId(){
    const K='mimesis.byeoli.instance.v1';
    try{
      let id=localStorage.getItem(K);
      if(!id){ id='ci_'+Math.random().toString(36).slice(2,10)+Date.now().toString(36); localStorage.setItem(K,id); }
      return id;
    }catch(e){ return 'ci_volatile'; }
  },
  // Crockford base32 24자 (I/L/O/U 제외, 32자 집합이라 byte%32 균등)
  newKey(){
    const A='0123456789ABCDEFGHJKMNPQRSTVWXYZ';
    const b=new Uint8Array(24); crypto.getRandomValues(b);
    let s=''; for(let i=0;i<24;i++){ s+=A[b[i]%32]; if(i%6===5 && i<23) s+='-'; }
    return 'BYLR-'+s;
  },
  buildBlob(){
    Profile.flushTime();
    let habits=null;
    try{ const raw=localStorage.getItem(HABITS_LS); if(raw) habits=JSON.parse(raw); }catch(e){}
    return { profile: Profile.data, habits };
  },
  hasRealRecords(p){
    p=p||Profile.data;
    return !!(p && (p.memoryCount>0 || p.diaryCount>0 ||
      Object.keys(p.tastes||{}).length>0 || p.totalObservedMs>60000));
  },

  // 네트워크 오류만 지수 백오프 3회 (§7). HTTP 응답은 재시도하지 않는다.
  async post(path, body){
    let delay=800;
    for(let i=0;i<3;i++){
      try{
        const res=await fetch('/api/observer/'+path,{
          method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify(body) });
        const data=await res.json().catch(()=>null);
        return { status:res.status, data };
      }catch(e){
        if(i===2) return { status:0, data:null };
        await new Promise(r=>setTimeout(r,delay)); delay*=2;
      }
    }
    return { status:0, data:null };
  },

  async backup(opts){
    if(!this.data || this._busy) return { ok:false, code:'not_ready' };
    this._busy=true;
    try{
      const body={
        observerId: Profile.data.observerId, recoveryKey: this.data.recoveryKey,
        blob: this.buildBlob(), schemaVersion: 1, baseRevision: this.data.baseRevision,
        clientSavedAt: Date.now(), clientInstanceId: this.instanceId(),
        // 422-OPS-E: blob과 별도의 익명 집계용 snapshot — 숫자·대상 type만, 일기 원문 없음(§6-4)
        collectiveSnapshot: this.buildCollectiveSnapshot() };
      if(opts && opts.force===true){ body.force=true; body.confirmedRevision=opts.confirmedRevision; }
      const r=await this.post('backup', body);
      if(r.status===200 && r.data && r.data.ok){
        this.data.baseRevision=r.data.revision; this.save();
        this.conflict=false; this.conflictRevision=null;
        this.lastResult={ ok:true, at:Date.now() };
        this.updateBadge(); return { ok:true, revision:r.data.revision };
      }
      if(r.status===409 && r.data && r.data.error==='backup_conflict'){
        this.conflict=true;
        this.conflictRevision=(typeof r.data.revision==='number') ? r.data.revision : null;
        // 충돌 감지는 구현하되 경고 모달 없음 — 조용한 배지 + 로그 (§9)
        console.warn('[recovery] backup_conflict', {
          serverRevision:this.conflictRevision, baseRevision:this.data.baseRevision,
          clientInstanceId:this.instanceId() });
        this.lastResult={ ok:false, at:Date.now(), code:'backup_conflict' };
        this.updateBadge(); return { ok:false, code:'backup_conflict', revision:this.conflictRevision };
      }
      this.lastResult={ ok:false, at:Date.now(), code:(r.data && r.data.error) || ('http_'+r.status) };
      this.updateBadge(); return { ok:false, code:this.lastResult.code };
    } finally { this._busy=false; }
  },

  /* 422-OPS-E: 집단 통계용 snapshot — Profile 수치와 tastes의 acts 카운트만.
     일기 원문·문장 조각·개인 텍스트는 절대 싣지 않는다(§6-4 v1 고정).
     sourceRevision=baseRevision → 서버가 이전보다 클 때만 delta 반영(재전송 멱등). */
  buildCollectiveSnapshot(){
    const d=(typeof Profile!=='undefined'&&Profile.data)||null;
    if(!d) return undefined;
    const targets={};
    const ts=d.tastes||{};
    for(const k of Object.keys(ts).slice(0,300)){
      const a=(ts[k]&&ts[k].acts)||{};
      targets[k]={ observe:a.observe|0, rest:a.rest|0, record:a.record|0, wonder:a.wonder|0 };
    }
    return {
      schemaVersion:1,
      sourceRevision:(this.data&&this.data.baseRevision)|0,
      totals:{ diary:d.diaryCount|0, memories:d.memoryCount|0,
               observedMs:d.totalObservedMs|0, pass:d.passCount|0 },
      targets,
    };
  },

  autoBackup(){ if(!this.data || this.conflict) return; this.backup({}); },
  startAuto(){
    if(this._timer) return;
    this._timer=setInterval(()=>this.autoBackup(), 5*60*1000);
    document.addEventListener('visibilitychange', ()=>{ if(document.hidden) this.autoBackup(); });
  },

  /* ---- 조용한 배지 (산책 방해 금지) ---- */
  updateBadge(){
    const el=document.getElementById('pr-bkbadge'); if(!el) return;
    el.classList.remove('warn');
    if(!this.data){ el.textContent=''; return; }
    if(this.conflict){ el.classList.add('warn'); el.textContent='다른 기기의 기록과 충돌'; return; }
    if(this.lastResult && !this.lastResult.ok){
      el.classList.add('warn');
      el.textContent='마지막 백업 '+fmtAgoMin(this.lastResult.at)+' 실패'; return;
    }
    if(this.lastResult && this.lastResult.ok){ el.textContent='백업됨 · '+fmtAgoMin(this.lastResult.at); return; }
    el.textContent='';
  },

  /* ---- 모달 공통 ---- */
  _sheet(){ return document.getElementById('rc-sheet'); },
  _panel(){ return document.getElementById('rc-panel'); },
  openPanel(html){ this._panel().innerHTML=html; this._sheet().style.display='block'; },
  closePanel(){ this._sheet().style.display='none'; this._panel().innerHTML=''; },
  _note(msg){ const n=this._panel().querySelector('.rc-note'); if(n) n.textContent=msg; },

  /* ---- 발급: "기록 지키기" (§5) — 키 1회 표시·복사·분실 경고, 직후 첫 백업 ---- */
  openIssue(){
    const key=this.newKey();
    this.openPanel(
      '<h3>기록 지키기</h3>'+
      '<p>이 복구 코드가 있으면 다른 브라우저·기기에서도 이 별이의 기록을 이어갈 수 있습니다.</p>'+
      '<span class="rc-key" id="rc-keytext"></span>'+
      '<p class="rc-warn">이 코드는 지금 한 번만 표시됩니다. 잃어버리면 이 별이의 기록도 되찾을 수 없습니다.</p>'+
      '<div class="rc-row">'+
      '<button type="button" class="rc-ghost" id="rc-copy">복사</button>'+
      '<button type="button" class="rc-primary" id="rc-issue-done">저장했어요, 기록 지키기 시작</button>'+
      '<button type="button" class="rc-ghost" id="rc-cancel">취소</button>'+
      '</div><div class="rc-note"></div>');
    this._panel().querySelector('#rc-keytext').textContent=key;
    this._panel().querySelector('#rc-copy').addEventListener('click', async ()=>{
      try{ await navigator.clipboard.writeText(key); this._note('복사했습니다'); }
      catch(e){ this._note('복사에 실패했습니다 — 코드를 직접 적어주세요'); }
    });
    this._panel().querySelector('#rc-cancel').addEventListener('click', ()=>this.closePanel());
    this._panel().querySelector('#rc-issue-done').addEventListener('click', async (ev)=>{
      ev.target.disabled=true;
      this.data={ recoveryKey:key, baseRevision:0, registeredAt:Date.now() };
      this.save();
      const r=await this.backup({});           // 발급 직후 첫 백업 (예외 트리거, §9)
      this.startAuto();
      this.syncButtons();
      if(r.ok){ this.closePanel(); }
      else { this._note('첫 백업에 실패했습니다 — 자동으로 다시 시도합니다'); setTimeout(()=>this.closePanel(), 1600); }
    });
  },

  /* ---- 수동 "지금 백업" — 충돌 시에만 확인 후 force 덮어쓰기 (§6) ---- */
  async manualBackup(){
    if(!this.data){ this.openIssue(); return; }
    const r=await this.backup({});
    if(r.ok){ return; }
    if(r.code==='backup_conflict'){ this.openForceConfirm(); }
  },
  openForceConfirm(){
    const rev=this.conflictRevision;
    this.openPanel(
      '<h3>다른 기기의 기록과 충돌</h3>'+
      '<p>다른 기기가 먼저 백업했습니다 (서버 기록 rev.'+(rev===null?'?':rev)+').<br>'+
      '지금 이 브라우저의 기록으로 서버 기록을 덮어쓸까요?</p>'+
      '<p class="rc-warn">덮어쓰면 다른 기기가 백업한 내용은 사라집니다.</p>'+
      '<div class="rc-row">'+
      '<button type="button" class="rc-primary" id="rc-force">이 기록으로 덮어쓰기</button>'+
      '<button type="button" class="rc-ghost" id="rc-cancel">그대로 두기</button>'+
      '</div><div class="rc-note"></div>');
    this._panel().querySelector('#rc-cancel').addEventListener('click', ()=>this.closePanel());
    this._panel().querySelector('#rc-force').addEventListener('click', async (ev)=>{
      ev.target.disabled=true;
      // confirmedRevision = 확인 시점에 본 서버 revision — 처리 순간 또 갱신됐으면 재409 (§4)
      const r=await this.backup({ force:true, confirmedRevision:rev });
      if(r.ok){ this.closePanel(); return; }
      if(r.code==='backup_conflict'){ this.openForceConfirm(); return; }   // 재409 — 새 revision으로 다시
      this._note('덮어쓰지 못했습니다. 잠시 뒤에 다시 시도해 주세요');
      ev.target.disabled=false;
    });
  },

  /* ---- 복구: "기존 별이 이어가기" (§5·§7) ---- */
  openRestore(){
    this.openPanel(
      '<h3>기존 별이 이어가기</h3>'+
      '<p>다른 브라우저에서 "기록 지키기"를 했던 별이의 기록을 이 브라우저로 가져옵니다.</p>'+
      '<input id="rc-obs" placeholder="관찰자 코드 (BYL-XXXX-XXXX)" autocomplete="off" spellcheck="false">'+
      '<input id="rc-key" placeholder="복구 코드 (BYLR-……)" autocomplete="off" spellcheck="false">'+
      '<div class="rc-row">'+
      '<button type="button" class="rc-primary" id="rc-go">이어가기</button>'+
      '<button type="button" class="rc-ghost" id="rc-cancel">취소</button>'+
      '</div><div class="rc-note"></div>');
    this._panel().querySelector('#rc-cancel').addEventListener('click', ()=>this.closePanel());
    this._panel().querySelector('#rc-go').addEventListener('click', ()=>this._runRestore());
  },
  async _runRestore(){
    const obs=(this._panel().querySelector('#rc-obs').value||'').trim().toUpperCase();
    const key=(this._panel().querySelector('#rc-key').value||'').trim().toUpperCase();
    if(!this.OBS_RE.test(obs) || !this.KEY_RE.test(key)){ this._note('코드 형식이 맞지 않습니다'); return; }
    const go=this._panel().querySelector('#rc-go'); go.disabled=true;
    this._note('기록을 찾는 중…');
    const r=await this.post('restore', { observerId:obs, recoveryKey:key });
    if(r.status!==200 || !r.data || !r.data.ok){
      go.disabled=false;
      const code=r.data && r.data.error;
      if(r.status===0){ this._note('연결하지 못했습니다 — 다시 시도해 주세요'); return; }
      if(code==='observer_not_found'){ this._note('등록된 기록을 찾지 못했습니다. "기록 지키기"를 했던 코드인지 확인해 주세요'); return; }
      if(code==='observer_key_mismatch'){ this._note('복구 코드가 일치하지 않습니다'); return; }
      if(code==='rate_limited'){ this._note('시도가 너무 많았습니다. 10분 뒤에 다시'); return; }
      if(code==='schema_unsupported'){ this._note('기록 형식이 달라 복구할 수 없습니다'); return; }
      this._note('지금은 복구할 수 없습니다. 잠시 뒤에 다시'); return;
    }
    // §5-1 1단계: 수신 blob 전체 검증
    const blob=r.data.blob;
    if(r.data.schemaVersion!==1 || !blob || !blob.profile || blob.profile.version!==1 ||
       blob.profile.observerId!==obs){
      go.disabled=false; this._note('기록 형식이 달라 복구할 수 없습니다'); return;
    }
    const incoming={ payload:blob, revision:r.data.revision, recoveryKey:key, observerId:obs, savedAt:Date.now() };
    if(!this.hasRealRecords()){ this._stageAndReload(incoming); return; }
    this.openReplaceConfirm(incoming);
  },

  /* ---- 교체 확인 + 보호 백업 (§6) ---- */
  openReplaceConfirm(incoming){
    const registered=!!this.data;
    this.openPanel(
      '<h3>기록 교체 확인</h3>'+
      '<p>이 브라우저에는 이미 별이의 기록이 있습니다.<br>'+
      '가져온 기록('+incoming.observerId+')으로 교체할까요?</p>'+
      (registered
        ? '<p>교체 전에 지금 기록을 서버에 한 번 더 지켜둡니다.</p>'
        : '<p class="rc-warn">이 브라우저의 기록은 사라집니다.</p>')+
      '<div class="rc-row">'+
      '<button type="button" class="rc-primary" id="rc-replace">'+(registered?'기록 지키고 교체':'교체')+'</button>'+
      '<button type="button" class="rc-ghost" id="rc-cancel">취소</button>'+
      '</div><div class="rc-note"></div>');
    this._panel().querySelector('#rc-cancel').addEventListener('click', ()=>this.closePanel());
    this._panel().querySelector('#rc-replace').addEventListener('click', async (ev)=>{
      ev.target.disabled=true;
      if(this.data){
        this._note('지금 기록을 지키는 중…');
        const p=await this.backup({});
        if(!p.ok){ this.openProtectFail(incoming); return; }   // 성공해야만 교체 (§6 — 강행 금지)
      }
      this._stageAndReload(incoming);
    });
  },
  // 보호 백업 실패 = 복구 중단 + 재시도만. 파일 다운로드 탈출구는 Public Beta 범위에서
  // 제외됨 (2026-07-17 결정) — "백업 실패해도 계속"이 없는 원칙은 그대로 유지된다.
  openProtectFail(incoming){
    this.openPanel(
      '<h3>지금 기록을 지키지 못해 복구를 멈췄습니다</h3>'+
      '<p>이 브라우저의 기록을 서버에 백업하지 못했습니다.<br>'+
      '기록을 지키지 못한 채 교체하지는 않습니다.</p>'+
      '<div class="rc-row">'+
      '<button type="button" class="rc-primary" id="rc-retry">다시 시도</button>'+
      '<button type="button" class="rc-ghost" id="rc-cancel">취소</button>'+
      '</div><div class="rc-note"></div>');
    this._panel().querySelector('#rc-cancel').addEventListener('click', ()=>this.closePanel());
    this._panel().querySelector('#rc-retry').addEventListener('click', async (ev)=>{
      ev.target.disabled=true;
      const p=await this.backup({});
      if(p.ok){ this._stageAndReload(incoming); return; }
      ev.target.disabled=false; this._note('아직 백업하지 못했습니다 — 잠시 뒤에 다시 시도해 주세요');
    });
  },
  // §5-1 2단계(pending 기록) 후 3~7 적용 → reload. 중간에 죽어도 부트가 전진/롤백.
  _stageAndReload(incoming){
    this._note('기록을 옮기는 중…');
    try{
      localStorage.setItem(RESTORE_PENDING_LS, JSON.stringify(incoming));
      rcApplyPending(incoming);
      location.reload();
    }catch(e){
      this._note('기록을 옮기지 못했습니다. 잠시 뒤에 다시 시도해 주세요');
    }
  },

  syncButtons(){
    const b=document.getElementById('pr-backup');
    if(b) b.textContent=this.data ? '지금 백업' : '기록 지키기';
    this.updateBadge();
  },
  init(){
    this.load();
    const b=document.getElementById('pr-backup');
    if(b) b.addEventListener('click', ()=>this.manualBackup());
    const ro=document.getElementById('pr-restore-open');
    if(ro) ro.addEventListener('click', ()=>this.openRestore());
    // 시트 열릴 때 배지 갱신 — PR.open은 건드리지 않고 감싼다
    const prOpen=PR.open.bind(PR);
    PR.open=(...a)=>{ const r=prOpen(...a); this.syncButtons(); return r; };
    this.syncButtons();
    if(this.data) this.startAuto();            // 부트 백업 없음 — 트리거는 3개뿐 (§9)
  },
};
function fmtAgoMin(ts){
  const m=Math.max(0, Math.round((Date.now()-ts)/60000));
  return m===0 ? '방금' : m+'분 전';
}
Recovery.init();

/* =====================================================================
   BUILD 420-B — 첫 진입 온보딩
   첫 방문에만 자동 노출. 버튼 확인 후 다시 자동 노출하지 않는다.
   기록 시트의 "안내 다시 보기"로 언제든 재열람 (플래그는 건드리지 않음).
   배경 산책 루프는 멈추지 않는다 — 모달을 닫는 순간 산책이 그대로 이어진다.
   ===================================================================== */
const ONBOARDING_LS='mimesis.byeoli.onboarding.v1';   // 온보딩 완료 플래그 (전용 키)
const Onboarding={
  _open:false,
  seen(){ try{ return localStorage.getItem(ONBOARDING_LS)==='1'; }catch(e){ return true; } },
  markSeen(){ try{ localStorage.setItem(ONBOARDING_LS,'1'); }catch(e){} },
  show(){
    if(this._open) return;
    this._open=true;
    const sheet=document.getElementById('ob-sheet');
    sheet.style.display='block';
    void sheet.offsetHeight;                    // reflow — transition 시작점 확정 (rAF 비의존)
    sheet.classList.add('ob-in');               // 짧은 페이드인
    document.getElementById('ob-start').focus();
  },
  dismiss(){
    if(!this._open) return;
    this._open=false;
    this.markSeen();
    const sheet=document.getElementById('ob-sheet');
    sheet.classList.remove('ob-in');
    setTimeout(()=>{ sheet.style.display='none'; }, 300);
  },
  init(){
    document.getElementById('ob-start').addEventListener('click', ()=>this.dismiss());

let paused=false,lastT=0,acc=0,speedMul=1,stepTimer=0.42;
/* BUILD 428: 작은 습관 — 가끔 이유 없이 멈춰 하늘을 보거나 그냥 서 있는다.
   대상 없는 멈춤만 허용 (없는 소품을 지어내지 않는다 — 일기도 안 쓴다). */
let habitT=20+rng()*25, habitHold=0, habitKind=null;

/* ===== BUILD 428-C — Snow Pace (Vase 판정 2026-07-18) ==========================
   눈 오는 날은 별이가 '덜 사는' 게 아니라 같은 하루를 더 천천히 걷는 것처럼 보인다.
   그래서 바꾸는 것은 표현뿐: 걸음 애니메이션 템포 · 발 딛는 간격 · 상하 움직임 ·
   멈췄다 출발하는 뜸.  절대 안 바꾸는 것: byeoli.speed(=하루 진행률·소품 만남 빈도) ·
   행동 횟수 · 일기 생성량 · Authority 상태 전이.
   빼콩은 별이와 다른 비율로 반응한다 (같은 모션 금지 — 427 캐릭터 분리). */
const SNOW_PACE={ byeoliGait:0.68, byeoliStep:1.45, ppaeGait:0.82, resumeDelay:0.5 };
const isSnowing=()=>sky.weather==='snow';
/* 환경 확장 지점 (428-C 보류분 — 값을 지어내지 않는다):
   ENV.wind  : 향후 wind 시스템이 채운다. 지금은 항상 0이며 렌더러는 이 훅만 읽는다.
   ENV.heat  : 향후 더위 상태. coolingTarget(물·나무·처마) 태그와 함께 쉼 가중치에 쓸 자리.
   두 값 모두 현재 소스가 없으므로 어떤 행동도 이 값으로 발생시키지 않는다. */
const ENV={ wind:0, heat:0, coolingTags:['water','tree','eaves'] };
function update(dt){
  sky.tick(dt);            // 시간·날씨는 별이가 뭘 하든 흐른다
  ppae.tick(dt);           // 빼콩이도 항상 제멋대로 돌아다닌다
  if(flash.on) flash.timer-=dt, flash.timer<=0 && (flash.on=false);
  if(byeoli.state==='acting'){
    // 428: 바라봄이 먼저 — 이 시간엔 아무것도 하지 않고 그저 본다
    if(byeoli.gazeT>0){ byeoli.gazeT-=dt; brain.tick(dt,false); return; }
    byeoli.actTimer-=dt; brain.tick(dt,false);
    if(byeoli.actTimer<=0){
      // BUILD 426: '사진' 행동을 마치는 순간, 그 장면이 진짜 사진이 된다 (로컬 앨범)
      if(byeoli.actAction==='record' && typeof AlbumCapture!=='undefined') AlbumCapture.onRecordDone();
      byeoli.state='walk'; byeoli.actAction=null;
      if(isSnowing()) byeoli.resumeT=SNOW_PACE.resumeDelay;   // 428-C: 눈 오는 날엔 다시 걷기까지 잠깐 뜸
    }
    return;
  }
  brain.tick(dt,true);
  walkClock+=dt;
  // 428: 습관 멈춤 중 — 걷지 않고 발소리도 없다. 세계와 만남 감지는 계속 흐른다.
  if(habitHold>0){
    habitHold-=dt; if(habitHold<=0) habitKind=null;
    updateEncounters(dt);
    return;
  }
  /* 430: 스쳐 지나가는 순간 — 멈추는 것은 별이의 걸음뿐이다.
     하늘·구름·날씨·빼콩은 이 함수 맨 위에서 이미 흘렀다 (세계는 둘보다 크다). */
  if(byeoli.stepAside>0) byeoli.stepAside-=dt;
  if(byeoli.passT>0){ byeoli.passT-=dt; updateEncounters(dt); return; }
  habitT-=dt;
  if(habitT<=0){
    habitT=25+rng()*35;
    if(!currentTarget || currentTarget.phase==='unseen'){ habitHold=0.9+rng()*0.6; habitKind=rng()<0.6?'sky':'feel'; }
  }
  // 428-C: 멈췄다 다시 걷기 시작할 때의 뜸 — 눈 오는 날만.
  // 세계 진행(worldX)은 멈추지 않는다: 느려 보이는 건 다리와 발소리뿐 (진행률 보존 계약).
  const resuming = byeoli.resumeT>0;
  if(resuming) byeoli.resumeT-=dt;
  const snow=isSnowing();
  byeoli.worldX+=byeoli.speed*dt;                      // ← 눈에도 불변 (하루 진행률·만남 빈도 보존)
  byeoli.walkPhase+=dt*8*(snow?SNOW_PACE.byeoliGait:1)*(resuming?0.55:1);
  // 발소리: 실제 걸음 간격(약 0.42초마다 한 걸음). 배속 1일 때만. 눈이면 발 딛는 간격이 는다.
  stepTimer-=dt;
  if(stepTimer<=0){ if(speedMul===1) Sound.step(); stepTimer=0.42*(snow?SNOW_PACE.byeoliStep:1); }
  if(byeoli.worldX>worldLen){
    byeoli.worldX=0; loopCount++;
    for(const p of props){ p.phase='unseen'; p.reactedThisPass=false; }
    seenKindsToday.clear();
    updateDayTag();
    pushMsg('day', `— ${formatByeoliDate()} · 동네 한 바퀴 —`, null);
  }
  updateEncounters(dt);
}
function updateDayTag(){ document.getElementById('daytag').textContent=formatByeoliDate(); }

   ---------------------------------------------------------------------
   렌더러는 "누가 상태를 만드는지" 모른다. state 스냅샷만 그린다.
   - LocalStateProvider(sandbox): 내부에서 로컬 두뇌(update)를 돌려 state 생성
   - RemoteStateProvider(live)  : 나중에 /api/byeoli/state 구독 (지금은 stub)

// 현재 세계를 하나의 완결 스냅샷으로 묶는다 (렌더러가 요구하는 모든 값 포함).
// renderer는 이 스냅샷 외의 전역을 절대 읽지 않는다 → 전역 fallback 금지.
// 방송에서 "모두 같은 순간"이 되려면 action 종류뿐 아니라 애니메이션 프레임까지 담아야 한다.
function snapshotByeoliState(){
  const camShift = byeoli.worldX - byeoli.screenX;
  return {
    byeoli: {
      worldX:byeoli.worldX, screenX:byeoli.screenX,
      state:byeoli.state,                 // walk | acting
      actAction:byeoli.actAction,         // observe/rest/record/wonder | null
      actTarget:byeoli.actTarget,         // 현재 행동 대상 id
      actTimer:byeoli.actTimer,           // 행동 남은 시간(종료 시각)
      speed:byeoli.speed,
      walkPhase:byeoli.walkPhase,         // 걷기 애니메이션 프레임
    },
    ppae: { x:ppae.x, y:ppae.y, facing:ppae.facing, phase:ppae.phase, mode:ppae.mode },
    sky: { t:sky.t, phase:sky.phase, weather:sky.weather, clouds:sky.clouds,
           cloudDark:sky.cloudDark, particles:sky.particles, flybys:sky.flybys },
    props,                                // 소품 배치·type·rare·phase·variant
    camera: { camShift, worldX:byeoli.worldX, screenX:byeoli.screenX, worldLen,
              loopCount },              // BUILD 416-A: 누적 거리(존 진행)용. 서버 계약에도 필요(407)
    flash: { on:flash.on, timer:flash.timer },  // 카메라 플래시
    speedMul,                             // 배속(연출 맥락)
    epoch: byeoliDayEpoch(),              // 별이력 시각
    updatedAt: Date.now(),
  };
}

const LocalStateProvider = {

};

// live 모드용 — 지금은 인터페이스만. Authority(/api/byeoli/state) 나오면 채운다.

/* ===== BUILD 410-A: Ambient Motion =====================================
   순수 시각 효과. state(스냅샷)·Brain·발소리·오디오 전혀 안 건드림.
   render() 시작에서 AMB.t를 performance.now()로 한 번 갱신, draw들이 읽음.
   전부 정수 픽셀 오프셋, sin 기반. 오브젝트마다 위치로 phase를 어긋냄. */
const AMB={
  t:0,
  // 1px(또는 amp px) 좌우/상하 흔들림. speed 느림, x로 위상 분산.
  sway(x,speed,amp){ return Math.round(Math.sin(this.t*speed + x*0.013)*amp); },
  // 느린 0~1 밝기용 삼각 (깜빡임 아님)
  glow(x,speed){ return Math.sin(this.t*speed + x*0.02)*0.5+0.5; },
};

/* =====================================================================
   BUILD 414-A — Procedural Parallax Background System
   기존 고정 배경을 "레이어 후보 조합형"으로 확장한다.
   · 조합은 world SEED 기반 결정론 — 같은 seed면 새로고침해도 같은 풍경.
     Math.random() 직접 호출 없음(makeRNG 사용).
   · 레이어마다 parallax speed와 loop length가 다르다. 루프 길이는 서로소에
     가깝게 잡아, 오래 걸어도 같은 조합이 동시에 반복되지 않게 한다.
   · 계절·시간·날씨 eligibility로 어색한 조합(눈 쌓인 여름 등)을 차단한다.
   · 배경은 취향 집계 대상이 아니다. Object Registry prop과 완전히 별개.
   · foreground는 낮은 높이·낮은 대비 — 별/빼콩이/props 가독성을 해치지 않는다.
   · 기존 날씨 로직은 읽기만 한다(수정·이중 구동 없음).
   ===================================================================== */
const BG_SEASONS=['spring','summer','autumn','winter'];
// 별이력 하루 = 1 epoch. 계절은 epoch에서 결정론적으로 파생(기존 상태 불변).
const BG_SEASON_LEN=8;                    // 별이력 8일마다 계절 전환
function bgSeason(epoch){ return BG_SEASONS[Math.floor(epoch/BG_SEASON_LEN)%4]; }
// 기존 sky는 dawn/day/dusk/night, weather는 clear/rain/snow만 갖는다.
// 배경 축은 여기서 파생만 한다 — sky 객체를 건드리지 않는다.
function bgTime(phase){ return phase==='dawn'?'morning':phase; }          // morning/day/dusk/night
function bgWeather(sky){
  if(sky.weather==='rain') return 'rain';
  if(sky.weather==='snow') return 'snow';
  return sky.cloudDark ? 'cloudy' : 'clear';   // 먹구름이면 흐림
}

     완화 순서: 존 → 날씨 → 계절. 시간은 절대 완화하지 않음(414-A 규칙).
   · 3500m마다 순환하되 cycle 번호가 해시에 들어가 재방문 존은 다른 조합.
   · 전환은 계단식 — 먼 레이어부터 15m 간격으로 갈아탄다(동시 전환 금지).
   · sky는 존 무관 — 하늘은 시간과 날씨의 것.
   · 설계 문서: docs/BUILD_416A_ZONE_SYSTEM.md
   ===================================================================== */
const BG_M2PX=16;                          // 1m = 16px (걸음 62px/s → 존당 ~2~4분)
const BG_ZONES=[
  { id:'village', from:0,    to:500  },
  { id:'paddy',   from:500,  to:1500 },
  { id:'forest',  from:1500, to:2500 },
  { id:'hills',   from:2500, to:3500 },
];
const BG_CYCLE_M=3500;                     // 한 여정. 이후 마을부터 순환
// 계단식 전환 — far→near 순서로 존 경계를 늦게 만난다 (m)
const BG_STAGGER={ farMountains:0, nearMountains:15, distantForest:30,
                   midTrees:45, field:60, roadside:75, foreground:90 };
// 존별 레이어 선호 후보 — 반드시 BG_PACK에 실존하는 id만 (validate:zone이 강제)
const BG_ZONE_PREF={
  village:{
    farMountains:['low-ridge','round-hills'],
    nearMountains:['near-low','near-none'],
    distantForest:['broadleaf','sparse'],
    midTrees:['mid-village','mid-mixed'],
    field:['grass','flower-field','snow-field'],
    roadside:['stone-wall','low-fence'],
    foreground:['small-flower','stone-grass','snow-mound','puddle'],
  },
  paddy:{
    farMountains:['low-ridge','double-ridge'],
    nearMountains:['near-none','near-low'],        // 개방감
    distantForest:['sparse','broadleaf'],
    midTrees:['mid-trees'],
    field:['paddy','yellow-grass','snow-field'],
    roadside:['grass-verge','bare-road'],
    foreground:['tall-grass','puddle','snow-mound'],
  },
  forest:{
    farMountains:['far-peaks','double-ridge','misty'],
    nearMountains:['near-twin','near-broad'],
    distantForest:['deep-forest','pine-line','bamboo','bare-trees'],
    midTrees:['mid-trees'],
    field:['grass','yellow-grass','snow-field'],
    roadside:['bare-road','grass-verge'],
    foreground:['fallen-leaf','tall-grass','stone-grass','snow-mound'],
  },
  hills:{
    farMountains:['far-peaks','rocky','misty'],
    nearMountains:['near-twin','near-broad'],
    distantForest:['sparse','bare-trees','pine-line'],
    midTrees:['mid-trees'],
    field:['silver-grass','yellow-grass','grass','snow-field'],
    roadside:['bare-road'],
    foreground:['stone-grass','tall-grass','snow-mound'],
  },
};
// 누적 거리(m). loopCount가 없는 (구)원격 스냅샷은 0 폴백 — 랩 내 거리만으로 동작
function bgDistanceM(camera){
  if(!camera) return 0;
  const laps=(camera.loopCount|0), wl=camera.worldLen||0, wx=camera.worldX||0;
  return (laps*wl+wx)/BG_M2PX;
}
// 레이어별 유효 거리 → (zone, cycle). 계단식: 가까운 레이어일수록 경계를 늦게 만난다
function bgJourney(distM, layer){
  const eff=Math.max(0, distM-(BG_STAGGER[layer]||0));
  const cycle=Math.floor(eff/BG_CYCLE_M);
  const m=eff-cycle*BG_CYCLE_M;
  let zone=BG_ZONES[0].id;
  for(const z of BG_ZONES){ if(m>=z.from&&m<z.to){ zone=z.id; break; } }
  return { zone, cycle };
}

function bgEligible(c, ctxv){
  if(c.season  && !c.season.includes(ctxv.season))   return false;
  if(c.time    && !c.time.includes(ctxv.time))       return false;
  if(c.weather && !c.weather.includes(ctxv.weather)) return false;
  return true;
}
/* 조합 선택: seed + 레이어 이름 + (존, 사이클)로 결정론적 인덱스.
   후보가 비면 조건을 단계적으로만 완화한다(존 → 날씨 → 계절 순).
   time은 하늘/지상 톤이 어긋나므로 절대 완화하지 않는다. */
function bgPick(layer, seed, ctxv, zone, cycle){
  const all=BG_PACK[layer];
  let pool=all.filter(c=>bgEligible(c,ctxv));
  if(!pool.length) pool=all.filter(c=>                       // 날씨만 완화
    (!c.season||c.season.includes(ctxv.season)) && (!c.time||c.time.includes(ctxv.time)));
  if(!pool.length) pool=all.filter(c=> !c.time||c.time.includes(ctxv.time));  // 계절도 완화
  if(!pool.length) pool=all;                                  // 최후(정의상 도달하지 않음)
  // BUILD 416-A: 존 선호는 eligible 풀 안에서만 좁힌다 — 교집합이 비면 존만 포기
  if(zone && BG_ZONE_PREF[zone] && BG_ZONE_PREF[zone][layer]){
    const pref=pool.filter(c=>BG_ZONE_PREF[zone][layer].includes(c.id));
    if(pref.length) pool=pref;
  }
  let h=seed>>>0;
  const tag=layer+'|'+(zone||'')+'|'+((cycle|0)||0);
  for(let i=0;i<tag.length;i++){ h^=tag.charCodeAt(i); h=Math.imul(h,16777619)>>>0; }
  return pool[h%pool.length];
}
/* ---- 디버그 훅 (sandbox 전용) ----
   ?bgSeed=1234 &season=autumn &time=night &weather=fog
   ⚠ Production Live(mode==='live')에서는 query가 Authority/정상 상태보다
   우선하면 안 되므로 전부 무시한다. */
let BG_SEED=0, BG_FORCE=null;
function bgInitDebug(){
  BG_SEED=SEED>>>0;
  BG_FORCE=null;
  try{
    if(typeof stateProvider!=='undefined' && stateProvider.mode==='live') return;
    const qs=new URLSearchParams(location.search);
    const s=qs.get('bgSeed');
    if(s!==null && s!=='' && isFinite(+s)) BG_SEED=(+s)>>>0;
    const f={};
    const se=qs.get('season'), ti=qs.get('time'), we=qs.get('weather');
    if(se && BG_SEASONS.includes(se)) f.season=se;
    if(ti && ['morning','day','dusk','night'].includes(ti)) f.time=ti;
    if(we && ['clear','cloudy','fog','rain','snow'].includes(we)) f.weather=we;
    if(Object.keys(f).length) BG_FORCE=f;
    // sandbox 전용 진단 훅 (Live에서는 위에서 return되어 노출되지 않는다)
    window.__BG_DEBUG__={
      describe:()=>BG.describe(), pack:()=>BG_PACK, order:()=>BG_ORDER,
      pick:(layer,seed,ctxv)=>bgPick(layer,seed,ctxv),
      eligible:(c,ctxv)=>bgEligible(c,ctxv), calls:()=>BG.calls,
    };
    // BUILD 414-B: 오브젝트 실루엣 검증용. registry/drawProp 대칭을 눈으로 확인한다.
    window.__OBJ_DEBUG__={
      catalog:()=>CATALOG, rare:()=>RARE,
      ids:()=>Object.keys(CATALOG).concat(Object.keys(RARE)),
      draw:(type,sx,rare)=>drawProp({type,x:sx,phase:'seen',rare:!!rare,variant:''},sx),
      bg:()=>{ const st=stateProvider.getCurrentByeoliState(); if(st) drawBackground(st.sky,st.camera); },
      canvas:()=>cv, groundY:()=>GROUND_Y,
      props:()=>{ const st=stateProvider.getCurrentByeoliState(); return st?st.props.map(p=>p.type):[]; },
    };
  }catch(e){}
}

const BG={
  _key:null, _combo:null, _ctx:null, _journey:null, calls:0,
  context(sky, epoch){
    const c={ season:bgSeason(epoch), time:bgTime(sky.phase), weather:bgWeather(sky) };
    if(BG_FORCE){                       // sandbox 강제값 (live에서는 BG_FORCE가 null)
      if(BG_FORCE.season)  c.season=BG_FORCE.season;
      if(BG_FORCE.time)    c.time=BG_FORCE.time;
      if(BG_FORCE.weather) c.weather=BG_FORCE.weather;
    }
    return c;
  },
  // 조합은 (seed, 계절, 시간, 날씨, 레이어별 존·사이클)이 바뀔 때만 다시 고른다.
  // 존 시그니처 계산은 프레임당 산술 몇 번 — 배열 생성 없음.
  combo(seed, sky, epoch, camera){
    const c=this.context(sky, epoch);
    const distM=bgDistanceM(camera);
    let zoneSig='';
    const journeys={};
    for(const l of BG_ORDER){
      if(l==='sky'){ journeys[l]=null; continue; }           // 하늘은 존 무관
      const j=bgJourney(distM, l);
      journeys[l]=j; zoneSig+=l[0]+j.zone[0]+j.cycle;
    }
    const key=seed+'|'+c.season+'|'+c.time+'|'+c.weather+'|'+zoneSig;
    if(this._key===key) return this._combo;
    const out={};
    for(const l of BG_ORDER){
      const j=journeys[l];
      out[l]=bgPick(l, seed, c, j?j.zone:null, j?j.cycle:0);
    }
    this._key=key; this._combo=out; this._ctx=c; this._journey=journeys;
    return out;
  },
  // 현재 조합을 id만으로 요약 (디버그·검증용)
  describe(){
    if(!this._combo) return null;
    const o={};
    for(const l of BG_ORDER) o[l]=this._combo[l]?this._combo[l].id:null;
    const j=this._journey&&this._journey.foreground;
    return { seed:BG_SEED, ctx:this._ctx, layers:o,
             zone:j?j.zone:null, cycle:j?j.cycle:0 };
  },
};

/* ---- 레이어 렌더러 ----
   공통 규약: (c=후보, cam=카메라 worldX, tone=밤 톤배율, gy=지평선 y)
   · 배열 생성·DOM·blur/filter 없음. 정수 좌표 fillRect만 사용.
   · 화면 밖은 그리지 않는다(루프 시작점을 화면 기준으로 계산).
   · BG.calls로 draw 호출 수를 계측한다. */
function bgLoopStart(cam, parallax, loop){
  // 레이어 고유 loop 길이로 감싸 반복점을 서로 어긋나게 한다
  const off=-((cam*parallax)%loop);
  return off>0?off-loop:off;
}
function bgMountains(c, cam, tone, gy){
  if(!c.base || !c.peaks.length) return;
  const col=shade(c.base, tone);
  ctx.fillStyle=col;
  const span=200;                                   // 능선 1세트 폭
  let x=bgLoopStart(cam, c.parallax, c.loop)%span;
  for(let bx=x-span; bx<W+span; bx+=span){
    for(let i=0;i<c.peaks.length;i++){
      const p=c.peaks[i], px0=bx+p[0], w=p[1], h=p[2];
      if(px0+w<-10 || px0-w>W+10) continue;          // 화면 밖 skip
      if(c.jag){ bgJagPeak(px0, gy, w, h); }
      else if(c.round){ bgRoundPeak(px0, gy, w, h); }
      else { hill(px0, gy, w, h); }
      BG.calls++;
    }
  }
}
function bgRoundPeak(cx,by,w,h){
  for(let i=0;i<h;i++){ const k=i/h, ww=w*Math.sqrt(Math.max(0,1-(1-k)*(1-k)));
    ctx.fillRect((cx-ww/2)|0,(by-h+i)|0,ww|0,1); }
}
function bgJagPeak(cx,by,w,h){
  for(let i=0;i<h;i++){ const k=i/h; let ww=w*k;
    ww*= (1 + ((i%3===0)?0.10:(i%2===0?-0.06:0)));   // 결정론적 바위 요철
    ctx.fillRect((cx-ww/2)|0,(by-h+i)|0,ww|0,1); }
}
function bgForest(c, cam, tone, gy){
  const col=shade(c.col, tone);
  ctx.fillStyle=col;
  const step=c.step;
  let x=bgLoopStart(cam, c.parallax, c.loop)%step;
  for(let bx=x-step; bx<W+step; bx+=step){
    const i=((bx*7)|0);
    if(c.kind==='pine'){ const h=9+((i%3)*2);
      for(let r=0;r<3;r++){ const w=8-r*2; ctx.fillRect((bx-w/2)|0,(gy-h-r*3)|0,w|0,3); } }
    else if(c.kind==='round'){ const h=7+((i%3)*2);
      ctx.fillRect((bx-3)|0,(gy-h)|0,6,h); ctx.fillRect((bx-4)|0,(gy-h-3)|0,8,4); }
    else if(c.kind==='bamboo'){ const h=13+((i%4)*2);
      ctx.fillRect(bx|0,(gy-h)|0,1,h); ctx.fillRect((bx-2)|0,(gy-h)|0,4,2); }
    else if(c.kind==='bare'){ const h=10+((i%3)*2);
      ctx.fillRect(bx|0,(gy-h)|0,1,h);
      ctx.fillRect((bx-3)|0,(gy-h+2)|0,3,1); ctx.fillRect((bx+1)|0,(gy-h+4)|0,3,1); }
    else { ctx.fillRect((bx-4)|0,(gy-11)|0,8,11); }   // dense
    BG.calls++;
  }
}
function bgMidTrees(c, cam, tone, gy){
  const col=shade(c.col, tone);
  const span=c.dense?100:150;
  let x=bgLoopStart(cam, c.parallax, c.loop)%span;
  for(let bx=x-span; bx<W+span; bx+=span){
    tree(bx+26, gy-2, col); BG.calls++;
    if(c.house){ house(bx+86, gy-2); BG.calls++; }
  }
}
function bgField(c, cam, tone, gy){
  px(0,gy,W,H-gy, shade(c.col,tone));
  px(0,gy,W,2, shade(c.top,tone));
  BG.calls+=2;
  const step=8;
  let x=bgLoopStart(cam, c.parallax, c.loop)%step;
  if(c.rows){                                        // 논두렁 — 가로 이랑
    ctx.fillStyle=shade(c.top,tone);
    for(let yy=gy+6; yy<H; yy+=7){ ctx.fillRect(0,yy|0,W,1); BG.calls++; }
  }
  for(let bx=x;bx<W;bx+=step){
    px(bx,gy+7,2,2, shade('#365040',tone));
    px(bx+4,gy+14,2,2, shade('#2f4738',tone));
    BG.calls+=2;
  }
  if(c.tufts){                                       // 억새 — 낮고 성기게
    ctx.fillStyle=shade(c.top,tone);
    for(let bx=x;bx<W;bx+=step*3){ ctx.fillRect(bx|0,(gy+3)|0,1,4); BG.calls++; }
  }
  if(c.dots){                                        // 꽃밭 점
    ctx.fillStyle=shade(c.dots,tone);
    for(let bx=x+3;bx<W;bx+=step*2){ ctx.fillRect(bx|0,(gy+9)|0,1,1); BG.calls++; }
  }
}
function bgRoadside(c, cam, tone, gy){
  if(c.kind==='none') return;
  const col=shade(c.col,tone);
  ctx.fillStyle=col;
  const step=c.kind==='fence'?14:10;
  let x=bgLoopStart(cam, c.parallax, c.loop)%step;
  for(let bx=x-step; bx<W+step; bx+=step){
    if(c.kind==='wall'){ ctx.fillRect(bx|0,(gy-4)|0,9,4); }
    else if(c.kind==='fence'){ ctx.fillRect(bx|0,(gy-6)|0,1,6); ctx.fillRect(bx|0,(gy-5)|0,14,1); }
    else { ctx.fillRect(bx|0,(gy-2)|0,3,2); }        // verge
    BG.calls++;
  }
}
/* foreground: 낮은 높이·낮은 대비. 별/빼콩이/props를 가리지 않도록
   지평선 아래(발치)에만, 최대 4px 높이로 그린다. */
function bgForeground(c, cam, tone, gy){
  const col=shade(c.col,tone);
  const step=12;
  let x=bgLoopStart(cam, c.parallax, c.loop)%step;
  ctx.fillStyle=col;
  const baseY=H-6;                                   // 화면 최하단 — 캐릭터보다 앞
  for(let bx=x-step; bx<W+step; bx+=step){
    if(c.kind==='grass'){ ctx.fillRect(bx|0,(baseY-3)|0,1,3); ctx.fillRect((bx+3)|0,(baseY-2)|0,1,2); }
    else if(c.kind==='stone'){ ctx.fillRect(bx|0,(baseY-2)|0,3,2); }
    else if(c.kind==='snow'){ ctx.fillRect(bx|0,(baseY-2)|0,7,2); }
    else if(c.kind==='puddle'){ ctx.fillRect(bx|0,(baseY-1)|0,9,1); }
    else if(c.kind==='leaf'){ ctx.fillRect(bx|0,(baseY-1)|0,2,1); }
    else { ctx.fillRect(bx|0,(baseY-3)|0,1,3); }     // flower 줄기
    BG.calls++;
  }
  if(c.dot){                                         // 낮은 대비 악센트
    ctx.fillStyle=shade(c.dot,tone);
    for(let bx=x+5; bx<W; bx+=step*2){ ctx.fillRect(bx|0,(baseY-4)|0,1,1); BG.calls++; }
  }
}

/* foreground는 캐릭터 뒤가 아니라 앞에 그려야 깊이가 생기므로 render()에서 따로 부른다.
   조합은 drawBackground가 이미 만든 캐시를 그대로 재사용한다(재선정 없음). */
function drawForegroundLayer(sky, camera){
  const combo=BG._combo;
  if(!combo || !combo.foreground) return;
  const S=SKY_COLORS[sky.phase];
  bgForeground(combo.foreground, camera.worldX, S.tone, GROUND_Y);
}

function drawBackground(sky, camera){
  const S=SKY_COLORS[sky.phase];
  // BUILD 414-A: 레이어 조합 (seed+계절+시간+날씨 + [416-A] 존·사이클이 바뀔 때만 재선정)
  const epoch=(typeof byeoliDayEpoch==='function')?byeoliDayEpoch():0;
  const combo=BG.combo(BG_SEED, sky, epoch, camera);
  BG.calls=0;
  // 하늘 밴드 — 조합된 팔레트 사용 (없으면 기존 SKY_COLORS로 폴백)
  const sp=combo.sky&&combo.sky.palette;
  const bands=sp?[sp.a,sp.b,sp.c,sp.d]:S.bands;
  const bandH=Math.ceil(GROUND_Y/bands.length);
  for(let i=0;i<bands.length;i++){ px(0,i*bandH,W,bandH,bands[i]); BG.calls++; }
  const isNight=sky.phase==='night', isDusk=sky.phase==='dusk';

  // ---- 별 (밤/노을) ----
  if(isNight||isDusk){
    // 결정적 별 배치 (반짝임만 시간에)
    for(let i=0;i<40;i++){
      const sx=((i*79+13)%W), sy=(i*53+7)%(GROUND_Y-40);
      const tw=(Math.sin(sky.t*40+i)*0.5+0.5);
      if(tw>0.35){ ctx.fillStyle=isNight?`rgba(255,255,255,${0.4+tw*0.6})`:`rgba(255,240,220,${tw*0.4})`;
        ctx.fillRect(sx, sy, 1, 1); if(tw>0.8) ctx.fillRect(sx, sy, tw>0.9?2:1, 1); }
    }
  }
  // ---- 해 / 달 (t로 궤도) ----
  const arcX = 30 + sky.t*(W-60);
  const arcY = 44 - Math.sin(sky.t*Math.PI)*30;   // 낮에 높이
  if(sky.phase==='day'||sky.phase==='dawn'){
    // 해
    ctx.fillStyle=S.sun; disc(arcX, arcY, 7);
    ctx.fillStyle='rgba(251,243,208,.35)'; disc(arcX, arcY, 10);
  } else if(isNight){
    // 달 (초승 표현)
    const mx=W-40 - (sky.t-0.62)/0.38*(W-80), my=30+Math.sin((sky.t-0.62)/0.38*Math.PI)*-14+30;
    ctx.fillStyle='#e8ecff'; disc(mx, my, 6);
    ctx.fillStyle=bands[1]; disc(mx+2.5, my-1.5, 6); // 그믐 깎기
  }

  // ---- 구름 (흰/먹) ----
  for(const c of sky.clouds){
    const col = c.dark? (isNight?'#2a2f42':'#8a8f9a') : (isNight?'#3a4560':'#f2f0e8');
    cloud(c.x, c.y, c.w, col);
  }
  // ---- BUILD 410-A: 먼지·꽃가루 드리프트 (날씨와 무관, 렌더 전용, 배열 미생성) ----
  // 6개 고정 mote를 performance.now 기반 결정론적 위치로. 매우 느림. 맑을 때만.
  if(sky.weather==='clear'){
    const mc = isNight?'rgba(200,205,225,0.35)':'rgba(240,236,214,0.5)';
    ctx.fillStyle=mc;
    for(let i=0;i<6;i++){
      const seed=i*97.3;
      const mx=((AMB.t*0.006 + seed*7) % (W+20)) - 10;
      const my=40 + ((seed*13)%80) + Math.sin(AMB.t*0.0008 + i)*4;
      ctx.fillRect(mx|0, my|0, 1, (i%3===0)?2:1);
    }
  }
  // ---- 하늘 이벤트: 비행기/새/헬기 (하늘에) ----
  if(sky.flybys) for(const f of sky.flybys){ if(f.kind!=='creature') drawFlyby(f, isNight); }

// 색을 tone배율로 어둡게 (밤 표현)
function shade(hex, tone){
  if(tone>=1) return hex;
  const r=parseInt(hex.slice(1,3),16)*tone|0, g=parseInt(hex.slice(3,5),16)*tone|0, b=parseInt(hex.slice(5,7),16)*tone|0;
  return `rgb(${r},${g},${b})`;
}
function disc(cx,cy,r){ for(let y=-r;y<=r;y++){ const w=Math.sqrt(r*r-y*y)|0; ctx.fillRect((cx-w)|0,(cy+y)|0,w*2,1); } }
function cloud(x,y,w,col){ ctx.fillStyle=col; const h=w*0.4;
  px(x,y,w,h,col); px(x+w*0.2,y-h*0.5,w*0.5,h*0.7,col); px(x+w*0.5,y-h*0.3,w*0.4,h*0.6,col); }

// 하늘 이벤트 도트 렌더 (state slice f만 읽음 — 전역 참조 없음)
function drawFlyby(f, isNight){
  const x=Math.round(f.x), y=Math.round(f.y), d=f.dir;
  if(f.kind==='bird'){
    // 갈매기 — 날갯짓 V자
    const up=Math.sin(f.phase)>0;
    ctx.fillStyle=isNight?'#2b3550':'#404a44';
    if(up){ px(x-2,y-1,2,1); px(x,y,1,1); px(x+1,y-1,2,1); }
    else  { px(x-2,y,2,1); px(x,y-1,1,1); px(x+1,y,2,1); }
  } else if(f.kind==='plane'){
    // 비행기 — 몸통 + 꼬리 + 비행운
    const body=isNight?'#8890a0':'#e8ebf0', wing=isNight?'#6a7284':'#c2c8d2';
    // 진행 반대쪽으로 비행운
    ctx.fillStyle='rgba(255,255,255,.5)';
    for(let i=1;i<=6;i++) ctx.fillRect(x - d*(f.w*0.5 + i*4), y+1, 2, 1);
    px(x-6,y,14,3,body);              // 몸통
    px(x + (d>0?8:-2), y-1, 2, 2, body);  // 기수
    px(x-1,y-3,4,3,wing);             // 수직날개
    px(x-3,y+1,7,2,wing);             // 주날개
  } else if(f.kind==='heli'){
    // 헬기 — 몸통 + 회전 로터(깜빡)
    const body=isNight?'#3a4250':'#5a6472';
    px(x-5,y,10,4,body);              // 몸통
    px(x + (d>0?-7:5), y+1, 2, 2, body);  // 꼬리쪽
    px(x + (d>0?4:-6), y-1, 3, 2, body);  // 앞
    // 꼬리붐
    px(x - d*9, y+1, d>0?5:5, 1, body);
    // 로터 (빠른 회전 = 가로선 깜빡)
    ctx.fillStyle=isNight?'#6a7280':'#8a94a2';
    const spin=Math.floor(f.phase)%2;
    if(spin) ctx.fillRect(x-8,y-2,16,1); else ctx.fillRect(x-4,y-2,8,1);
    ctx.fillRect(x-1,y-2,2,2);        // 로터축
  } else if(f.kind==='creature'){
    // 괴생명체 — 지평선 뒤로 큼직한 실루엣, 쿵쿵 걸음
    const bob=Math.round(Math.sin(f.stompT*3)*1.5);
    const gy=y-28-bob;                // 등 높이
    ctx.fillStyle=isNight?'#1a2422':'#2b3a33';  // 어두운 실루엣
    // 몸통
    px(x-7, gy+6, 14, 20);
    // 목/머리 (진행방향)
    const hx = d>0 ? x+5 : x-11;
    px(hx, gy-2, 7, 9);              // 머리
    px(x + (d>0?2:-4), gy+2, 4, 8);  // 목
    // 등 지느러미 (톱니)
    for(let i=0;i<4;i++) px(x-5+i*3, gy+2+ (i%2), 2, 3);
    // 꼬리 (반대쪽)
    px(x - d*10, gy+16, 8, 4);
    px(x - d*15, gy+18, 6, 3);
    // 다리
    px(x-5, gy+24, 4, 6+bob); px(x+2, gy+24, 4, 6-bob);
    // 눈 (빨강, 밤엔 더 또렷)
    ctx.fillStyle=isNight?'#ff5a4a':'#d84438';
    px(hx + (d>0?4:1), gy+1, 1, 1);
  }
}

// 강수 파티클 렌더
function drawWeather(sky){
  for(const p of sky.particles){
    if(p.kind==='rain'){
      ctx.fillStyle=`rgba(160,190,210,${0.5*p.life})`;
      ctx.fillRect(p.x|0, p.y|0, 1, p.bounce?1:3);
    } else {
      ctx.fillStyle=`rgba(245,248,255,${0.85*p.life})`;
      ctx.fillRect(p.x|0, p.y|0, 2, 2);
    }
  }
}

    this._stageEl.style.display='block';
    this._resize(); window.addEventListener('resize', this._onResize=()=>this._resize());
    // 타이틀 (DEFS 기반. 하이픈 id가 그대로 노출되지 않게)
    const _d0=WORLD_EVENT_DEFS[this.active.eventId];
    const tt=document.getElementById('we-title'); if(tt) tt.textContent = (_d0&&_d0.title) || String(this.active.eventId).replace(/-/g,' ').toUpperCase();
    const cap=document.getElementById('we-caption'); if(cap){ cap.style.opacity='0'; cap.textContent=''; }
    this._running=true;
    const loop=()=>{
      if(!this._running) return;
      const p=this._progress(this.active);
      this.scheduleEventSound(this.active);      // 이벤트별 사운드 예약 (410-D/E 분기)
      this._draw(p);
      if(Date.now()>=this.active.endsAt){ this._finish(this.active); this.stop(); return; }
      this._raf=requestAnimationFrame(loop);
    };
    this._raf=requestAnimationFrame(loop);
  },
  _close(){
    this._running=false;
    if(this._raf) cancelAnimationFrame(this._raf), this._raf=null;
    if(this._onResize) window.removeEventListener('resize', this._onResize), this._onResize=null;
    if(this._stageEl) this._stageEl.style.display='none';
    const app=document.getElementById('app'); if(app) app.style.display='';   // 스크롤 위치는 유지됨
  },
  _resize(){
    const dpr=Math.min(2, window.devicePixelRatio||1);
    const w=this._stageEl.clientWidth, h=this._stageEl.clientHeight;
    this._cv.width=w*dpr; this._cv.height=h*dpr; this._cv.style.width=w+'px'; this._cv.style.height=h+'px';
    this._cx.setTransform(dpr,0,0,dpr,0,0); this._W=w; this._H=h;
  },

  // 이벤트별 분기 디스패처 (BUILD 410-D/E). 고질라 본문은 _drawGodzilla로 그대로 이동.
  _draw(p){
    const id=this.active&&this.active.eventId;
    if(id==='meteor-shower') this._drawMeteorShower(p);
    else if(id==='ufo') this._drawUfo(p);
    else this._drawGodzilla(p);
    this._drawCaption(p);
  },

  // 문장 처리 공통 (모든 이벤트가 공유). 종료 직전 1줄, sequence로 결정론적 선택.
  _drawCaption(p){
    const cap=document.getElementById('we-caption');
    if(!cap) return;
    if(p>=0.83 && !cap.textContent){
      const def=(typeof WORLD_EVENT_DEFS!=='undefined')?WORLD_EVENT_DEFS[this.active.eventId]:null;
      const lines=(def&&def.journalLines)||['오늘, 하늘에 무슨 일이 있었다.'];
      cap.textContent=lines[((this.active.sequence||0)>>>0)%lines.length]; cap.style.opacity='1';
    }
    if(p<0.83 && cap.textContent){ cap.textContent=''; cap.style.opacity='0'; }
  },

  // 전체 새 그림 — "잠시 다른 방송". 산책 배경 재사용 안 함.
  _drawGodzilla(p){
    const cx=this._cx, W=this._W, H=this._H;
    // 타임라인: 0~1 암전 / 1~4 거대한 발+흔들림 / 4~8 몸통+등가시 / 8~10 얼굴 / 10~12 꼬리+정적+문장
    // 카메라 흔들림 1px (stomp 창)
    const stompWin = (p>0.08&&p<0.34) && (((Date.now()/220)|0)&1)===0;
    const shX = stompWin? ((((Date.now()/110)|0)&1)?1:-1):0;
    const shY = stompWin?1:0;
    cx.save(); cx.translate(shX,shY);
    // ── 하늘 (먹구름 그라디언트) ──
    const g=cx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0a0e12'); g.addColorStop(0.55,'#131a20'); g.addColorStop(1,'#1c2530');
    cx.fillStyle=g; cx.fillRect(-2,-2,W+4,H+4);
    // 암전 인트로/아웃트로
    let black=0;
    if(p<0.08) black=1-(p/0.08); else if(p>0.92) black=(p-0.92)/0.08;
    // ── 먼 산 실루엣 ──
    cx.fillStyle='#0c1116';
    const hy=H*0.62;
    cx.beginPath(); cx.moveTo(0,hy);
    for(let x=0;x<=W;x+=40){ cx.lineTo(x, hy - 24*Math.abs(Math.sin(x*0.007+2)) - 10); }
    cx.lineTo(W,H); cx.lineTo(0,H); cx.closePath(); cx.fill();
    // ── 안개 띠 ──
    cx.fillStyle='rgba(120,130,140,0.06)'; cx.fillRect(0,hy-20,W,50);
    // ── 새 떼 (1~3초, 급히 이탈) ──
    if(p>0.08&&p<0.30){ const k=(p-0.08)/0.22; cx.fillStyle='rgba(20,24,30,0.85)';
      for(let i=0;i<6;i++){ const bx=W-k*(W+80)-i*22; const by=H*0.25+(i*17)%60+Math.sin(k*6+i)*3;
        cx.fillRect(bx,by,5,2); cx.fillRect(bx-3,by-2,3,2); cx.fillRect(bx+5,by-2,3,2); } }
    // ── 거대 괴수 (화면 대부분을 차지) ──
    this._drawBeast(cx,W,H,p);
    cx.restore();
    // ── 암전 오버레이 ──
    if(black>0){ cx.fillStyle='rgba(0,0,0,'+black.toFixed(3)+')'; cx.fillRect(0,0,W,H); }
  },

  // 거대 도마뱀형 괴수 — 화면 중앙~오른쪽. 특정 영화 복제 아님. 타임라인 따라 부위 강조.
  _drawBeast(cx,W,H,p){
    const cxc=W*0.52, groundY=H*0.92;
    const scale=Math.min(W,H)/230;           // 화면 크기에 비례
    const bob=(p>0.08&&p<0.34)&&(((Date.now()/220)|0)&1)?1:0;
    const S=(v)=>v*scale;
    const body='#0c1215', edge='#05090b', eye='#ff5a3a';
    cx.fillStyle=body;
    // 등장 진행: 0~0.08 안보임 / 커지며 등장
    let rise=0;
    if(p<0.08) return;
    else if(p<0.34) rise=(p-0.08)/0.26;      // 발→몸통 서서히 올라옴
    else rise=1;
    const topY=groundY - S(150)*rise;
    // 다리 두 개 (거대한 발)
    cx.fillRect(cxc-S(55), groundY-S(70), S(34), S(70)+bob);
    cx.fillRect(cxc+S(18), groundY-S(70), S(34), S(70)-bob);
    if(p>0.30){
      // 몸통
      cx.fillRect(cxc-S(58), topY+S(48), S(120), S(74));
      // 굽은 등 상부
      cx.fillRect(cxc-S(40), topY+S(30), S(90), S(26));
      // 등가시
      cx.fillStyle=edge;
      for(let i=0;i<7;i++){ const sx=cxc-S(46)+i*S(15); const hh=S(18)-(i===3?S(4):0);
        cx.beginPath(); cx.moveTo(sx,topY+S(34)); cx.lineTo(sx+S(7),topY+S(34)-hh); cx.lineTo(sx+S(14),topY+S(34)); cx.closePath(); cx.fill(); }
      cx.fillStyle=body;
    }
    if(p>0.62){
      // 목 + 머리 (8초 얼굴 강조)
      cx.fillRect(cxc+S(30), topY+S(6), S(26), S(46));   // 목
      cx.fillRect(cxc+S(48), topY-S(14), S(40), S(30));  // 머리
      cx.fillRect(cxc+S(84), topY-S(8), S(16), S(16));   // 주둥이
      // 눈 (붉은, 얼굴 구간에 발광)
      const eg=(p>0.62&&p<0.85); cx.fillStyle=eg?eye:'#7a2018';
      cx.fillRect(cxc+S(70), topY-S(4), S(7), S(6));
      cx.fillStyle=body;
    }
    // 꼬리 (10초부터 뒤로 길게)
    if(p>0.30){
      const tk=Math.min(1,(p-0.30)/0.5);
      cx.fillRect(cxc-S(58)-S(70)*tk, topY+S(96), S(80)*tk, S(16));
      cx.fillRect(cxc-S(58)-S(100)*tk, topY+S(106), S(46)*tk, S(10));
    }
  },

  /* ── 결정론적 난수 (BUILD 410-D/E) ────────────────────────────────
     같은 eventInstanceId면 모든 뷰어·모든 재접속에서 동일한 배치가 나온다.
     매 프레임 Math.random() 금지. 배열은 instanceId 키로 1회만 생성해 캐시. */
  _hash(str){ let h=2166136261>>>0; const s=String(str||'');
    for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619)>>>0; } return h>>>0; },
  _rnd(seed,i){ let x=(seed+i*2654435761)>>>0; x^=x<<13; x>>>=0; x^=x>>17; x^=x<<5; x>>>=0; return x/4294967296; },

  // 공통 밤하늘 (유성우/UFO 공유). 고정 별 + 낮은 지평선. 과다 발광 금지.
  _drawNightSky(cx,W,H,seed,starCount,brightness){
    const g=cx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#04060d'); g.addColorStop(0.55,'#070c18'); g.addColorStop(1,'#0c1424');
    cx.fillStyle=g; cx.fillRect(-2,-2,W+4,H+4);
    const n=Math.min(100,starCount);
    for(let i=0;i<n;i++){
      const sx=this._rnd(seed,i*3+1)*W, sy=this._rnd(seed,i*3+2)*H*0.72;
      const r=0.6+this._rnd(seed,i*3+3)*1.2;
      const tw=0.55+0.45*Math.sin(Date.now()/900+i*1.7);   // 잔잔한 반짝임
      cx.fillStyle='rgba(226,232,244,'+(0.30*tw*brightness).toFixed(3)+')';
      cx.beginPath(); cx.arc(sx,sy,r,0,6.283); cx.fill();
    }
    cx.fillStyle='rgba(120,140,170,0.05)'; cx.fillRect(0,H*0.66,W,44);   // 얇은 안개
    cx.fillStyle='#070a10';                                              // 낮은 지평선
    const hy=H*0.80; cx.beginPath(); cx.moveTo(0,hy);
    for(let x=0;x<=W;x+=48){ cx.lineTo(x, hy-14*Math.abs(Math.sin(x*0.006+1.2))-6); }
    cx.lineTo(W,H); cx.lineTo(0,H); cx.closePath(); cx.fill();
  },

  /* ── 유성우 (14초) ─────────────────────────────────────────────────
     0~0.14 밤하늘/별 서서히 · 0.16~0.30 첫 유성 1개 천천히
     0.36~0.75 본 유성우 12개(시작·길이·밝기 제각각, 같은 좌하향 방향성)
     0.75~0.89 가장 긴 유성 + 하늘 가장 밝음 · 0.90~1.0 사라짐/문장/암전
     흔들림 0. 폭죽 아님. */
  _meteors(){
    const key=this.active.eventInstanceId;
    if(this._meteorCache && this._meteorCache.key===key) return this._meteorCache.list;
    const seed=this._hash(key), list=[];
    list.push({ startP:0.16, durationP:0.14, x:0.68, y:0.10, dx:-0.34, dy:0.30, length:52, brightness:0.62, big:false });
    for(let i=0;i<12;i++){                    // 본 유성우 — 제각각이되 방향성은 공유(좌하향)
      const r1=this._rnd(seed,i*5+11), r2=this._rnd(seed,i*5+12), r3=this._rnd(seed,i*5+13),
            r4=this._rnd(seed,i*5+14), r5=this._rnd(seed,i*5+15);
      const ang=-0.72+r4*0.30;                // 방향 편차 작게 → 같은 흐름
      const len=22+r5*58;
      list.push({ startP:0.36+r1*0.36, durationP:0.10+r2*0.13, x:0.30+r3*0.72, y:r2*0.34,
        dx:Math.cos(ang)*-1, dy:Math.sin(ang)*-1, length:len, brightness:0.34+r5*0.42, big:false });
    }
    list.push({ startP:0.75, durationP:0.14, x:1.06, y:0.06, dx:-0.86, dy:0.42,
      length:Math.min(this._W*0.68,Math.max(this._W*0.45,this._W*0.55)), brightness:0.95, big:true });
    const out={key,list}; this._meteorCache=out; return list;
  },
  _drawMeteorShower(p){
    const cx=this._cx, W=this._W, H=this._H, seed=this._hash(this.active.eventInstanceId);
    // shakeX=shakeY=0 — 고질라 stomp가 여기 절대 적용되지 않음
    const sky=(p<0.14)?(p/0.14):(p>0.90?Math.max(0,1-(p-0.90)/0.10):1);
    const peak=(p>0.75&&p<0.89)?1.18:1.0;                 // 가장 긴 유성 구간에서 하늘 조금 더 밝게
    this._drawNightSky(cx,W,H,seed,70,Math.min(1.2,sky*peak));
    for(const m of this._meteors()){
      if(p<m.startP || p>m.startP+m.durationP) continue;  // 자기 창에서만
      const k=(p-m.startP)/m.durationP;
      const fade=Math.sin(k*Math.PI);                      // 나타났다 사라짐
      if(fade<=0.01) continue;
      const travel=m.big?W*1.25:W*0.42;
      const hx=m.x*W+m.dx*travel*k, hy=m.y*H+m.dy*travel*k;
      const tx=hx-m.dx*m.length, ty=hy-m.dy*m.length;      // 꼬리는 진행 반대방향
      const a=m.brightness*fade;
      const tg=cx.createLinearGradient(hx,hy,tx,ty);
      tg.addColorStop(0,'rgba(238,244,255,'+(0.85*a).toFixed(3)+')');
      tg.addColorStop(0.45,'rgba(206,222,255,'+(0.30*a).toFixed(3)+')');
      tg.addColorStop(1,'rgba(180,205,255,0)');
      cx.strokeStyle=tg; cx.lineWidth=m.big?2.2:1.3; cx.lineCap='round';
      cx.beginPath(); cx.moveTo(hx,hy); cx.lineTo(tx,ty); cx.stroke();
      cx.fillStyle='rgba(245,250,255,'+(0.9*a).toFixed(3)+')';   // 머리
      cx.beginPath(); cx.arc(hx,hy,m.big?2.0:1.2,0,6.283); cx.fill();
    }
    let black=0;                                            // 인트로/아웃트로 암전
    if(p<0.06) black=1-(p/0.06); else if(p>0.94) black=(p-0.94)/0.06;
    if(black>0){ cx.fillStyle='rgba(0,0,0,'+black.toFixed(3)+')'; cx.fillRect(0,0,W,H); }
  },

  /* ── UFO (10초) ────────────────────────────────────────────────────
     0~0.10 밤하늘 · 0.10~0.34 먼 작은 빛으로 등장 · 0.34~0.55 천천히 접근/횡단
     0.55~0.74 정지 + 탐색광이 지면을 훑음 · 0.74~0.88 조용히 이탈 + 문장
     공포 아님. 신기함. 특정 IP 형태 복제 금지(단순 렌즈형 실루엣). 흔들림 0. */
  _ufo(){
    const key=this.active.eventInstanceId;
    if(this._ufoCache && this._ufoCache.key===key) return this._ufoCache.v;
    const seed=this._hash(key);
    const v={ dir:this._rnd(seed,7)<0.5?-1:1, hoverX:0.40+this._rnd(seed,8)*0.22, hoverY:0.26+this._rnd(seed,9)*0.10 };
    this._ufoCache={key,v}; return v;
  },
  _drawUfo(p){
    const cx=this._cx, W=this._W, H=this._H, seed=this._hash(this.active.eventInstanceId);
    const u=this._ufo();
    const sky=(p<0.10)?(p/0.10):(p>0.90?Math.max(0,1-(p-0.90)/0.10):1);
    this._drawNightSky(cx,W,H,seed,60,sky);
    if(p<0.10){ return; }                                   // 아직 하늘만
    // 경로: 가장자리에서 등장 → hover 지점으로 접근 → 정지 → 반대편으로 이탈
    const enterX=u.dir>0?-0.10:1.10, exitX=u.dir>0?1.12:-0.12;
    const hx=u.hoverX, hy=u.hoverY;
    let px,py,scale,alpha=1;
    if(p<0.34){ const k=(p-0.10)/0.24; const e=k*k*(3-2*k);  // 작은 빛 → 접근
      px=enterX+(hx-enterX)*e; py=(hy-0.06)+(hy-(hy-0.06))*e; scale=0.22+0.5*e; }
    else if(p<0.55){ const k=(p-0.34)/0.21; const e=k*k*(3-2*k);
      px=hx; py=hy-0.02+0.02*e; scale=0.72+0.28*e; }
    else if(p<0.74){ px=hx; py=hy+Math.sin((p-0.55)*26)*0.004; scale=1.0; }   // 정지 + 미세 부유
    else { const k=Math.min(1,(p-0.74)/0.16); const e=k*k;
      px=hx+(exitX-hx)*e; py=hy-0.05*e; scale=1.0-0.45*e; alpha=1-0.85*e; }
    const X=px*W, Y=py*H, S=Math.min(W,H)/300*scale;
    // 탐색광 (정지 구간에서만, 지면을 부드럽게 훑음) — 공포 아닌 호기심의 빛
    if(p>0.55&&p<0.76){
      const k=(p-0.55)/0.21, sweep=Math.sin(k*Math.PI*1.4)*W*0.13;
      const beamA=Math.sin(Math.min(1,k*1.6)*Math.PI)*0.22;
      if(beamA>0.01){
        const gy=H*0.80, bx=X+sweep;
        const bg=cx.createLinearGradient(X,Y+S*10,bx,gy);
        bg.addColorStop(0,'rgba(196,230,255,'+(beamA).toFixed(3)+')');
        bg.addColorStop(1,'rgba(150,200,255,0)');
        cx.fillStyle=bg; cx.beginPath(); cx.moveTo(X-S*12,Y+S*8); cx.lineTo(X+S*12,Y+S*8);
        cx.lineTo(bx+S*30,gy); cx.lineTo(bx-S*30,gy); cx.closePath(); cx.fill();
        cx.fillStyle='rgba(190,225,255,'+(beamA*0.5).toFixed(3)+')';   // 지면 광점
        cx.beginPath(); cx.ellipse(bx,gy,S*30,S*5,0,0,6.283); cx.fill();
      }
    }
    // 본체 — 단순 렌즈형 실루엣 + 은은한 광. 특정 IP 형태 아님.
    const glow=cx.createRadialGradient(X,Y,0,X,Y,S*26);
    glow.addColorStop(0,'rgba(200,232,255,'+(0.30*alpha).toFixed(3)+')');
    glow.addColorStop(1,'rgba(160,200,255,0)');
    cx.fillStyle=glow; cx.beginPath(); cx.arc(X,Y,S*26,0,6.283); cx.fill();
    cx.fillStyle='rgba(214,238,255,'+(0.92*alpha).toFixed(3)+')';      // 멀 땐 그냥 작은 빛
    cx.beginPath(); cx.arc(X,Y,Math.max(1.1,S*1.8),0,6.283); cx.fill();
    if(scale>0.55){
      cx.fillStyle='rgba(24,32,44,'+(0.92*alpha).toFixed(3)+')';       // 동체
      cx.beginPath(); cx.ellipse(X,Y,S*13,S*3.6,0,0,6.283); cx.fill();
      cx.fillStyle='rgba(38,52,70,'+(0.9*alpha).toFixed(3)+')';        // 돔
      cx.beginPath(); cx.ellipse(X,Y-S*2.6,S*6,S*3.0,0,Math.PI,0); cx.fill();
      for(let i=0;i<5;i++){                                            // 하단 순환 등
        const ph=(Date.now()/560+i*0.2)%1, lx=X-S*9+i*S*4.5;
        const la=(0.30+0.55*Math.abs(Math.sin(ph*Math.PI)))*alpha;
        cx.fillStyle='rgba(255,226,170,'+la.toFixed(3)+')';
        cx.beginPath(); cx.arc(lx,Y+S*3.2,S*0.9,0,6.283); cx.fill();
      }
    }
    let black=0;
    if(p<0.05) black=1-(p/0.05); else if(p>0.93) black=(p-0.93)/0.07;
    if(black>0){ cx.fillStyle='rgba(0,0,0,'+black.toFixed(3)+')'; cx.fillRect(0,0,W,H); }
  },

  /* ── 사운드 분기 (BUILD 410-D/E) ──────────────────────────────────
     기존 Sound.ctx 재사용(새 AudioContext 생성 금지). iOS unlock 전이면
     _ready()가 false → 예약 안 하고 그냥 리턴(화면은 계속 진행).
     중복 방지 키는 eventInstanceId+cue 로 분리 → 고질라 키와 섞이지 않음. */
  scheduleEventSound(active){
    const id=active&&active.eventId;
    if(id==='meteor-shower') this.scheduleMeteorSound(active);
    else if(id==='ufo') this.scheduleUfoSound(active);
    else this.scheduleGodzillaSound(active);
  },
  _sndCtx(){
    const Sd=(typeof Sound!=='undefined')?Sound:null;
    if(!Sd || !Sd.on || !Sd._ready()) return null;
    return Sd.ctx||null;
  },
  // 유성우 — 조용한 반짝임/공기감. 고질라 쿵 재사용 금지. 5회, 지난 cue는 생략.
  scheduleMeteorSound(active){
    const key=active.eventInstanceId+'|meteor';
    if(this.scheduledSoundKeys.has(key)) return;
    const ctxA=this._sndCtx(); if(!ctxA) return;
    const dur=(active.endsAt-active.startedAt)/1000;
    const CUES=[0.30,0.42,0.55,0.66,0.78];
    const elapsed=(Date.now()-active.startedAt)/1000;
    const seed=this._hash(active.eventInstanceId);
    CUES.forEach((frac,i)=>{
      const rel=dur*frac-elapsed; if(rel<-0.05) return;         // 이미 지난 반짝임은 재생 안 함
      const t=ctxA.currentTime+Math.max(0,rel);
      const f=1100+this._rnd(seed,i+31)*700;                    // 1100~1800Hz
      const len=0.08+this._rnd(seed,i+41)*0.10;                 // 0.08~0.18s
      const vol=0.04+this._rnd(seed,i+51)*0.08;                 // 0.04~0.12
      const o=ctxA.createOscillator(), g=ctxA.createGain();
      o.type='triangle'; o.frequency.setValueAtTime(f,t);
      o.frequency.exponentialRampToValueAtTime(f*0.62,t+len);
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001,t+len);
      o.connect(g); g.connect(ctxA.destination); o.start(t); o.stop(t+len+0.02);
    });
    this.scheduledSoundKeys.add(key);
  },
  // UFO — 낮고 조용한 전자음 1회(호버 구간에 얕은 비트). 공포 아님.
  scheduleUfoSound(active){
    const key=active.eventInstanceId+'|ufo';
    if(this.scheduledSoundKeys.has(key)) return;
    const ctxA=this._sndCtx(); if(!ctxA) return;
    const dur=(active.endsAt-active.startedAt)/1000;
    const startFrac=0.12, endFrac=0.86;
    const elapsed=(Date.now()-active.startedAt)/1000;
    const relStart=dur*startFrac-elapsed, relEnd=dur*endFrac-elapsed;
    if(relEnd<=0.05){ this.scheduledSoundKeys.add(key); return; }   // 이미 다 지나감
    const t0=ctxA.currentTime+Math.max(0,relStart);
    const t1=ctxA.currentTime+Math.max(0.1,relEnd);
    const o=ctxA.createOscillator(), o2=ctxA.createOscillator(), g=ctxA.createGain();
    o.type='sine'; o.frequency.setValueAtTime(132,t0);
    o.frequency.linearRampToValueAtTime(178,t0+(t1-t0)*0.55);
    o.frequency.linearRampToValueAtTime(120,t1);
    o2.type='sine'; o2.frequency.setValueAtTime(133.6,t0);          // 얕은 비트(맥놀이)
    o2.frequency.linearRampToValueAtTime(121.2,t1);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(0.10,t0+0.5);
    g.gain.setValueAtTime(0.10,Math.max(t0+0.5,t1-0.8));
    g.gain.exponentialRampToValueAtTime(0.0001,t1);
    o.connect(g); o2.connect(g); g.connect(ctxA.destination);
    o.start(t0); o2.start(t0); o.stop(t1+0.05); o2.stop(t1+0.05);
    this.scheduledSoundKeys.add(key);
  },

  // 저주파 쿵 3회 — 410-C 로직 그대로 (성공 후 기록, startedAt 기준 절대시각, 지난 쿵 생략)
  scheduleGodzillaSound(active){
    if(this.scheduledInstanceId===active.eventInstanceId) return;
    const Sd=(typeof Sound!=='undefined')?Sound:null;
    if(!Sd || !Sd.on || !Sd._ready()) return;
    const ctxA=Sd.ctx; if(!ctxA) return;
    const OFF=[0.0,1.2,2.4]; const elapsed=(Date.now()-active.startedAt)/1000;
    for(const off of OFF){ const rel=off-elapsed; if(rel<-0.05) continue;
      const t=ctxA.currentTime+Math.max(0,rel);
      const o=ctxA.createOscillator(), g=ctxA.createGain();
      o.type='sine'; o.frequency.setValueAtTime(72,t); o.frequency.exponentialRampToValueAtTime(48,t+0.3);
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.32,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.4);
      o.connect(g); g.connect(ctxA.destination); o.start(t); o.stop(t+0.42); }
    this.scheduledInstanceId=active.eventInstanceId;
  },
  _maybeLog(active){
    if(this.loggedInstanceIds.has(active.eventInstanceId)) return;
    this.loggedInstanceIds.add(active.eventInstanceId);
    const def=(typeof WORLD_EVENT_DEFS!=='undefined')?WORLD_EVENT_DEFS[active.eventId]:null;
    const lines=(def&&def.journalLines)||['오늘, 하늘에 무슨 일이 있었다.'];
    const idx=((active.sequence||0)>>>0)%lines.length;
    if(typeof pushMsg==='function') pushMsg('diary','🌑 '+lines[idx],null);
  },
  _finish(active){ this._maybeLog(active); },
};

/* =====================================================================
   BUILD 425-A — 엽서(Postcard) 합성기
   Threads 발행용 4:5(1080×1350) 엽서를 전용 캔버스로 합성한다. 화면 캡처가 아니다:
   장면(위 55.6%, 별이 중심 216px 크롭 ×5 픽셀 보존) + 관찰일기(아래 44.4%)를 직접 그린다.
   호출자는 Ops 콘솔(same-origin /live iframe)뿐. 사용자 화면 레이아웃은 건드리지 않으며
   개인 데이터(Observer Code·Recovery Key)는 어떤 경로로도 그리지 않는다.
   정본: docs/BUILD_425_THREADS_CAPTURE_AND_REPLY.md §3
   ===================================================================== */
window.__postcard = { compose: composePostcard };
/* 별이 줄에서 별이의 말만 꺼낸다 — .sub(지속시간)과 .ppaeSide(빼콩 말)는 제거.
   빼콩 문장이 별이 엽서에 섞이면 별이가 안 본 것을 봤다고 말하게 된다 (427 하드룰). */
function pcOwnText(n){
  let text=n.textContent;
  const sub=n.querySelector('.sub');   if(sub)  text=text.replace(sub.textContent,'');
  const side=n.querySelector('.ppaeSide'); if(side) text=text.replace(side.textContent,'');
  return text.trim();
}
function pcCollectLines(targetLabel){
  const nodes=[...document.querySelectorAll('#stream .msg')];   // [0]=최신
  const seen=new Set(); const rel=[]; const rest=[];
  for(const n of nodes){
    if(!/\b(act|diary|rare)\b/.test(n.className)) continue;     // pass('그냥 지나침')·day 제외
    const text=pcOwnText(n);
    if(!text || seen.has(text)) continue;
    seen.add(text);
    (targetLabel && text.includes(targetLabel) ? rel : rest).push(text);
    if(rel.length+rest.length>=14) break;
  }
  return rel.concat(rest).slice(0,6);
}
function composePostcard(opts){
  opts=opts||{};
  const CW=1080, CH=1350, SCENE_H=750, SW=216;                  // 216×150 → ×5 = 1080×750
  const acting = byeoli.state==='acting' && byeoli.actAction;
  const tProp = byeoli.actTarget ? (props||[]).find(p=>p.id===byeoli.actTarget) : null;
  // 최근 act 줄에서 대상 라벨·지속시간 (화면과 같은 표기 유지)
  const lastAct=document.querySelector('#stream .msg.act');
  let targetLabel=null, dur=null;
  if(lastAct){
    const s=lastAct.querySelector('.sub'); dur=s?s.textContent.trim():null;
    const t=pcOwnText(lastAct);   // .sub·.ppaeSide 제거 — 빼콩 말이 라벨을 오염하지 않게
    const i=t.lastIndexOf('· '); if(i>=0) targetLabel=t.slice(i+2).trim();
  }
  const lines=pcCollectLines(targetLabel);
  if(lines.length<3 && !opts.force) return Promise.resolve(null);  // 좋은 순간이 아니면 찍지 않는다
  if(!lines.length) return Promise.resolve(null);
  const c=document.createElement('canvas'); c.width=CW; c.height=CH;
  const g=c.getContext('2d');
  // ── 장면: 별이가 가로 40% 지점에 오는 크롭, 픽셀아트 보존 ──
  const sx=Math.max(0, Math.min(W-SW, Math.round(byeoli.screenX-86)));
  g.imageSmoothingEnabled=false;
  g.drawImage(cv, sx,0,SW,H, 0,0,CW,SCENE_H);
  // ── 일기 패널 (앱 팔레트 그대로) ──
  g.fillStyle='#12160f'; g.fillRect(0,SCENE_H,CW,CH-SCENE_H);
  g.fillStyle='#2b352a'; g.fillRect(0,SCENE_H,CW,2);
  const FONT='ui-monospace,"SFMono-Regular",Menlo,monospace';
  let y=SCENE_H+88;
  for(const line of lines){
    g.font='34px '+FONT; g.fillStyle='#e7dcc4';
    const chunks=[]; let s=line;
    while(s.length>0 && chunks.length<2){ chunks.push(s.slice(0,30)); s=s.slice(30); }
    if(s.length>0) chunks[chunks.length-1]=chunks[chunks.length-1].slice(0,-1)+'…';
    for(const chunk of chunks){ g.fillText(chunk,64,y); y+=52; }
    y+=16;
    if(y>CH-130) break;
  }
  // ── 서명줄: "궁금 · 나무 버섯 · 2.7초" ──
  const sig=[acting?actKo(byeoli.actAction):null, targetLabel, dur].filter(Boolean).join(' · ');
  g.font='30px '+FONT;
  if(sig){ g.fillStyle='#A7B49A'; g.fillText(sig,64,CH-64); }
  g.fillStyle='#5d6a5f'; g.textAlign='right';
  g.font='24px '+FONT; g.fillText('별이 산책 · byeoli.sapmanri.com',CW-64,CH-64); // 엽서가 어디서 왔는지 — 공유의 귀환 주소
  g.textAlign='left';
  const meta={
    capturedAt:Date.now(),
    zonePct: worldLen ? Math.round(byeoli.worldX/worldLen*1000)/10 : null,
    skyPhase:sky.phase, weather:sky.weather,
    byeoliAction: acting ? byeoli.actAction : (byeoli.state||null),
    targetId: byeoli.actTarget||null,
    targetType: tProp ? tProp.type : null,
    targetLabel: targetLabel,
    diaryLines: lines,
  };
  return new Promise(res=>c.toBlob(b=>res(b?{blob:b,meta}:null),'image/jpeg',0.92));
}

/* =====================================================================
   BUILD 426 — 별이의 사진첩 (로컬 앨범 + 공유)
   별이가 '사진' 행동을 마칠 때마다 그 장면의 엽서가 이 브라우저의 IndexedDB에
   쌓인다. 서버 전송 없음 — 전부 관찰자의 것. 공유는 Web Share(이미지)로,
   엽서에는 코드·키·개인 데이터가 그려지지 않는다 (composePostcard 계약).
   ===================================================================== */
const Album={
  DBNAME:'byeoli-album', STORE:'shots', MAX:30, _db:null,
  open(){ return new Promise((res,rej)=>{
    if(this._db) return res(this._db);
    const rq=indexedDB.open(this.DBNAME,1);
    rq.onupgradeneeded=()=>{ rq.result.createObjectStore(this.STORE,{keyPath:'id'}); };
    rq.onsuccess=()=>{ this._db=rq.result; res(this._db); };
    rq.onerror=()=>rej(rq.error);
  }); },
  async add(shot){
    const db=await this.open();
    await new Promise((res,rej)=>{
      const tx=db.transaction(this.STORE,'readwrite');
      tx.objectStore(this.STORE).put(shot);
      tx.oncomplete=res; tx.onerror=()=>rej(tx.error);
    });
    const all=await this.list();
    for(const s of all.slice(this.MAX)) await this.remove(s.id);   // 오래된 것부터 흘려보냄
  },
  async list(){
    const db=await this.open();
    return new Promise((res,rej)=>{
      const rq=db.transaction(this.STORE,'readonly').objectStore(this.STORE).getAll();
      rq.onsuccess=()=>res((rq.result||[]).sort((a,b)=>b.at-a.at));
      rq.onerror=()=>rej(rq.error);
    });
  },
  async remove(id){
    const db=await this.open();
    return new Promise((res,rej)=>{
      const tx=db.transaction(this.STORE,'readwrite');
      tx.objectStore(this.STORE).delete(id);
      tx.oncomplete=res; tx.onerror=()=>rej(tx.error);
    });
  },
};
