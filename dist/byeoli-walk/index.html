const IdleFade={
  els:[], t:null, DELAY:6000,
  init(){
    this.els=[document.querySelector('.ctrls'), document.getElementById('obsDock')].filter(Boolean);
    for(const el of this.els) el.style.transition='opacity .6s';
    const wake=()=>this.wake();
    for(const ev of ['pointerdown','pointermove','keydown','touchstart'])
      window.addEventListener(ev,wake,{passive:true});
    this.wake();
  },
  wake(){
    for(const el of this.els) el.style.opacity='1';
    if(this.t) clearTimeout(this.t);
    this.t=setTimeout(()=>{ for(const el of this.els) el.style.opacity='0.14'; }, this.DELAY);
  },
};
try{ IdleFade.init(); }catch(e){}

// Sandbox 전용 테스트 훅: /byeoli-walk/?event=godzilla|meteor-shower|ufo[&eventOffset=초]
// ⚠ Production Live(mode==='live')에서는 query가 Authority보다 우선하면 안 되므로 무시.
let SANDBOX_EVENT_DEBUG=false;
try{
  const qs=new URLSearchParams(location.search);
  const q=qs.get('event');
  if(q && WORLD_EVENT_DEFS[q] && stateProvider.mode!=='live'){ SANDBOX_EVENT_DEBUG=true;
    const dur=(WORLD_EVENT_DEFS[q].durationSeconds||12)*1000;   // 이벤트별 길이 (DEFS = TS 레지스트리와 동일)
    const off=Math.max(0, Math.min(dur/1000-0.1, parseFloat(qs.get('eventOffset')||'0')))*1000;
    const started=Date.now()-off;                     // eventOffset초 진행 지점부터
    WorldEventPlayer.start({ eventId:q, eventInstanceId:'sandbox-'+q+'-'+started,
      startedAt:started, endsAt:started+dur, sequence:1, payload:{dir:1} });
  }
}catch(e){}

function render(state){
  AMB.t=performance.now();   // BUILD 410-A: ambient 시간축 (state 불변, 시각 효과 전용)
  drawBackground(state.sky, state.camera);
  const camShift=state.camera.camShift;
  for(const p of state.props){ const sx=p.x-camShift; if(sx>-30&&sx<W+30) drawProp(p,sx); }
  drawPpae(state.ppae);
  drawByeoli(state.byeoli);
  // BUILD 414-A: foreground는 캐릭터보다 앞(깊이감). 화면 최하단·최대 4px·낮은 대비라
  // 별/빼콩이/props의 식별을 방해하지 않는다.
  drawForegroundLayer(state.sky, state.camera);
  drawWeather(state.sky);
  drawFlash(state.flash);
}
// 빼콩이 — 흰 고양이 도트
function drawPpaePixel(ppae){
  const x=Math.round(ppae.x), y=Math.round(ppae.y), f=ppae.facing;
  const bounce=ppae.mode==='dash'?Math.round(Math.sin(ppae.phase)*1.5):Math.round(Math.abs(Math.sin(ppae.phase))*1);
  const yy=y-bounce;
  // 그림자
  ctx.fillStyle='rgba(20,30,24,.2)'; ctx.fillRect(x-6,y-1,13,2);
  const c='#ecebe6', cs='#d6d4cc';   // 흰색 몸/그늘
  // 몸
  px(x-6,yy-6,12,6,c);
  // 머리 (진행방향)
  const hx = f>0 ? x+4 : x-10;
  px(hx,yy-9,7,6,c);
  px(hx+ (f>0?4:0),yy-11,2,3,c); px(hx+(f>0?0:4),yy-11,2,3,c); // 귀 두 개
  // 눈
  px(hx+(f>0?4:1),yy-7,1,1,'#8fbf6f');
  // 꼬리 (반대쪽, 위로 살랑)
  const tx = f>0 ? x-7 : x+6;
  const tphase=Math.sin(ppae.phase*0.7)*2;
  px(tx,yy-8-Math.abs(tphase),2,6,c);
  // 다리 (움직임)
  const legF=Math.floor(ppae.phase)%2;
  if(ppae.mode!=='idle'){
    px(x-4,yy,2,2,cs); px(x+3,yy,2,2,cs);
    if(legF) px(x-5,yy,2,1,cs); else px(x+4,yy,2,1,cs);
  } else { px(x-4,yy,2,2,cs); px(x+3,yy,2,2,cs); }
}
/* 토온 빼콩 — 흰 몸·빨간 목걸이·호박색 안경(렌즈 속에 눈). 진행방향은 미러링. */
function drawPpaeToon(ppae){
  const x=Math.round(ppae.x), y=Math.round(ppae.y), f=ppae.facing;
  const bounce=ppae.mode==='dash'?Math.round(Math.sin(ppae.phase)*1.5):Math.round(Math.abs(Math.sin(ppae.phase))*1);
  const yy=y-bounce;
  ctx.fillStyle='rgba(20,30,24,.2)'; ctx.fillRect(x-6,y-1,13,2);
  ctx.save(); ctx.translate(x,0); if(f<0) ctx.scale(-1,1);
  const tsw=Math.abs(Math.sin(ppae.phase*0.7))*1.5;
  toonRR(-8.5,yy-11.5-tsw,2.2,7,1.1,TOON.cat);
  const legF=Math.floor(ppae.phase)%2, move=ppae.mode!=='idle';
  toonRR(-4.5+(move&&legF?-0.8:0),yy-2.2,2.4,2.6,1,TOON.catShade);
  toonRR(2.2+(move&&!legF?0.8:0),yy-2.2,2.4,2.6,1,TOON.catShade);
  toonRR(-7,yy-8.2,13.5,6.6,3.2,TOON.cat);
  ctx.strokeStyle=TOON.line; ctx.lineWidth=1; ctx.fillStyle=TOON.cat;
  ctx.beginPath(); ctx.moveTo(3.2,yy-12.6); ctx.lineTo(4.2,yy-15.8); ctx.lineTo(6.4,yy-12.9); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(7.0,yy-13); ctx.lineTo(9.2,yy-15.6); ctx.lineTo(9.8,yy-12.3); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#f4b8c0';
  ctx.beginPath(); ctx.moveTo(4.1,yy-13.2); ctx.lineTo(4.6,yy-14.8); ctx.lineTo(5.8,yy-13.3); ctx.closePath(); ctx.fill();
  toonEll(6.4,yy-9.8,4.6,4.1,TOON.cat);
  toonRR(1.2,yy-5.6,6,1.4,0.7,TOON.collar);
  ctx.beginPath(); ctx.arc(4.9,yy-10.2,1.25,0,Math.PI*2);
  ctx.fillStyle=TOON.lens; ctx.fill(); ctx.strokeStyle=TOON.line; ctx.lineWidth=0.6; ctx.stroke();
  ctx.beginPath(); ctx.arc(7.9,yy-10.2,1.25,0,Math.PI*2);
  ctx.fillStyle=TOON.lens; ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6.15,yy-10.2); ctx.lineTo(6.65,yy-10.2); ctx.stroke();
  ctx.fillStyle=TOON.line;
  ctx.beginPath(); ctx.arc(4.9,yy-10.2,0.45,0,Math.PI*2); ctx.arc(7.9,yy-10.2,0.45,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#e08a8a'; ctx.fillRect(6.9,yy-7.8,1.1,0.8);
  ctx.restore();
}
/* soft 빼콩 — 낮고 둥근 식빵 자세, 코는 바닥 쪽, 안경은 호박색 점 2개 */
const SOFT_CAT_PAL={ o:'#33291f', w:'#f2f0ea', d:'#cfccc2', r:'#c94b3f', g:'#e8b23c', n:'#33291f' };
const SOFT_CAT_MAP=[
  '......o.o..',
  '.ooooooooo.',
  'owwwwrwwwwo',
  'owwwwrwgwgo',
  'owwwwrwwwwo',
  '.owwwwwwwno',
];
function drawPpaeSoft(ppae){
  const x=Math.round(ppae.x), y=Math.round(ppae.y), f=ppae.facing;
  const bounce=ppae.mode==='dash'?Math.round(Math.sin(ppae.phase)*1.5):Math.round(Math.abs(Math.sin(ppae.phase))*1);
  const yy=y-bounce;
  ctx.fillStyle='rgba(20,30,24,.2)'; ctx.fillRect(x-6,y-1,12,2);
  const ox=x-5, flip=f<0;
  drawMap(SOFT_CAT_MAP,SOFT_CAT_PAL,ox,yy-10,flip);
  // 다리는 몸통과 같은 흰색 (고양이는 반바지를 입지 않는다 — Vase 정정)
  const legF=Math.floor(ppae.phase)%2, move=ppae.mode!=='idle';
  px(ox+2+(move&&legF?-1:0),yy-4,2,4,SOFT_CAT_PAL.w);
  px(ox+7+(move&&!legF?1:0),yy-4,2,4,SOFT_CAT_PAL.w);
  // 428-D: watch("가만.")일 땐 꼬리도 멈춘다
  const frozen=ppae.pauseT>0 && ppae.pauseAct==='watch';
  const tsw=frozen? 1 : Math.round(Math.abs(Math.sin(ppae.phase*0.7))*2);
  const tx=flip? ox+11 : ox-1;
  px(tx,yy-9-tsw,1,4,SOFT_CAT_PAL.o);
  // 가끔 귀 쫑긋 — 살아있는 작은 신호
  if(Math.sin(AMB.t*0.0006+3)>0.99){ const ec=flip? 4 : 6; px(ox+ec,yy-11,1,1,SOFT_CAT_PAL.o); }
  // 428/428-D: 멈춤의 방식 — 킁킁(코 실룩) · 앞발 툭 · 가만히
  if(ppae.pauseT>0){
    const a=ppae.pauseAct;
    if(a==='pickup'||a==='interest'){
      px(ox+(flip?1:9),yy-5,1,1,SOFT_CAT_PAL.n);
      px(ox+(flip?-1:11),yy-2,2,2,SOFT_CAT_PAL.w);   // 앞발을 뻗어 툭 건드린다
    } else if(a==='watch'){
      px(ox+(flip?1:9),yy-5,1,1,SOFT_CAT_PAL.n);      // 가만히 — 코만 낮게, 아무 움직임 없음
    } else {
      px(ox+(flip?1:9),yy-5+(Math.sin(AMB.t*0.02)>0?0:1),1,1,SOFT_CAT_PAL.n);  // 킁킁 실룩
    }
  }
}
function drawPpae(p){
  if(CHAR_STYLE==='toon') drawPpaeToon(p);
  else if(CHAR_STYLE==='soft') drawPpaeSoft(p);
  else drawPpaePixel(p);
}


/* =====================================================================
   LOOP
   ===================================================================== */
const FPS=14, FRAME=1000/FPS;
function loop(t){
  if(!lastT)lastT=t; let dt=t-lastT; lastT=t;
  if(dt>200)dt=FRAME;
  if(!paused){
    acc+=dt;
    while(acc>=FRAME){ for(let s=0;s<speedMul;s++) stateProvider.step(FRAME/1000); acc-=FRAME; }
    // provider가 만든/받은 완결 스냅샷만 렌더로 넘긴다. 전역 주입 없음.
    const state = stateProvider.getCurrentByeoliState();
    if(state) render(state);
    renderDrives(); renderTaste();   // Observatory/sandbox UI — 캔버스 렌더 경로와 분리 (live: TODO authority telemetry)
    // 413-A: 누적 관찰시간은 저빈도로만 갱신 (게임 루프·렌더 경로에 영향 없음)
    PR.tick();
  }
  requestAnimationFrame(loop);
}

/* ---- 캔버스 해상도: 폰 폭에 맞춰 게임 높이 결정 ---- */
function fitCanvas(){
  // 게임 영역은 화면의 약 42%만 차지 (나머지는 상태바+스트림)
  const appW=Math.min(520,window.innerWidth);
  const scale=appW/W;
  cv.style.height=(H*scale)+'px';
}
window.addEventListener('resize',fitCanvas);

function boot(){
  rng=makeRNG(SEED);
  bgInitDebug();          // BUILD 414-A: 배경 시드/디버그 query 반영 (reseed에도 대응)
  BG._key=null;           // 조합 캐시 무효화 → 새 seed로 다시 고름
  brain.drive={observe:.30,rest:.22,record:.26,wonder:.34}; brain.fatigue=.05;
  byeoli.worldX=0; byeoli.state='walk'; byeoli.speed=byeoli.baseSpeed;
  walkClock=0; lastDiaryAt=-999; loopCount=0;
  habitEngine.reset();
  tally.memories=0; tally.diary=0; archive.length=0;   // 세션 카운터만 초기화
  // 413-A: Profile(개인 기록)은 여기서 절대 건드리지 않는다.
  // boot()은 새로고침·복귀마다 실행되므로, 지우면 관찰자의 누적 기록이 사라진다.
  seenKindsToday.clear(); currentTarget=null;
  streamEl.innerHTML='';
  buildWorld(); sky.reset(); ppae.reset(); Sound.stopWeather(); updateDayTag(); updateTally(); fitCanvas();
  pushMsg('day', `— ${formatByeoliDate()} · 산책 시작 —`, null);
}
document.getElementById('pauseBtn').onclick=e=>{ paused=!paused; e.target.textContent=paused?'▶':'⏸'; };
document.getElementById('speedBtn').onclick=e=>{ speedMul = speedMul===1?2:speedMul===2?4:1; e.target.textContent=speedMul+'×'; };
document.getElementById('soundBtn').onclick=e=>{
  Sound.on=!Sound.on;
  if(Sound.on){
    Sound.wake();                        // 켤 때만 제스처 안에서 3중 자물쇠 (iOS 필수)
    if(sky.weather==='rain') Sound.startWeather('rain');
  } else {
    Sound.sleep();                       // 끌 때: 무음 루프+날씨 루프 정지 → 확실히 조용
  }
  e.target.textContent=Sound.on?'🔊':'🔇';
};
// 첫 사용자 제스처에서 오디오 잠금 해제 (touchend/click/pointerup이 진짜 열쇠 + visibility 복구)
Sound.installGestureUnlock();
document.getElementById('reseedBtn').onclick=()=>{ SEED=(Math.random()*1e9)|0; boot(); };

/* =====================================================================
   탭 복귀 처리 (BUILD 405-E 연출)
   - 별이력·Habit 감쇠는 절대시간(Date.now)이라 탭 상태와 무관하게 이미 흘렀다.
   - 여기서는 '며칠 흘렀는지' 연출과 하늘/화면 재동기화만 한다.
   - ⚠ 백그라운드 동안의 행동·Memory는 소급 생성하지 않는다(시간만 흐르고 삶은 멈춰 있었다).
   ===================================================================== */
let awayEpoch=byeoliDayEpoch();       // 탭을 떠날 때의 별이력 일수
document.addEventListener('visibilitychange', ()=>{
  if(document.hidden){
    awayEpoch=byeoliDayEpoch();        // 떠나는 순간 기록
  } else {
    const now=byeoliDayEpoch();
    const daysPassed=now-awayEpoch;
    // rAF가 멈춰있던 시간을 dt로 잘못 소비하지 않도록 시계 리셋
    lastT=0; acc=0;
    // 하늘·날씨·날짜 즉시 재동기화 (절대시간 기준으로 다시 그림)
    sky.t=skyProgressNow();
    sky.phase = sky.t<0.15?'dawn' : sky.t<0.5?'day' : sky.t<0.62?'dusk' : 'night';
    updateDayTag();
    // 복귀 즉시 1프레임 다시 그림 (provider 스냅샷 기준)
    const state = stateProvider.getCurrentByeoliState();
    if(state) render(state);
    renderDrives(); renderTaste();
    // 복귀 연출: 별이력으로 며칠 흘렀으면 알려준다 (Memory는 안 만듦)
    if(daysPassed>=1){
      pushMsg('day', `— ${formatByeoliDate()} · 그새 ${daysPassed}일이 흘렀다 —`, null);
      if(daysPassed>=3) pushMsg('diary', `🌙 오랜만이다. 별이는 그동안 조용히 지냈다`, null);
    }
  }
});
boot();
requestAnimationFrame(loop);
