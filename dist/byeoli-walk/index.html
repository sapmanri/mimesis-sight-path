<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>별이 — 함께 걷는 작은 산책</title>
<!-- BUILD 421-B: 공개 메타데이터. 정본 주소는 https://byeoli.sapmanri.com/ (host-rewrite로 루트 제공).
     자산은 /byeoli-walk/assets/brand/ 실경로를 절대경로로 참조 — 두 호스트 모두에서 동일하게 해석된다. -->
<meta name="description" content="별이와 천천히 걸어보세요. 작은 발견과 취향이 조금씩 쌓입니다.">
<link rel="canonical" href="https://byeoli.sapmanri.com/">
<meta property="og:type" content="website">
<meta property="og:site_name" content="별이">
<meta property="og:title" content="별이 — 함께 걷는 작은 산책">
<meta property="og:description" content="별이는 당신이 오래 바라본 풍경을 기억합니다.">
<meta property="og:url" content="https://byeoli.sapmanri.com/">
<meta property="og:image" content="https://byeoli.sapmanri.com/byeoli-walk/assets/brand/og-byeoli-1200x630.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="ko_KR">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="별이 — 함께 걷는 작은 산책">
<meta name="twitter:description" content="별이는 당신이 오래 바라본 풍경을 기억합니다.">
<meta name="twitter:image" content="https://byeoli.sapmanri.com/byeoli-walk/assets/brand/og-byeoli-1200x630.png">
<meta name="theme-color" content="#12171c">
<meta name="apple-mobile-web-app-title" content="별이">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="/byeoli-walk/assets/brand/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/byeoli-walk/assets/brand/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/byeoli-walk/assets/brand/favicon-16x16.png">
<link rel="apple-touch-icon" href="/byeoli-walk/assets/brand/apple-touch-icon.png">
<link rel="manifest" href="/byeoli-walk/manifest.webmanifest">
<style>
  /* ---- MIMESIS pixel palette ---- */
  :root{
    --forest:#355743; --sage:#A7B49A; --beige:#F4F0E7;
    --sky:#dfe7d8; --ground:#3f5a45; --ink:#e6ede4;
    --panel:#12160f; --line:#2b352a; --dim:#5d6a5f;
    --amber:#d98a4a; --petal:#e0748a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0c0f0a;color:var(--ink);
    font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
    -webkit-font-smoothing:none; overflow:hidden;}
  /* 폰 한 화면: 세로로 게임 → 상태바 → 스트림, 전체 100dvh 안에 */
  #app{height:100dvh;max-width:520px;margin:0 auto;display:flex;flex-direction:column;
    background:#0c0f0a;}

  /* ---- 게임 ---- */
  .game-wrap{position:relative;width:100%;flex:0 0 auto;background:var(--sky);}
  canvas#game{image-rendering:pixelated;display:block;width:100%;height:auto;}
  .titlebar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;
    align-items:center;padding:5px 8px;font-size:10px;letter-spacing:.1em;
    color:rgba(255,255,255,.75);text-shadow:0 1px 0 rgba(0,0,0,.3);pointer-events:none;}
  .titlebar b{color:#fff}
  .ctrls{position:absolute;top:3px;right:6px;display:flex;gap:4px;pointer-events:auto;}
  .ctrls button{font:inherit;font-size:10px;background:rgba(18,22,15,.7);color:var(--ink);
    border:1px solid var(--line);padding:3px 7px;cursor:pointer;}
  .ctrls button:active{background:var(--forest)}

  /* ---- Drive 상태바 (항상 보임, 늘고 주는 재미) ---- */
  .drives{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
    padding:7px 9px;background:var(--panel);border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
  .dcell{font-size:9px;color:var(--dim);letter-spacing:.04em}
  .dcell .dl{display:flex;justify-content:space-between;margin-bottom:3px}
  .dcell .dv{color:var(--sage);font-variant-numeric:tabular-nums}
  .dtrack{height:6px;background:#080a07;border:1px solid var(--line);position:relative;overflow:hidden}
  .dfill{position:absolute;inset:0 auto 0 0;background:var(--sage);width:0;transition:width .15s linear}
  .dfill.win{background:var(--amber)}
  .fatline{padding:3px 9px 0;font-size:9px;color:var(--dim);display:flex;justify-content:space-between;background:var(--panel)}
  .fatline .fv{color:var(--petal)}

  /* ---- 별의 취향 (BUILD 405 Habit) ---- */
  .taste{padding:5px 9px 6px;background:var(--panel);cursor:pointer;-webkit-tap-highlight-color:transparent}
  .taste:hover .taste-more,.taste:focus-visible .taste-more{color:var(--sage)}
  .taste:focus-visible{outline:1px solid var(--sage);outline-offset:-1px}
  .taste-more{float:right;color:var(--dim);text-transform:none;letter-spacing:0;font-size:9px}

  /* ---- BUILD 413-A: 개인 기록 시트 ---- */
  #pr-panel{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:min(560px,calc(100% - 24px));max-height:min(86dvh,760px);display:flex;flex-direction:column;
    background:#12161a;border:1px solid #2a3138;border-radius:14px;overflow:hidden;
    box-shadow:0 18px 60px rgba(0,0,0,.55)}
  #pr-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
    padding:14px 14px 10px;border-bottom:1px solid #232a31}
  #pr-title{font-size:15px;font-weight:600;color:#e8e4d8;letter-spacing:.01em}
  #pr-sub{margin-top:3px;font-size:10px;color:var(--dim);letter-spacing:.04em}
  #pr-code{color:var(--sage);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.08em}
  #pr-copy{margin-left:6px;padding:1px 6px;font-size:9px;color:var(--dim);background:#1b2126;
    border:1px solid #2c343b;border-radius:4px;cursor:pointer}
  #pr-copy:active{background:#232b31}
  #pr-close{width:28px;height:28px;flex:0 0 28px;font-size:13px;color:var(--dim);background:#1b2126;
    border:1px solid #2c343b;border-radius:7px;cursor:pointer;line-height:1}
  #pr-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#232a31;
    border-bottom:1px solid #232a31}
  #pr-stats .s{background:#12161a;padding:8px 6px;text-align:center}
  #pr-stats .sv{font-size:14px;font-weight:600;color:#e8e4d8}
  #pr-stats .sl{margin-top:2px;font-size:9px;color:var(--dim);letter-spacing:.05em}
  #pr-listwrap{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;padding:8px 10px}
  .pr-row{padding:7px 8px;border-radius:8px;background:#151a1f;margin-bottom:5px}
  .pr-r1{display:flex;align-items:center;gap:6px;font-size:11px;color:#dcd8cc}
  .pr-em{font-size:13px}
  .pr-name{font-weight:600}
  .pr-cnt{margin-left:auto;color:var(--dim);font-size:9px}
  .pr-acts{margin-top:4px;display:flex;flex-wrap:wrap;gap:4px}
  .pr-act{font-size:9px;color:var(--dim);background:#1b2127;border:1px solid #262e35;
    border-radius:999px;padding:1px 6px}
  .pr-act b{color:var(--sage);font-weight:600}
  .pr-bar{margin-top:5px;height:3px;background:#222a30;border-radius:2px;overflow:hidden}
  .pr-fill{display:block;height:100%;background:var(--sage)}
  .pr-when{margin-top:4px;font-size:9px;color:#5d666e;letter-spacing:.02em}
  #pr-foot{display:flex;align-items:center;gap:8px;padding:10px 12px;border-top:1px solid #232a31}
  #pr-share{padding:7px 12px;font-size:11px;font-weight:600;color:#0d1114;background:var(--sage);
    border:0;border-radius:8px;cursor:pointer}
  #pr-share:disabled{opacity:.55;cursor:default}
  #pr-note{font-size:9px;color:var(--dim)}
  /* ---- BUILD 419-B: 관찰자 복구 UI ---- */
  #pr-backup{padding:7px 12px;font-size:11px;font-weight:600;color:var(--sage);background:transparent;
    border:1px solid var(--sage);border-radius:8px;cursor:pointer}
  #rc-foot{display:flex;justify-content:space-between;align-items:center;gap:8px;
    padding:0 12px 10px;font-size:9px;color:var(--dim)}
  #pr-bkbadge{font-size:9px;color:var(--dim)}
  #pr-bkbadge.warn{color:#c9a04a}
  #pr-restore-open,#pr-onboarding-open{background:none;border:0;padding:0;font-size:9px;color:var(--dim);
    text-decoration:underline;cursor:pointer}
  #rc-panel{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(420px,92vw);
    background:#12171c;border:1px solid #232a31;border-radius:14px;padding:18px 16px;color:#cfd6dc}
  #rc-panel h3{margin:0 0 10px;font-size:13px;color:var(--sage)}
  #rc-panel p{margin:6px 0;font-size:11px;line-height:1.7;color:#aab3ba}
  #rc-panel .rc-key{display:block;margin:10px 0;padding:10px;text-align:center;
    font:600 13px ui-monospace,Menlo,monospace;letter-spacing:.06em;background:#0d1114;
    border:1px dashed #3a464f;border-radius:8px;color:#e8e4d8;user-select:all;word-break:break-all}
  #rc-panel .rc-warn{color:#c9a04a}
  #rc-panel input{width:100%;box-sizing:border-box;margin:4px 0;padding:9px 10px;
    font:500 12px ui-monospace,Menlo,monospace;background:#0d1114;border:1px solid #2a333b;
    border-radius:8px;color:#e8e4d8;text-transform:uppercase}
  #rc-panel .rc-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  #rc-panel .rc-primary{padding:8px 12px;font-size:11px;font-weight:600;color:#0d1114;
    background:var(--sage);border:0;border-radius:8px;cursor:pointer}
  #rc-panel .rc-primary:disabled{opacity:.55;cursor:default}
  #rc-panel .rc-ghost{padding:8px 12px;font-size:11px;font-weight:600;color:var(--sage);
    background:transparent;border:1px solid var(--sage);border-radius:8px;cursor:pointer}
  #rc-panel .rc-note{font-size:10px;color:#c9a04a;min-height:14px;margin-top:8px}
  /* ---- BUILD 420-B: 온보딩 — rc 톤 그대로, 버튼 하나만 강조 ---- */
  #ob-sheet{opacity:0;transition:opacity .28s ease}
  #ob-sheet.ob-in{opacity:1}
  #ob-card{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(380px,88vw);
    max-height:86dvh;overflow-y:auto;box-sizing:border-box;
    background:rgba(18,23,28,.92);border:1px solid #232a31;border-radius:14px;
    padding:26px 22px;text-align:center;color:#cfd6dc}
  #ob-title{margin:0 0 14px;font-size:15px;font-weight:600;color:var(--sage);line-height:1.5}
  #ob-body{margin:0 0 20px;font-size:12px;line-height:1.9;color:#aab3ba}
  #ob-start{display:block;width:100%;padding:12px 0;font-size:13px;font-weight:600;
    color:#0d1114;background:var(--sage);border:0;border-radius:10px;cursor:pointer}
  #ob-sub{margin:14px 0 0;font-size:10px;line-height:1.7;color:var(--dim)}
  @media(max-width:480px){
    #ob-card{width:100%;left:0;top:auto;bottom:0;transform:none;border-radius:14px 14px 0 0;
      border-bottom:0;padding-bottom:calc(26px + env(safe-area-inset-bottom,0))}
  }
  #pr-empty{padding:22px 10px;text-align:center;font-size:11px;color:var(--dim);line-height:1.7}
  @media(max-width:480px){
    #pr-panel{width:100%;max-height:92dvh;left:0;top:auto;bottom:0;transform:none;
      border-radius:14px 14px 0 0;border-bottom:0;
      padding-bottom:env(safe-area-inset-bottom,0)}
    #rc-panel{width:100%;left:0;top:auto;bottom:0;transform:none;
      border-radius:14px 14px 0 0;border-bottom:0;
      padding-bottom:calc(18px + env(safe-area-inset-bottom,0))}
  }
  .taste-head{font-size:9px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;margin-bottom:4px;
    display:flex;justify-content:space-between}
  .taste-head #tasteHint{color:var(--sage);text-transform:none;letter-spacing:0}
  .trow{display:grid;grid-template-columns:auto 1fr auto;gap:6px;align-items:center;margin:3px 0;font-size:10px}
  .trow .tk{color:var(--ink)}
  .trow .tk .em{margin-right:3px}
  .ttrack{height:5px;background:#080a07;border:1px solid var(--line);position:relative;overflow:hidden}
  .tfill{position:absolute;inset:0 auto 0 0;background:linear-gradient(90deg,#6c8a72,#A7B49A);width:0;transition:width .3s ease}
  .tfill.decay{background:linear-gradient(90deg,#7a6f52,#b89a6a)}
  .trow .tb{color:var(--sage);font-variant-numeric:tabular-nums;font-size:9px}
  .trow .tmeta{grid-column:1/-1;font-size:8px;color:var(--dim);margin:-1px 0 2px 2px}

  /* ---- 스트림 (두뇌활동 + 일기 통합, 채팅 시절) ---- */
  .stream-head{padding:6px 9px 4px;background:var(--panel);font-size:9px;
    letter-spacing:.14em;color:var(--dim);text-transform:uppercase;
    display:flex;justify-content:space-between;border-top:1px solid var(--line);}
  .stream-head .tally{color:var(--sage)}
  /* 427-QC3: 빼콩 말은 별이 줄 '옆'에 얹힌다 — 별이 라인은 끊기지 않고,
     같은 eventId 짝은 같은 줄에서 만나 함께 흘러내린다 (연관성 유지, Vase 지시). */
  #stream{flex:1 1 auto;overflow:hidden;background:var(--panel);
    padding:2px 9px 10px;display:flex;flex-direction:column;gap:0;
    -webkit-mask-image:linear-gradient(to bottom,#000 62%,transparent 100%);
            mask-image:linear-gradient(to bottom,#000 62%,transparent 100%);}
  /* 최신이 위(맨 앞). 아래로 갈수록 mask로 희미 */
  .msg{font-size:12px;line-height:1.5;padding:2px 0;animation:pop .25s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .msg .em{margin-right:5px}
  .msg.act{color:var(--ink)}
  .msg.act .k{color:var(--sage)}
  .msg.pass{color:var(--dim)}
  .msg.diary{color:#e7dcc4}
  .msg.diary .k{color:var(--amber)}
  .msg.rare{color:#f0d98a}
  .msg.day{color:var(--sage);font-size:10px;letter-spacing:.1em;padding:5px 0 3px;border-top:1px dashed var(--line);margin-top:3px}
  .msg .sub{color:var(--dim);font-size:10px;margin-left:22px}
  /* BUILD 427 — 빼콩(Bbaekkong, internal key: ppae) 일기: 우측 정렬 + 옅은 연갈.
     한 타임라인에 두 시선 — 컬럼 분리가 아니라 같은 흐름의 좌/우. */
  .msg{position:relative;padding-right:42%} /* 오른쪽은 빼콩의 자리 */
  .msg:has(.ppaeSide){min-height:32px}      /* 옆자리(이름표+한 줄)가 이웃 줄을 침범하지 않게 */
  .ppaeSide{position:absolute;right:0;top:1px;width:40%;text-align:right;
    color:#cfc9ae;font-size:11px;line-height:1.45;animation:pop .25s ease}
  .ppaeSide .who{display:block;color:#8a917b;font-size:9px;letter-spacing:.12em;margin-bottom:1px}
  .ppaeSide .link{font-size:9px;opacity:.65;margin-left:4px} /* 같은 걸 봤다 */
  @media (max-width:640px){ .ppaeSide{display:none} .msg{padding-right:0} } /* v1: UI만 숨김 — 데이터 생성은 계속 */
</style>
</head>
<body>
<div id="app">
  <div class="game-wrap">
    <canvas id="game" width="360" height="150"></canvas>
    <div class="titlebar">
      <span>🌿 <b>Byeoli Walk</b></span>
      <span id="daytag" style="pointer-events:none">별이력 9075.4.11</span>
    </div>
    <div class="ctrls">
      <button id="soundBtn">🔇</button>
      <button id="speedBtn">1×</button>
      <button id="pauseBtn">⏸</button>
      <button id="reseedBtn">↻</button>
    </div>
  </div>

  <div class="drives" id="driveBars"></div>
  <div class="fatline"><span>피로</span><span class="fv" id="fatVal">0.05</span></div>
  <div class="taste" id="taste" role="button" tabindex="0" aria-haspopup="dialog"
       title="별과 함께 발견한 것들 열기">
    <div class="taste-head">별의 취향 <span id="tasteHint">— 아직 없음</span>
      <span class="taste-more" id="tasteMore">전체 보기 ›</span></div>
    <div id="tasteList"></div>
  </div>

  <div class="stream-head">
    <span>별의 산책</span>
    <span class="tally" id="tally">기억 0 · 일기 0</span>
  </div>
  <div id="stream"></div>
</div>

<!-- BUILD 413-A: 별과 함께 발견한 것들 (개인 기록 시트)
     z-index는 World Event Stage(999999)보다 낮다 — 이벤트가 항상 우선. -->
<div id="pr-sheet" style="display:none;position:fixed;inset:0;z-index:99000;background:rgba(6,8,10,.62);backdrop-filter:blur(2px)">
  <div id="pr-panel" role="dialog" aria-modal="true" aria-label="별과 함께 발견한 것들">
    <div id="pr-head">
      <div>
        <div id="pr-title">별과 함께 발견한 것들</div>
        <div id="pr-sub">Byeol · <span id="pr-code">—</span> <button id="pr-copy" type="button">복사</button></div>
      </div>
      <button id="pr-close" type="button" aria-label="닫기">✕</button>
    </div>
    <div id="pr-stats"></div>
    <div id="pr-listwrap"><div id="pr-list"></div></div>
    <div id="pr-foot">
      <button id="pr-share" type="button">공유카드 만들기</button>
      <button id="pr-backup" type="button">기록 지키기</button>
      <span id="pr-note"></span>
    </div>
    <div id="rc-foot">
      <span id="pr-bkbadge"></span>
      <span>
        <button id="pr-onboarding-open" type="button">안내 다시 보기</button>
        ·
        <button id="pr-restore-open" type="button">기존 별이 이어가기</button>
      </span>
    </div>
  </div>
</div>

<!-- BUILD 419-B: 관찰자 복구 모달 (발급 / 복구 / 교체 확인 — 내용은 JS 렌더) -->
<div id="rc-sheet" style="display:none;position:fixed;inset:0;z-index:99500;background:rgba(6,8,10,.62);backdrop-filter:blur(2px)">
  <div id="rc-panel" role="dialog" aria-modal="true" aria-label="기록 지키기"></div>
</div>

<!-- BUILD 420-B: 첫 진입 온보딩 (첫 방문에만 자동 노출, 배경 산책은 계속 움직임) -->
<div id="ob-sheet" style="display:none;position:fixed;inset:0;z-index:99400;background:rgba(6,8,10,.5);backdrop-filter:blur(3px)">
  <div id="ob-card" role="dialog" aria-modal="true" aria-label="별이와 함께 산책을 시작합니다">
    <h2 id="ob-title">별이와 함께 산책을 시작합니다.</h2>
    <p id="ob-body">별이는 당신이 오래 바라본 풍경을 기억합니다.<br><br>천천히 걸어보세요.<br>작은 발견과 취향이 조금씩 쌓입니다.</p>
    <button id="ob-start" type="button">산책 시작하기</button>
    <p id="ob-sub">기록 지키기를 해두면 다른 기기에서도 다시 이어갈 수 있어요.</p>
  </div>
</div>

<!-- BUILD 410-C2: Full Page World Event Stage (평소 display:none) -->
<div id="world-event-stage" style="display:none;position:fixed;left:0;top:0;width:100%;height:100dvh;z-index:999999;background:#000;overflow:hidden">

function buildTown(rng){
  const items=[];
  // 계획대로 목록 생성
  const pool=[];
  for(const type in PLAN){ for(let i=0;i<PLAN[type];i++) pool.push(type); }
  // 셔플
  for(let i=pool.length-1;i>0;i--){ const j=(rng()*(i+1))|0; [pool[i],pool[j]]=[pool[j],pool[i]]; }

  let x=150, idx=0;
  for(const type of pool){
    const def=CATALOG[type];
    const gap = def.cat==='animal' ? 300 + (rng()*160|0)
              : def.rarity==='uncommon' ? 160 + (rng()*100|0)
              : 100 + (rng()*70|0);
    x += gap;
    const vs=VARIANTS[type]; const variant = vs ? vs[(rng()*vs.length)|0] : '';
    items.push({
      id:`${type}-${variant||'a'}-${idx}`, type, variant,
      x, layer: def.cat==='thing'||type==='oldtree'?'middle':'front',
      phase:'unseen', reactedThisPass:false,
    });
    idx++;
  }
  // 희귀 이벤트: 5% 확률로 1개 삽입
  let rareItem=null;
  if(rng()<0.05){
    const keys=Object.keys(RARE); const rk=keys[(rng()*keys.length)|0];
    const rx=200+(rng()*(x-400))|0;
    rareItem={ id:`rare-${rk}-${idx}`, type:rk, variant:'', x:rx, layer:'middle',
      phase:'unseen', reactedThisPass:false, rare:true };
    items.push(rareItem); items.sort((a,b)=>a.x-b.x);
  }
  return { items, worldLen:x+200, rareItem };
}

/* ---- 시드 난수 (재현성) ---- */
function makeRNG(seed){let s=seed>>>0;return()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296;};}
let SEED=(Math.random()*1e9)|0, rng=makeRNG(SEED);
function clamp(v,a,b){return v<a?a:v>b?b:v;}

const DRIVES=['observe','rest','record','wonder'];
const THRESHOLD=0.58;

function stimOf(item){

  return CATALOG[item.type].stim;
}

/* =====================================================================
   HABIT ENGINE — BUILD 405-A(축적) / 405-B(감쇠)
   key = targetType:drive · strength = repetition × recency × consistency
   habitBias max +0.15 · combinedBias(habit+personality) max +0.18
   Memory는 불변, Habit strength만 산책 루프 단위로 감쇠.

const habitEpoch=()=>byeoliDayEpoch();
const habitEngine=createSharedHabitEngine(habitEpoch());

/* =====================================================================
   BUILD 413-A — 개인 관찰자 프로필 (Profile)
   이 브라우저의 관찰자만의 기록. Authority 전체 telemetry와 절대 섞지 않는다.
   habitEngine(strength/bias)은 그대로 두고, Profile은 habit이 갖고 있지 않은
   "행동별 횟수 · 처음/마지막 만난 실제 시각 · 누적 관찰시간 · tally"만 보강한다.
   지금은 localStorage에 저장하지만, 이후 서버 저장으로 옮길 수 있도록
   Profile 객체 하나로 분리해 둔다 (로그인/복구 서버는 이 단계에서 만들지 않음).
   ===================================================================== */
const PROFILE_KEY='mimesis.byeoli.profile.v1';
const Profile={
  data:null, _sessionStart:Date.now(), _lastFlush:Date.now(),
  _newCode(){
    const A='ABCDEFGHJKMNPQRSTUVWXYZ23456789';   // 헷갈리는 I,L,O,0,1 제외
    const blk=n=>{ let s=''; for(let i=0;i<n;i++) s+=A[(Math.random()*A.length)|0]; return s; };
    return 'BYL-'+blk(4)+'-'+blk(4);
  },
  _empty(){
    const now=Date.now();
    return { version:1, observerId:this._newCode(), createdAt:now,
      memoryCount:0, diaryCount:0, tastes:{},
      firstSeenAt:now, lastSeenAt:now, totalObservedMs:0, passCount:0 };
  },
  load(){
    let d=null;
    try{ const raw=localStorage.getItem(PROFILE_KEY); if(raw){ const p=JSON.parse(raw); if(p&&p.version===1&&p.observerId) d=p; } }catch(e){}
    if(!d) d=this._empty();                       // 첫 접속 → 코드 생성 / 있으면 재사용
    d.tastes=d.tastes||{}; d.lastSeenAt=Date.now();
    this.data=d; this._sessionStart=Date.now(); this._lastFlush=Date.now();
    this.save(); return d;
  },
  save(){ try{ localStorage.setItem(PROFILE_KEY, JSON.stringify(this.data)); }catch(e){} },
  // 기록은 즉시 저장한다. 지연 저장은 탭을 빨리 닫거나 새로고침할 때 유실되고,
  // 뒤늦게 도착한 타이머가 최신 상태를 덮어쓸 수 있다. localStorage 쓰기는 충분히 싸다.
  _queueSave(){ this.save(); },
  // 누적 관찰시간: 실제 경과 실시간만 더한다 (speedMul/배속과 무관)
  flushTime(){
    const now=Date.now(); const d=now-this._lastFlush; this._lastFlush=now;
    if(d>0 && d<60000){ this.data.totalObservedMs+=d; }   // 탭 백그라운드 장시간은 버림
    this.data.lastSeenAt=now; this._queueSave();
  },
  // 행동이 일어난 것만 취향에 반영 (pass는 취향 아님)
  recordAction(targetType, drive){
    const now=Date.now();
    const t=this.data.tastes[targetType] || (this.data.tastes[targetType]={
      type:targetType, acts:{observe:0,rest:0,record:0,wonder:0}, total:0,
      firstAt:now, lastAt:now });
    if(t.acts[drive]===undefined) t.acts[drive]=0;
    t.acts[drive]++; t.total++; t.lastAt=now;
    this._queueSave();
  },
  recordPass(){ this.data.passCount=(this.data.passCount||0)+1; this._queueSave(); },
  bumpMemory(){ this.data.memoryCount++; this._queueSave(); },
  bumpDiary(){ this.data.diaryCount++; this._queueSave(); },
  tasteCount(){ return Object.keys(this.data.tastes).length; },
  observedMs(){ return this.data.totalObservedMs + (Date.now()-this._lastFlush); },
};
/* =====================================================================
   BUILD 419-B — 복구 staging 부트 (정본: docs/BUILD_419A_OBSERVER_RECOVERY.md §5-1)
   localStorage 키 2개(profile·habits)의 일괄 갱신은 원자적이지 않다.
   restore.pending이 남아 있으면: payload는 저장 시점에 전체 검증된 것이므로
   전진 완료(3~7 재실행), 손상이면 pending을 버리고 기존 로컬 유지(롤백).
   Profile.load()보다 먼저 실행되어야 복구된 프로필을 읽는다.
   ===================================================================== */
const HABITS_LS='mimesis.byeoli.habits.v2';
const RECOVERY_LS='mimesis.byeoli.recovery.v1';
const RESTORE_PENDING_LS='mimesis.byeoli.restore.pending';
function rcValidPending(p){
  return !!(p && p.payload && p.payload.profile && p.payload.profile.version===1
    && typeof p.payload.profile.observerId==='string'
    && typeof p.revision==='number' && typeof p.recoveryKey==='string');
}
// §5-1 3~7단계. 실패 시 예외 — 호출측이 pending 처분을 결정한다.
function rcApplyPending(p){
  localStorage.setItem(PROFILE_KEY, JSON.stringify(p.payload.profile));
  if(p.payload.habits!==null && p.payload.habits!==undefined){
    localStorage.setItem(HABITS_LS, JSON.stringify(p.payload.habits));
  } else {
    localStorage.removeItem(HABITS_LS);
  }
  const chk=JSON.parse(localStorage.getItem(PROFILE_KEY));
  if(!chk || chk.observerId!==p.payload.profile.observerId) throw new Error('restore verify failed');
  if(p.payload.habits!==null && p.payload.habits!==undefined) JSON.parse(localStorage.getItem(HABITS_LS));
  localStorage.setItem(RECOVERY_LS, JSON.stringify({
    recoveryKey:p.recoveryKey, baseRevision:p.revision, registeredAt:Date.now() }));
  localStorage.removeItem(RESTORE_PENDING_LS);
}
(function rcBootStaging(){
  let raw=null; try{ raw=localStorage.getItem(RESTORE_PENDING_LS); }catch(e){ return; }
  if(!raw) return;
  try{
    const p=JSON.parse(raw);
    if(rcValidPending(p)){ rcApplyPending(p); }                       // 전진 완료
    else { localStorage.removeItem(RESTORE_PENDING_LS); }             // 손상 → 롤백
  }catch(e){
    try{ localStorage.removeItem(RESTORE_PENDING_LS); }catch(e2){}    // 롤백 — 기존 로컬 유지
  }
})();

Profile.load();
window.addEventListener('pagehide', ()=>{ Profile.flushTime(); Profile.save(); });
document.addEventListener('visibilitychange', ()=>{ if(document.hidden){ Profile.flushTime(); Profile.save(); } });

function fmtDuration(ms){
  const s=Math.max(0,Math.floor(ms/1000)), h=Math.floor(s/3600), m=Math.floor((s%3600)/60);
  if(h>=1) return h+'시간 '+m+'분';
  if(m>=1) return m+'분';
  return s+'초';
}
// 420-A: 코드 마스킹 통합 — 외부로 나가는 표면(공유카드·다운로드 파일명)은 전부 이 함수만 쓴다.
// 앞뒤 일부만 남긴다: BYL-92JQ-JNFF → BYL-92••••FF. filler로 파일명 안전문자 지정 가능.
function maskObserverCode(id, filler){
  if(typeof id!=='string' || id.length<8) return filler||'••••';
  return id.slice(0,6)+(filler||'••••')+id.slice(-2);
}
function fmtWhen(ts){
  if(!ts) return '—';
  const d=new Date(ts), now=new Date();
  const p=n=>String(n).padStart(2,'0');
  const sameDay=d.toDateString()===now.toDateString();
  if(sameDay) return '오늘 '+p(d.getHours())+':'+p(d.getMinutes());
  return (d.getMonth()+1)+'월 '+d.getDate()+'일 '+p(d.getHours())+':'+p(d.getMinutes());
}

const brain={
  drive:{observe:.30,rest:.22,record:.26,wonder:.34},
  fatigue:.05,
  tick(dt,walking){
    for(const d of DRIVES) this.drive[d]=clamp(this.drive[d]+(0.009+rng()*0.004)*dt,0,1);
    this.fatigue=clamp(this.fatigue+(walking?0.009:-0.03)*dt,0,1);
  },
  decide(item){
    const stim=stimOf(item);
    const rand=(rng()-0.5)*0.16;
    const type=item.type;
    let best=null,bestScore=-1,bestParts=null;
    for(const d of DRIVES){
      const cur=this.drive[d], objectStimulus=stim[d]||0;
      const habitBias = item.rare?0:habitEngine.bias(type,d,habitEpoch());
      const personalityBias=0;   // 405-C 자리
      const combined=capCombinedBias(habitBias,personalityBias);
      const score=cur+objectStimulus+combined-this.fatigue+rand;
      if(score>bestScore){ bestScore=score; best=d;
        bestParts={cur,objectStimulus,habitBias,personalityBias,combined}; }
    }
    const thr = item.rare ? 0.30 : THRESHOLD;
    const passed = bestScore<thr;
    if(!passed){ this.drive[best]=clamp(this.drive[best]-0.45,0,1);
                 this.fatigue=clamp(this.fatigue-0.16,0,1);
                 // 취향 기록: 행동한 것만 (pass는 취향 아님)
                 habitEngine.record(type,best,habitEpoch());
                 Profile.recordAction(type,best); }   // 413-A: 개인 취향(행동별 횟수·시각)
    else { Profile.recordPass(); }                    // 413-A: 지나침은 점수 아닌 passCount만
    const intent={
      id:'intent-'+(intentCounter++),
      action: passed?'pass':best,
      targetId:item.id, targetType:type,
      duration: passed?0:+(1.8+this.drive[best]*2.6+rng()*1.2).toFixed(1),
      drive:best, score:+bestScore.toFixed(3),
      reason:{ currentDrive:+bestParts.cur.toFixed(3), objectStimulus:+bestParts.objectStimulus.toFixed(3),
        habitBias:+bestParts.habitBias.toFixed(4), personalityBias:bestParts.personalityBias,
        fatiguePenalty:+this.fatigue.toFixed(3), randomness:+rand.toFixed(3) },
      context:{ worldType:'town-2d', timestamp:Date.now(), seed:SEED },
    };
    return { intent, passed, bestScore, best };
  }
};

/* =====================================================================
   SOUND — WebAudio 코드 생성음 (파일 없음, 8비트 톤)
   ===================================================================== */
// 무음 WAV (미디어 채널 승격용 — <audio> 루프로 재생하면 오디오 세션이 '벨소리'가 아닌 '미디어'가 됨)
const SILENT_WAV='data:audio/wav;base64,UklGRjIAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQ4AAAAAAAAAAAAAAAAAAAAAAAA=';
const Sound={
  ctx:null, on:false, _silentEl:null, _listenersInstalled:false,   // on:false로 시작 (버튼 🔇와 일치)
  ensure(){
    if(!this.ctx){ try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    if(!this.ctx) return;
    if(this.ctx.state!=='running') this.ctx.resume();   // 요청만 — 동기 결과 검사하지 않음
  },
  _blipEmpty(){
    if(!this.ctx) return;
    try{ const b=this.ctx.createBuffer(1,1,22050), s=this.ctx.createBufferSource();
      s.buffer=b; s.connect(this.ctx.destination); (s.start||s.noteOn).call(s,0); }catch(e){}
  },
  // iOS 3중 자물쇠 — 반드시 사용자 제스처 콜스택 안에서 동기 실행
  wake(){
    // ② 세션 승격 (iOS 16.4+): Web Audio를 '벨소리'가 아닌 '미디어' 채널로 → 무음 스위치 무시
    try{ const nav=navigator; if(nav.audioSession) nav.audioSession.type='playback'; }catch(e){}
    // ② 구형 커버: 무음 <audio> 루프가 세션을 미디어로 끌어올림
    // ⚠ 소리가 켜진 경우에만 루프 유지. (전역 제스처 리스너가 매 클릭 wake를 부르므로,
    //    on 가드 없으면 소리 꺼도 아무 탭에서 무음 루프가 되살아나 "안 꺼지는" 증상이 됨)
    if(this.on){
      if(!this._silentEl){
        try{ this._silentEl=new Audio(SILENT_WAV); this._silentEl.loop=true; this._silentEl.playsInline=true; }catch(e){ this._silentEl=null; }
      }
      if(this._silentEl && this._silentEl.paused) { this._silentEl.play().catch(()=>{}); }
    }
    // ③ 빈 버퍼 의식 + 컨텍스트 resume (제스처 안에서)
    this.ensure();
    this._blipEmpty();
  },
  // 소리 끌 때: 무음 미디어 루프를 멈춰 세션 점유 해제 (안 그러면 "꺼도 안 꺼진" 느낌 + 컨텍스트가 계속 살아있음)
  sleep(){
    if(this._silentEl && !this._silentEl.paused){ try{ this._silentEl.pause(); }catch(e){} }
    this.stopWeather();
  },
  // 소리 재생 직전: 이미 running이면 아무것도 안 한다 (매 발소리마다 resume을 때리면
  // 데스크톱에서 스케줄링이 꼬여 발소리가 빨라짐 — 아이폰 작업 전엔 없던 회귀).
  // suspended일 때만 resume 요청하고, running일 때만 true → 소리는 컨텍스트 열린 뒤부터 정상.
  _ready(){ if(!this.ctx) return false; if(this.ctx.state==='suspended') this.ctx.resume(); return this.ctx.state==='running'; },
  installGestureUnlock(){
    if(this._listenersInstalled) return;
    this._listenersInstalled=true;
    const wake=()=>this.wake();
    // touchend·click·pointerup이 진짜 열쇠 (구형 iOS는 touchstart/pointerdown 무효일 수 있음). 나머지는 조기 시도.
    ['touchend','click','pointerup','pointerdown','touchstart','keydown'].forEach(ev=>window.addEventListener(ev,wake,{passive:true}));
    // 백그라운드 갔다 오면 iOS가 컨텍스트를 정지 → 돌아올 때 되살리고, 켜져 있으면 무음 루프 재시도
    document.addEventListener('visibilitychange',()=>{
      if(!document.hidden){
        if(this.ctx && this.ctx.state!=='running') this.ctx.resume();
        if(this.on && this._silentEl && this._silentEl.paused) this._silentEl.play().catch(()=>{});
      }
    });
  },
  blip(freq, dur, type='square', vol=0.12){
    if(!this.on||!this.ctx||this.ctx.state!=='running') return;   // resume 호출 안 함 — currentTime 안정 유지(따발총 원인 제거)
    const t=this.ctx.currentTime, o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(this.ctx.destination); o.start(t); o.stop(t+dur);
  },
  // 카메라 셔터: 짧은 노이즈 클릭 + 고음 → "찰칵"
  shutter(){
    if(!this.on||!this._ready()) return;
    const t=this.ctx.currentTime;
    // 찰-칵: 두 번의 짧은 노이즈 클릭만 (톤음 없음 → 이벤트음처럼 안 들림)
    const click=(when,vol)=>{
      const buf=this.ctx.createBuffer(1,300,44100), d=buf.getChannelData(0);
      for(let i=0;i<300;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/300,4);
      const n=this.ctx.createBufferSource(); n.buffer=buf;
      const g=this.ctx.createGain(); g.gain.value=vol;
      const f=this.ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=2000;
      n.connect(f); f.connect(g); g.connect(this.ctx.destination); n.start(when);
    };
    click(t,0.20);           // 찰
    click(t+0.06,0.14);      // 칵
  },
  _lastStepAt:0,
  step(){
    if(!this.on||!this.ctx||this.ctx.state!=='running') return;
    const now=performance.now();
    if(now-this._lastStepAt<360) return;
    this._lastStepAt=now;
    const t=this.ctx.currentTime, n=220, buf=this.ctx.createBuffer(1,n,this.ctx.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++){ const env=1-i/n; d[i]=(Math.random()*2-1)*env*env; }
    const src=this.ctx.createBufferSource(), low=this.ctx.createBiquadFilter(), g=this.ctx.createGain();
    src.buffer=buf; low.type='lowpass'; low.frequency.setValueAtTime(260+rng()*70,t); low.Q.value=0.7;
    g.gain.setValueAtTime(0.028,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.045);
    src.connect(low); low.connect(g); g.connect(this.ctx.destination); src.start(t); src.stop(t+0.05);
  },       // 발소리: 짧은 저역 노이즈 한 번. tone 반복/중첩 금지
  act(drive){ // record는 여기서 소리 안 냄 (startAction이 셔터음 전담)
    const f={observe:520,rest:330,wonder:700}[drive];
    if(f) this.blip(f,0.12,'triangle',0.08); },
  rain(){ /* 빗소리는 루프 노이즈로 별도 */ },
  weatherLoop:null,
  startWeather(kind){
    if(!this.on||!this._ready()) return; this.stopWeather();
    // 화이트노이즈 루프 (비=쏴, 눈=거의 무음이라 생략)
    if(kind!=='rain') return;
    const bufSize=2*this.ctx.sampleRate, buf=this.ctx.createBuffer(1,bufSize,this.ctx.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++) d[i]=(Math.random()*2-1)*0.5;
    const src=this.ctx.createBufferSource(); src.buffer=buf; src.loop=true;
    const filt=this.ctx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=1200;
    const g=this.ctx.createGain(); g.gain.value=0.05;
    src.connect(filt); filt.connect(g); g.connect(this.ctx.destination); src.start();
    this.weatherLoop={src,g};
  },
  stopWeather(){ if(this.weatherLoop){ try{this.weatherLoop.src.stop();}catch(e){} this.weatherLoop=null; } },
};

/* ---- 카메라 플래시 ---- */
const flash={ on:false, timer:0, trigger(){ this.on=true; this.timer=0.18; } };
function drawFlash(flash){
  if(!flash || !flash.on) return;
  const a=clamp(flash.timer/0.18,0,1);
  ctx.fillStyle=`rgba(255,255,255,${a*0.7})`;
  ctx.fillRect(0,0,W,GROUND_Y+ (H-GROUND_Y));
}

/* =====================================================================
   SKY & WEATHER — 임시 랜덤 순환.
   ⚠ 시간체계(별이력)는 나중에 3D와 동기화 예정. 지금은 이 블록만 랜덤.
   동기화 시 sky.phase / sky.t 를 외부 시계로 주입하면 됨.
   ===================================================================== */
const SKY_PHASES=['dawn','day','dusk','night'];
// 별이력 하루 = 현실 60초 (byeoliTime.ts의 BYEOLI_DAY_SECONDS와 일치, 연출용 상수).
// 하늘은 자체 시계가 아니라 '현재 별이력 시각'을 따라간다 → 탭을 내렸다 열어도
// rAF와 무관하게 항상 올바른 시간대가 즉시 나온다(절대시간 동기화).
const BYEOLI_DAY_MS=60*1000;
function skyProgressNow(){ return ((Date.now()%BYEOLI_DAY_MS)/BYEOLI_DAY_MS); } // 0~1 하루 진행도
const sky={
  t:0,               // 0~1 하루 진행도 (skyProgressNow로 매 tick 재계산)
  phase:'day',
  cloudDark:false,   // 먹구름 여부
  clouds:[],
  weather:'clear',   // clear | rain | snow
  weatherTimer:12,   // 다음 날씨 전환까지(초)
  particles:[],      // 비/눈 입자
  flybys:[],         // 하늘 이벤트 (비행기/새떼/헬기/괴생명체)
  flybyTimer:6,      // 다음 이벤트까지(초)
  reset(){
    this.t=skyProgressNow(); this.cloudDark=false;
    this.weather='clear'; this.weatherTimer=8+rng()*12; this.particles=[];
    this.clouds=[]; this.flybys=[]; this.flybyTimer=5+rng()*8;
    for(let i=0;i<4;i++) this.clouds.push({x:rng()*W, y:8+rng()*30, w:20+rng()*24, spd:2+rng()*4, dark:false});
  },
  tick(dt){
    this.t=skyProgressNow();   // 자체 증가가 아니라 절대시간에서 읽음
    // phase 판정
    this.phase = this.t<0.15?'dawn' : this.t<0.5?'day' : this.t<0.62?'dusk' : 'night';
    // 구름 이동
    for(const c of this.clouds){ c.x-=c.spd*dt; if(c.x<-c.w-10){ c.x=W+10; c.y=8+rng()*30; c.w=20+rng()*24; c.dark=this.cloudDark&&rng()<0.6; } }
    // 날씨 전환 (랜덤)
    this.weatherTimer-=dt;
    if(this.weatherTimer<=0){
      const r=rng();
      if(this.weather==='clear'){
        // 맑음 → 가끔 비/눈. 비:눈=7:3 (Vase 판정 2026-07-18 — 눈 입자가 느려 체감 빈도가 높아 보정)
        if(r<0.28){ this.weather = rng()<0.7?'rain':'snow'; this.cloudDark = this.weather==='rain';
                    for(const c of this.clouds) c.dark=this.cloudDark&&rng()<0.7;
                    Sound.startWeather(this.weather); }
        this.weatherTimer=10+rng()*14;
      }else{
        this.weather='clear'; this.cloudDark=false;
        for(const c of this.clouds) c.dark=false;
        Sound.stopWeather();
        this.weatherTimer=12+rng()*16;
      }
    }
    // 강수 입자 생성
    if(this.weather!=='clear'){
      const rate = this.weather==='rain'?3:1.6;
      for(let i=0;i<rate;i++) if(rng()<0.9) this.spawnDrop();
    }
    this.updateParticles(dt);
    // 하늘 이벤트 (비행기/새/헬기/괴생명체)
    this.flybyTimer-=dt;
    if(this.flybyTimer<=0){ this.spawnFlyby(); this.flybyTimer=8+rng()*14; }
    for(const f of this.flybys){
      f.x+=f.vx*dt; f.phase+=dt*f.flap;
      if(f.kind==='creature') f.stompT=(f.stompT||0)+dt;  // 걸음 타이밍
    }
    // 화면 밖으로 나간 것 제거 (방향에 따라)
    this.flybys=this.flybys.filter(f=> f.vx<0 ? f.x>-f.w-20 : f.x<W+f.w+20 );
  },
  spawnFlyby(){
    const roll=rng();
    // 확률: 새떼 40% / 비행기 28% / 헬기 22% / 괴생명체 10% (괴생명체는 레어)
    let kind = roll<0.40?'birds' : roll<0.68?'plane' : roll<0.90?'heli' : 'creature';
    const dir = rng()<0.5?-1:1;                 // 진행 방향
    const fromX = dir<0 ? W+30 : -30;
    if(kind==='birds'){
      // 새떼는 여러 마리를 살짝 흩어서
      const n=3+((rng()*4)|0), baseY=14+rng()*26;
      for(let i=0;i<n;i++) this.flybys.push({
        kind:'bird', x:fromX - dir*(i*10+rng()*8), y:baseY+(rng()*10-5),
        vx:dir*(26+rng()*10), w:6, phase:rng()*6, flap:9+rng()*4, dir });
    } else if(kind==='plane'){
      this.flybys.push({ kind:'plane', x:fromX, y:12+rng()*18, vx:dir*(42+rng()*14), w:22, phase:0, flap:0, dir, trail:[] });
    } else if(kind==='heli'){
      this.flybys.push({ kind:'heli', x:fromX, y:16+rng()*22, vx:dir*(30+rng()*10), w:16, phase:0, flap:40, dir });
    } else {
      // 괴생명체: 지평선 뒤로 큼직하게, 느리게. (희귀 이벤트)
      this.flybys.push({ kind:'creature', x:fromX, y:GROUND_Y, vx:dir*(14+rng()*6), w:34, phase:0, flap:0, dir, stompT:0 });
    }
  },
  spawnDrop(){
    const rainy=this.weather==='rain';
    this.particles.push({
      x:rng()*(W+40)-20, y:-4,
      vx: rainy? -18 : -6-rng()*6,
      vy: rainy? 150+rng()*40 : 34+rng()*16,
      kind: rainy?'rain':'snow', life:1, bounce:0,
      sway: rng()*Math.PI*2,
    });
  },
  updateParticles(dt){
    const bY=GROUND_Y, GRAV=520;
    const bx=byeoli.screenX, byTop=bY-27, byBot=bY, half=7;
    for(const p of this.particles){
      const isRain=p.kind==='rain';
      // 중력: 비는 튕긴 뒤, 눈은 항상 약하게 (부유감)
      if(isRain){ if(p.bounce>0) p.vy += GRAV*dt; }
      else { p.vy += 40*dt; }   // 눈은 늘 살살 내려앉음
      p.x+=p.vx*dt;
      if(!isRain && p.bounce===0){ p.sway+=dt*3; p.x+=Math.sin(p.sway)*0.4; }
      p.y+=p.vy*dt;
      // 캐릭터 충돌
      if(p.bounce<2 && p.x>bx-half && p.x<bx+half && p.y>byTop && p.y<byBot && p.vy>0){
        if(isRain){
          p.vy = -Math.abs(p.vy)*0.28;                 // 비: 살짝 튀어오름
          p.vx = (p.x<bx?-1:1)*(30+rng()*30);
        } else {
          p.vy = Math.abs(p.vy)*0.3;                   // 눈: 위로 안 감. 속도만 죽임
          p.vx = (p.x<bx?-1:1)*(12+rng()*10);          // 옆으로 스르륵
        }
        p.bounce++; p.life-=0.12;
      }
      // 바닥 충돌
      if(p.y>=bY){
        if(isRain && p.bounce<2 && Math.abs(p.vy)>40){
          p.vy=-Math.abs(p.vy)*0.3; p.vx*=0.4; p.bounce++; p.y=bY-1;   // 비만 통통
        } else { p.y=bY; p.vy=0; p.vx=0; p.life-=dt*(isRain?4:2.5); }  // 눈은 쌓였다 사라짐
      }
    }
    this.particles=this.particles.filter(p=>p.life>0 && p.y<H+10 && p.y>-20);
    if(this.particles.length>200) this.particles.splice(0, this.particles.length-200);
  }
};

let props=[], worldLen=1400, rareRef=null;

const byeoli={ worldX:0, screenX:90, speed:62, baseSpeed:62,
  state:'walk', actAction:null, actTarget:null, actTimer:0, walkPhase:0,
  gazeT:0,                              // 428: 행동 전 '바라봄' — 발견→멈춤→바라봄→기록
  actVariant:null, actTargetType:null,  // 428-B: 같은 행동의 여러 버전 (소품 종류 우선)
  resumeT:0,                            // 428-C: 눈 오는 날 다시 걷기까지의 뜸 (표현만)
  passT:0, stepAside:0 };               // 430: 스쳐 지나감 · 비켜서기 (기록 없음)

/* =====================================================================
   BUILD 430 — Parallel Lives
   같은 세상을 살지만 서로의 세상이 되지는 않는다.
   하드룰(430 최상위): **세계는 둘보다 크다.** 둘이 스쳐도 하늘·구름·날씨·새는
   멈추지 않는다 (sky.tick은 어떤 경우에도 건너뛰지 않는다).
   그리고 427 하드룰 유지: 서로를 기록하지 않는다 — 일기에 상대가 등장하지 않는다.
   남는 것은 '흔적'뿐이고, 누가 남겼는지는 아무도 모른다.
   ===================================================================== */
const PARALLEL={ passChance:0.9, passHold:0.35, asideHold:0.5, traceTtlMs:120000, coincidence:0.01 };
/* 흔적: 소품에 남는 익명의 자국. 남긴 주체는 저장하되 **문장에는 절대 등장하지 않는다**
   (판정용으로만 쓰고, 상대를 지목하는 문장은 검증기가 금지한다 — validate:parallel) */
let lastPassAt=0;   // 430: 스쳐 지나감은 드물어야 한다 (최소 20초 간격)
function leaveTrace(prop, by, kind){ if(prop) prop.trace={ by, kind, at:Date.now() }; }
function readTrace(prop, notBy){
  const t=prop&&prop.trace;
  if(!t || t.by===notBy) return null;
  if(Date.now()-t.at>PARALLEL.traceTtlMs) return null;
  return t;
}

/* =====================================================================
   빼콩이 — 흰 고양이 companion. 자유 로밍.
   별이 근처를 앞뒤로 마구 돌아다니다, 가끔 별이를 따라 걷다가, 또 제멋대로.
   화면좌표계에서 별이(screenX) 기준 상대 위치로 산다.
   ===================================================================== */
const ppae={
  x:130, y:GROUND_Y,        // 화면좌표
  vx:0, vy:0,
  facing:1, phase:0,
  mode:'roam',              // roam | follow | idle | dash | away(427: 화면 밖 외출)
  modeTimer:1.5,
  targetX:130, targetY:GROUND_Y,
  targetProp:null,          // 427: 지금 향하는 소품 (자기 만남용)
  awaySince:0, awayWet:false, // 427: 부재 시작 시각 · 부재 중 비를 맞았는가(일기 근거)
  pauseT:0, pauseAct:null,  // 428: 킁킁 — 멈춰서 들여다보는 시간 · 428-D: 그 멈춤의 방식(룰 action)
  reset(){ this.x=byeoli.screenX+40; this.y=GROUND_Y; this.mode='roam'; this.modeTimer=1+rng()*2; this.pauseT=0; this.pauseAct=null; this.pickTarget(); },
  pickTarget(){
    const bx=byeoli.screenX;
    if(this.mode==='follow'){ this.targetX=bx-10-rng()*20; this.targetY=GROUND_Y; }
    else if(this.mode==='dash'){ this.targetX=clamp(bx + (rng()<0.5?-1:1)*(50+rng()*70), 20, W-20); this.targetY=GROUND_Y; }
    else if(this.mode==='idle'){ this.targetX=this.x; this.targetY=GROUND_Y; }
    else { // roam — 427: 소품 지향. 별이를 따르는 게 아니라 자기 관심사를 향해 간다
      const camShift=byeoli.worldX-byeoli.screenX;
      const cands=props.filter(p=>{ const sx=p.x-camShift;
        return sx>20 && sx<W-20 && Math.abs(sx-bx)<PPAE_CONFIG.orbitMax; });
      if(cands.length && rng()<0.6){
        const p=cands[(rng()*cands.length)|0];
        this.targetX=clamp(p.x-camShift + (rng()*16-8), 20, W-20);
        this.targetProp=p;
      } else {
        this.targetX=clamp(bx + (rng()*160-80), 20, W-20);
        this.targetProp=null;
      }
      this.targetY=GROUND_Y - (rng()<0.3?(8+rng()*12):0); // 가끔 폴짝
    }
  },
  tick(dt){
    // 428: 멈춰서 들여다보는 시간 — 이동·변덕 모두 정지, 꼬리만 천천히
    if(this.pauseT>0){ this.pauseT-=dt; this.phase+=dt*3; return; }
    this.modeTimer-=dt;
    if(this.modeTimer<=0){
      if(this.mode==='away'){ this.modeTimer=1.5; } // 외출 중엔 변덕 없음 — 복귀는 아래 시간 제한이
      else {
        // 모드 전환: 고양이답게 변덕. 아주 가끔 화면 밖 외출(427)
        const r=rng();
        if(r<PPAE_CONFIG.awayChance){
          this.mode='away'; this.modeTimer=4+rng()*3;
          this.targetX = rng()<0.5 ? -40 : W+40; this.targetY=GROUND_Y; this.targetProp=null;
        } else {
          this.mode = r<0.36?'roam' : r<0.55?'follow' : r<0.72?'idle' : 'dash';
          this.modeTimer = this.mode==='idle'?(0.6+rng()*1.4)
                         : this.mode==='dash'?(0.3+rng()*0.4)
                         : (0.8+rng()*1.8);
          this.pickTarget();
        }
      }
    }
    // 목표로 이동 (dash는 빠르게)
    const sp = this.mode==='dash'?150 : this.mode==='follow'?70 : 48;
    const dx=this.targetX-this.x, dy=this.targetY-this.y;
    if(Math.abs(dx)>1) this.x += Math.sign(dx)*Math.min(Math.abs(dx), sp*dt), this.facing=dx<0?-1:1;
    // 위아래 폴짝 (부드럽게 복귀)
    if(Math.abs(dy)>0.5) this.y += Math.sign(dy)*Math.min(Math.abs(dy), 60*dt);
    else this.y += (GROUND_Y-this.y)*Math.min(1,dt*6);
    // 목표 도달하면 roam은 새 목표
    if(this.mode==='roam' && Math.abs(dx)<3 && rng()<0.04) this.pickTarget();
    // 427 느슨한 궤도: 강제 복귀 없음 — 멀수록 별이 쪽으로 향할 '성향'만 커진다 (판정 3)
    if(this.mode!=='away'){
      const dist=Math.abs(this.x-byeoli.screenX);
      if(dist>PPAE_CONFIG.orbitSoft && rng() < dt*Math.min(1.2,(dist-PPAE_CONFIG.orbitSoft)/70)){
        this.mode='follow'; this.pickTarget();
      }
    }
    // 427 외출·복귀: 부재는 허용, 최대 시간 제한. 복귀는 별도 행동 로그(근거 있는 일기만)
    const off=this.x<-10||this.x>W+10;
    if(this.mode==='away'){
      if(off && !this.awaySince){ this.awaySince=Date.now(); this.awayWet=false; }
      if(this.awaySince && sky.weather==='rain') this.awayWet=true;
      if(this.awaySince && Date.now()-this.awaySince>PPAE_CONFIG.awayMaxMs){ this.mode='follow'; this.pickTarget(); }
    } else if(this.awaySince && !off){
      PpaeBrain.returned(Date.now()-this.awaySince, this.awayWet);
      this.awaySince=0; this.awayWet=false;
    }
    // 427 자기 만남: 향하던 소품에 닿으면 빼콩의 시선 한 줄
    if(this.targetProp){
      const camShift=byeoli.worldX-byeoli.screenX;
      const sx=this.targetProp.x-camShift;
      if(Math.abs(this.x-sx)<12){
        // 428-D: 룰의 action이 멈춤의 방식을 정한다 — 무시는 안 멈춤, 쫓기는 짧게, 나머진 들여다봄
        const act=(PPAE_RULES.find(r=>r.m.test(this.targetProp.type))||{}).action||null;
        this.pauseAct=act;
        this.pauseT = act==='ignore'?0 : act==='chase'?0.25 : 0.5+rng()*0.4;
        // 430: 앞발로 툭 건드리면 자리가 달라진다 — 나중에 누군가 그걸 본다
        if(act==='pickup'||act==='interest') leaveTrace(this.targetProp,'ppae','moved');
        PpaeBrain.selfEncounter(this.targetProp); this.targetProp=null;
      }
      else if(sx<10||sx>W-10) this.targetProp=null;   // 스크롤에 흘러가면 포기
    }
    /* 430 ①② 스쳐 지나감 · 비켜가기 — 둘 다 0.3~0.5초 멈춘다.
       대화 없음. 기록 없음. 그냥 지나간다. (일기 호출이 여기 없다는 것이 계약이다) */
    if(this.mode!=='away' && this.pauseT<=0 && byeoli.passT<=0 && byeoli.state==='walk'
       && Math.abs(this.x-byeoli.screenX)<9 && Date.now()-lastPassAt>20000
       && rng()<PARALLEL.passChance*dt){
      lastPassAt=Date.now();
      this.pauseT=PARALLEL.passHold+rng()*0.15;
      byeoli.passT=PARALLEL.passHold+rng()*0.15;
      if(rng()<0.5){                       // 가끔은 서로 조금 비켜선다 — 사람도 길에서 그렇게 한다
        byeoli.stepAside=PARALLEL.asideHold;
        this.targetY=GROUND_Y-5; this.modeTimer=Math.max(this.modeTimer,0.6);
      }
    }
    // 428-C: 빼콩도 눈에 반응하되 별이와 다른 비율·다른 방식 (별이는 무겁게, 빼콩은 발만 조심스럽게)
    this.phase+=dt*(this.mode==='dash'?16:8)*(isSnowing()?SNOW_PACE.ppaeGait:1);
  }
};

/* =====================================================================
   BUILD 427 — Bbaekkong Parallel Observer   (Bbaekkong / internal key: ppae)
   같은 세계를 두 존재가 다른 시선으로 본다. 이번 단계는 AI 없음 — Rule 기반.
   경계면은 PpaeBrain.observe(context) → DiaryEntry 하나뿐: 향후 이 안쪽을
   Genome→Writing Studio→Claude로 교체해도 UI·저장은 불변(F항).
   하드룰: 빼콩 일기는 별이의 엽서(.msg 클래스 비공유)·관찰자 카운트·백업 blob에
   절대 섞이지 않는다. 별이 경로는 한 치도 바꾸지 않는다.
   ===================================================================== */
const PPAE_CONFIG={
  parallelObservationRate:0.3,   // 같은 이벤트 다른 기록 확률 — 설정값(판정 C, 하드코딩 금지)
  minGapMs:25000, gapJitterMs:20000, // 일기 최소 간격(화면 소음 방지)
  orbitSoft:120, orbitMax:200,   // 느슨한 궤도 — 강제 경계가 아니라 복귀 성향의 기준
  awayChance:0.02, awayMaxMs:45000,  // 화면 밖 외출 확률(모드 전환당)·최대 부재
  propCooldownMs:180000,         // 같은 소품 재기록 쿨다운
  voiceRatioMax:0.4,             // QC5: 별이 100 대비 빼콩 말수 상한(30~40) — 주인공은 별이다
  terseChance:0.4,               // 가끔 동물처럼 — 단문("킁킁.")이 나올 확률
};

/* 빼콩 일기 — 별이 archive와 완전 분리. localStorage 별도 키(백업 blob 제외). */
const ppaeDiary={
  archive:[], LS:'mimesis.ppae.diary.v1', KEEP:60,
  load(){ try{ this.archive=JSON.parse(localStorage.getItem(this.LS)||'[]'); }catch(e){ this.archive=[]; } },
  push(entry){
    this.archive.unshift(entry); this.archive=this.archive.slice(0,this.KEEP);
    try{ localStorage.setItem(this.LS, JSON.stringify(this.archive)); }catch(e){}
    // 모바일에서도 데이터는 계속 쌓인다 — CSS가 표시만 숨김(판정 A)
    const em = entry.emoji ? entry.emoji+' ' : '';   // 행동 아이콘은 항상 (QC 피드백 4)
    const link = entry.eventId ? ' <span class="link" title="별이와 같은 것을 보았다">🔗</span>' : '';
    attachPpaeSide(`<span class="who">🐾 빼콩</span>${em}${entry.text}${link}`, entry.eventId);
  },
};

/* 룰 표: Target Type → Rule → Diary. 문장 풀은 별이와 완전 분리 — 같은 문장 불가 구조.
   별이는 항상 문장, 빼콩은 가끔 동물처럼(short) — 캐릭터의 결 (QC 피드백 5) */
const PPAE_RULES=[
  { m:/flower|blossom|lavender|camellia|dandelion|cosmos|rose|herb|clover/, action:'sniff', emotion:'궁금',
    lines:['향기를 맡아봤다. 코가 간지럽다.','꽃잎을 앞발로 살짝 건드렸다.','벌이 있어서 한 발 물러났다.'],
    short:['킁킁.','벌 있었다.'] },
  { m:/acorn|chestnut|nut|berry|fruit|seed/, action:'pickup', emotion:'신남',
    lines:['도토리 하나를 주웠다.','도토리는 없었다.','굴려봤다. 잘 굴러간다.'],
    short:['하나 먹었다.','없었다.'] },
  { m:/butterfly|moth|bird|crow|sparrow|magpie|swallow/, action:'chase', emotion:'신남',
    lines:['조금 쫓아가다 말았다.','푸드덕 소리에 귀가 섰다.','저건 잡을 수 있을 것 같았는데.'],
    short:['놓쳤다.','다음엔 잡는다.'] },
  { m:/bug|beetle|ant|snail|worm|frog|toad|grasshopper|cricket/, action:'watch', emotion:'궁금',
    lines:['한참 구경했다. 만지진 않았다.','움직임이 수상하다.','앞발을 들었다가 그만뒀다.'],
    short:['……가만.','움직였다.'] },
  { m:/rice|sack|jar|jangdok|pot|kimchi|food|fish|bread/, action:'interest', emotion:'관심',
    lines:['냄새가 났다. 못 먹는 거였다.','뚜껑 밑이 궁금하다.','한 바퀴 돌아보고 왔다.'],
    short:['냄새만.','못 먹는 거.'] },
  { m:/bench|chair|stool|table/, action:'ignore', emotion:'무심',
    lines:['그냥 지나쳤다.','앉을 생각은 없다.','그 밑이 더 아늑해 보였다.'],
    short:['흥.'] },
  { m:/scarecrow|statue|person|human|mailbox/, action:'wary', emotion:'경계',
    lines:['조금 떨어져서 봤다.','움직이면 도망갈 준비를 했다.'],
    short:['……수상하다.'] },
];
const PPAE_FALLBACK={ action:'watch', emotion:'무심',
  lines:['킁킁대다 지나갔다.','별 거 아니었다.','한 번 쳐다보고 말았다.','그 옆 그림자가 더 신경 쓰였다.'],
  short:['킁킁.','……'] };

/* 430: 빼콩이 읽는 흔적 — 온기·냄새만 남았다. 누구였는지는 문장에 없다(계약, validate:parallel). */
const PPAE_TRACE_WARM=['아직 따뜻했다.','사람 냄새가 남아 있었다.','여기 뭔가 있었던 것 같다.','한참 앉아 있었다.'];

const PpaeBrain={
  nextOkAt:0, propSeen:new Map(), lineIdx:new Map(),
  _gapOk(now){ return now>=this.nextOkAt; },
  _bumpGap(now){ this.nextOkAt=now+PPAE_CONFIG.minGapMs+rng()*PPAE_CONFIG.gapJitterMs; },
  _pickLine(rule,type){
    // 가끔 동물처럼 — 단문 풀 우선 (별이는 항상 문장, 빼콩은 가끔 "킁킁.")
    const pool = (rule.short && rng()<PPAE_CONFIG.terseChance) ? rule.short : rule.lines;
    const key=type+':'+pool.length, prev=this.lineIdx.get(key);
    let i=(rng()*pool.length)|0;
    if(pool.length>1 && i===prev) i=(i+1)%pool.length;
    this.lineIdx.set(key,i); return pool[i];
  },
  /* 유일한 경계면 — 향후 AI 엔진이 이 시그니처만 구현하면 된다.
     context: {trigger:'self'|'parallel'|'return', type?, targetId?, eventId?, awayMs?, wet?} */
  observe(ctx){
    const now=Date.now();
    if(ctx.trigger!=='return' && !this._gapOk(now)) return null;
    // QC5: 말수 비율 — 화면의 별이 발화 대비 상한. 별이가 조용하면 빼콩도 조용하다.
    // (return은 예외 — 상태 근거가 있는 드문 사건이라 침묵시키지 않는다)
    if(ctx.trigger!=='return'){
      const by=document.querySelectorAll('#stream .msg.act, #stream .msg.diary, #stream .msg.rare').length;
      const pp=document.querySelectorAll('#stream .ppaeSide').length;
      if(by===0 || pp/by>=PPAE_CONFIG.voiceRatioMax) return null;
    }
    let entry=null;
    if(ctx.trigger==='return'){
      // 근거 있는 일기만: 비(awayWet)+부재+복귀가 모두 실제 상태로 존재할 때만 '젖은 발'
      const sec=Math.round(ctx.awayMs/1000);
      const text=ctx.wet ? '어디 갔다 왔는지 발이 젖어 있다.'
        : (sec>25 ? '한참 만에 돌아왔다. 아무 말 없다.' : '담장 너머를 보고 왔다.');
      entry={ observer:'bbaekkong', targetId:null, targetType:null, action:'return',
        duration:sec, emotion:'무심', text, createdAt:now, eventId:null, emoji:'🐾' };
    } else {
      const def=CATALOG[ctx.type]||RARE[ctx.type];
      const rule=PPAE_RULES.find(r=>r.m.test(ctx.type))||PPAE_FALLBACK;
      // 430: 남은 온기를 읽는다 — 누가 앉아 있었는지는 모른다 (상대 지목 금지)
      const traceWarm = ctx.trace && ctx.trace.kind==='warm';
      entry={ observer:'bbaekkong', targetId:ctx.targetId??null, targetType:ctx.type,
        action:traceWarm?'trace':rule.action, duration:null, emotion:traceWarm?'궁금':rule.emotion,
        text:traceWarm?pickA(PPAE_TRACE_WARM):this._pickLine(rule,ctx.type), createdAt:now,
        eventId:ctx.eventId??null, emoji:(def&&def.emoji)||'🐾' };
    }
    this._bumpGap(now);
    ppaeDiary.push(entry);
    return entry;
  },
  selfEncounter(prop){
    const now=Date.now();
    const seen=this.propSeen.get(prop.id);
    if(seen && now-seen<PPAE_CONFIG.propCooldownMs) return;
    this.propSeen.set(prop.id, now);
    this.observe({ trigger:'self', type:prop.type, targetId:prop.id, trace:readTrace(prop,'ppae') });
  },
  /* 같은 이벤트 다른 기록(판정 B) — 별이 intent.id를 공유 eventId로 */
  parallel(intent, item){
    // 방금 올라간 별이 act 줄에 eventId를 새겨둔다 — 빼콩 말이 그 줄 옆에 앉는 앵커
    const actRow=streamEl.firstElementChild;
    if(actRow && actRow.classList.contains('act')) actRow.dataset.eventId=intent.id;
    if(rng()>=PPAE_CONFIG.parallelObservationRate) return;
    setTimeout(()=>{ this.observe({ trigger:'parallel', type:item.type, targetId:item.id, eventId:intent.id }); },
      1200+rng()*2500);
  },
  returned(awayMs, wet){ this.observe({ trigger:'return', awayMs, wet }); },
};
ppaeDiary.load();

const SEEN_D=190, INTEREST_D=110, ENCOUNTER_D=42;
let currentTarget=null, lastWinDrive=null;
const seenKindsToday=new Set();
let walkClock=0, lastDiaryAt=-999;
const tally={ memories:0, diary:0 };

function updateEncounters(dt){
  const bx=byeoli.worldX;
  let nearest=null,nd=1e9;
  for(const p of props){
    const dist=p.x-bx;
    if(dist<-30){ p.reactedThisPass=false; p.phase='unseen'; continue; }
    if(dist<nd && dist>-30){ nd=dist; nearest=p; }
  }
  currentTarget=nearest;
  if(!nearest){ byeoli.speed=byeoli.baseSpeed; return; }
  const dist=nd, def=nearest.rare?RARE[nearest.type]:CATALOG[nearest.type];

  if(dist<=SEEN_D && nearest.phase==='unseen'){
    nearest.phase='seen';
    const stim=stimOf(nearest);
    for(const d in stim) brain.drive[d]=clamp(brain.drive[d]+stim[d]*0.05,0,1);
  }
  if(dist<=INTEREST_D && dist>ENCOUNTER_D && (nearest.phase==='seen'||nearest.phase==='interested')){
    nearest.phase='interested'; byeoli.speed=byeoli.baseSpeed*0.9;
  }
  if(dist<=ENCOUNTER_D && !nearest.reactedThisPass && byeoli.state==='walk'){
    nearest.phase='encountered'; nearest.reactedThisPass=true;
    const dec=brain.decide(nearest);
    const intent=dec.intent;
    const firstOfKind=!seenKindsToday.has(nearest.type);
    seenKindsToday.add(nearest.type);

    byeoli.actTargetType=nearest.type;   // 428-B: 소품 종류가 행동의 '버전'을 정한다 (벤치=앉기, 나무=기대기)
    // 430: 남의 흔적 — 누가 그랬는지는 모른다. 세상이 조금 달라져 있을 뿐.
    const trace=readTrace(nearest,'byeoli');
    if(nearest.rare){
      // 희귀 = Signature Moment 후보
      pushMsg('rare', `${def.emoji} ${def.ko}! 오늘 운 좋다`, null, def.ko);
      diaryFor(intent, nearest, def, {rare:true, firstOfKind});
      if(!dec.passed) startAction(intent, nearest);
    } else if(dec.passed){
      pushMsg('pass', `${def.emoji} ${def.ko} 그냥 지나침`, null);
      maybeDiary(intent, nearest, def, {passed:true, firstOfKind, trace});
    } else {
      startAction(intent, nearest);
      pushMsg('act', `${def.emoji} <span class="k">${actKo(intent.action)}</span> · ${def.ko}`, `${intent.duration}초`);
      tally.memories++; Profile.bumpMemory(); lastWinDrive=intent.action;
      maybeDiary(intent, nearest, def, {passed:false, firstOfKind, trace});
      PpaeBrain.parallel(intent, nearest); // 427: 같은 이벤트, 빼콩의 다른 기록 (공유 eventId=intent.id)
    }
    updateTally();
  }
}
function startAction(intent, prop){
  byeoli.state='acting'; byeoli.actAction=intent.action;
  byeoli.actTarget=intent.targetId; byeoli.actTimer=intent.duration;
  // 430: 별이가 앉았던 자리엔 온기가 남는다 — 별이는 이걸 모른다
  if(intent.action==='rest') leaveTrace(prop,'byeoli','warm');
  // 430 우연(1%): 사진 찍는 순간 빼콩이 프레임을 가로지른다. 별이는 모르고, 보는 사람만 안다.
  if(intent.action==='record' && rng()<PARALLEL.coincidence){
    ppae.mode='dash'; ppae.modeTimer=0.9; ppae.pauseT=0;
    ppae.targetX = ppae.x<byeoli.screenX ? byeoli.screenX+70 : byeoli.screenX-70;
    ppae.targetY = GROUND_Y;
  }
  // 428-B: 같은 행동도 여러 버전 — 소품 종류 우선, 아니면 그날의 기분(rng)
  const tt=byeoli.actTargetType||'', vr=rng();
  if(intent.action==='rest'){
    byeoli.actVariant = /bench|chair|stool|table/.test(tt)?'sit'
      : /tree|trunk|bamboo/.test(tt)?'lean'
      : (vr<0.4?'sit' : vr<0.7?'squat' : 'shoegaze');
  } else if(intent.action==='record'){
    byeoli.actVariant = vr<0.3?'kneel' : vr<0.5?'tiptoe' : 'stand';
  } else if(intent.action==='observe'){
    byeoli.actVariant = vr<0.45?'lean-in' : 'stand';
  } else byeoli.actVariant=null;
  // 428: 바라봄 — 어떤 행동이든 기록 전에 잠깐 멈춰 그저 본다
  const gz=0.7+rng()*0.5; byeoli.gazeT=gz;
  // 사운드 + 카메라
  if(intent.action==='record'){
    // 별이는 사진 찍는 걸 좋아한다 — 바라본 뒤에야 카메라를 들고, 뜸 들였다 번쩍+찰칵
    setTimeout(()=>{ flash.trigger(); Sound.shutter(); }, gz*1000+260);
  } else {
    Sound.act(intent.action);
  }
}
const actKo=a=>({observe:'관찰',rest:'쉼',record:'사진',wonder:'궁금'}[a]||a);

/* =====================================================================
   DIARY — 채팅 시절 톤. 짧게 + 이모지.
   ===================================================================== */
// drive별 짧은 반응 조각 (variant/journalTags로 구체화)
const D={
  observe:['한참 봄','오래 들여다봄','가만히 봤다','눈이 갔다'],
  rest:['잠깐 앉음','쉬어감','다리 쉬었다','좀 앉았다'],
  record:['찰칵 📸','한 장 찍음','사진에 담음','번쩍, 찍었다','이건 남겨야 해'],
  wonder:['뭐지 싶었다','궁금','신기하다','어디서 왔지'],
};
function pickA(a){ return a[(rng()*a.length)|0]; }

/* 430: 별이가 읽는 흔적 문장 — 주체 없는 관찰만. 상대의 이름이 들어가면 계약 위반이다. */
const BYEOL_TRACE_MOVED=['한쪽으로 굴러 있었다','자리가 조금 달라져 있었다','누가 건드린 것 같기도 하고'];

/* BUILD 429-A — Byeol Voice 경계면 (427 빼콩 F항과 동일 규율)
   별이 일기의 문장 조립은 이 경계 하나를 지난다: compose(intent,item,def,meta) → line.
   429-E에서 안쪽이 Genome 문장집(오늘의 문체) 우선으로 바뀌어도 UI·archive·pushMsg는 불변.
   하드룰: 걷는 중 생성 API 호출 금지 — book은 캐시된 JSON일 뿐이며,
   book 부재·불량·슬롯 불일치는 조용히 rule()로 폴백한다 (429-F: Rule Brain은 영구 폴백). */
const ByeolVoice={
  book:null,   // 429-E: SentenceBook(시간대별) 로드 시 교체 — 지금은 항상 null
  compose(intent,item,def,meta){
    return this.rule(intent,item,def,meta);
  },
  rule(intent,item,def,meta){
    const tag = def.jtags ? pickA(def.jtags) : '';
    // 430: 남이 남긴 흔적을 본다 — 누가 그랬는지는 끝내 모른다 (상대를 지목하는 문장 금지)
    if(meta && meta.trace && meta.trace.kind==='moved' && !meta.rare){
      return `${def.emoji} ${def.ko}, ${pickA(BYEOL_TRACE_MOVED)}`;
    }
    if(meta.rare) return `${def.emoji} ${def.ko}!! ${tag}`;
    if(meta.passed) return `${def.emoji} ${def.ko}.. ${rng()<0.5?'그냥 지나감':'오늘은 안 멈췄다'}`;
    const r=pickA(D[intent.drive]||['음..']);
    const vtxt = item.variant ? item.variant+' ' : '';
    return `${def.emoji} ${vtxt}${def.ko} ${r}. ${tag}`;
  }
};

function maybeDiary(intent, item, def, meta){
  if(walkClock-lastDiaryAt<5) return;
  let write=false;
  if(!meta.passed){ if(intent.duration>=3.2||meta.firstOfKind) write=true; }
  else { if(item.phase!=='unseen' && rng()<0.4) write=true; }
  if(!write) return;
  diaryFor(intent, item, def, meta);
}
function diaryFor(intent, item, def, meta){
  lastDiaryAt=walkClock;
  const line = ByeolVoice.compose(intent, item, def, meta);   // 429-A 경계면 — 조립은 저 안에서만
  const out=()=>{
    pushMsg('diary', line, null);
    tally.diary++; Profile.bumpDiary();
    archive.unshift({ line, intent, date:formatByeoliDate(), epoch:byeoliDayEpoch() }); // Life Archive(별이력 날짜 포함)
    updateTally();
  };
  // 428: 행동 일기는 '바라봄' 뒤에 나온다 — 발견→멈춤→바라봄→기록. (지나침·희귀는 즉시)
  if(meta.passed || meta.rare) out(); else setTimeout(out, 900);
}
const archive=[];

/* =====================================================================
   STREAM UI
   ===================================================================== */
const streamEl=document.getElementById('stream');
const MAXMSG=40;
function pushMsg(cls, html, sub){
  const d=document.createElement('div');
  d.className='msg '+cls;
  d.innerHTML = html + (sub?`<div class="sub">${sub}</div>`:'');
  streamEl.prepend(d);              // 최신이 위
  while(streamEl.children.length>MAXMSG) streamEl.removeChild(streamEl.lastChild);
}
/* 427-QC3: 빼콩 말은 별도 줄이 아니라 별이 줄 옆자리에 앉는다.
   eventId 짝이 있으면 그 줄, 없으면 그 순간의 최신 줄 — 짝과 함께 흘러내린다. */
function attachPpaeSide(html, eventId){
  let row=null;
  if(eventId) row=streamEl.querySelector(`.msg[data-event-id="${eventId}"]`);
  if(!row){
    // 최신 줄부터 빈 옆자리를 찾는다 (겹침은 지금 단계에선 감수 — Vase 판정)
    for(const cand of streamEl.children){
      if(cand.classList.contains('day')) continue;   // 날짜 구분선엔 앉지 않는다
      if(!cand.querySelector('.ppaeSide')){ row=cand; break; }
    }
  }
  if(!row) return false;            // 별이가 아직 아무 말 없음 — 표시만 생략(데이터는 저장됨)
  if(row.querySelector('.ppaeSide')) return false;
  const side=document.createElement('span');
  side.className='ppaeSide';
  side.innerHTML=html;
  row.appendChild(side);
  return true;
}

   인자를 받지 않으므로 Authority 전체 telemetry가 이 UI를 덮어쓸 수 없다.
   (전체 기억/일기 숫자는 사용자 화면에 절대 노출하지 않는다) */

/* ---- 별의 취향 (Habit strength 상위 표시 · 메인은 대표 4개만) ---- */
const tasteListEl=document.getElementById('tasteList');
const tasteHintEl=document.getElementById('tasteHint');
const prevStrength={};   // 감쇠 방향 감지용
function renderTaste(){
  const rows=habitEngine.list(habitEpoch()).filter(r=>r.strength>=0.02);
  const top=rows.slice(0,4);
  if(top.length===0){ tasteHintEl.textContent='— 아직 없음'; tasteListEl.innerHTML=''; return; }

    prevStrength[r.key]=r.strength;
    const meta = r.inactiveLoops===0 ? `count ${r.count} · 방금`
      : `count ${r.count} · ${r.inactiveLoops}별이일 전${decaying?' · 옅어지는 중':''}`;
    return `<div class="trow">
