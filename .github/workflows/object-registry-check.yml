name: Object Registry Check

on:
  pull_request:
    paths:
      - 'src/objects/objectRegistry.ts'
      - 'public/byeoli-walk/index.html'
      - 'functions/byeoli-walk/_middleware.ts'
      - 'scripts/validate-object-registry.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/object-registry-check.yml'
  push:
    branches: [main]
    paths:
      - 'src/objects/objectRegistry.ts'
      - 'public/byeoli-walk/index.html'
      - 'functions/byeoli-walk/_middleware.ts'
      - 'scripts/validate-object-registry.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/object-registry-check.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 게이트가 --experimental-strip-types(Node 22.6+)를 쓴다 — 로컬(24)과 일치시킨다.
          # Node 20 고정이 429-A 이후 모든 push를 exit 9로 떨어뜨렸다 (2026-07-18~19 #89~#99).
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run validate:objects
      - run: npm run build
