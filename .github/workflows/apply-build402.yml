name: Apply BUILD 402 animal life and hand devices

on:
  push:
    paths:
      - '.build402-trigger'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Patch animal life and hand devices
        run: python3 scripts/apply-build402.py
      - name: Build check
        run: npm ci && npm run build
      - name: Commit BUILD 402
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/apply-build402.yml .build402-trigger scripts/apply-build402.py
          git add -A
          git commit -m "BUILD 402: animal animation, free roaming, and hand devices"
          git push
