name: Apply BUILD 392 held devices

on:
  push:
    paths:
      - '.build392-trigger'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Patch held camera and phone
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          p = Path('src/scene/PlanetWorld.tsx')
          s = p.read_text()

          old = "import { loadHandLanternAsset } from '../engine/props';"
          new = "import { loadHandLanternAsset } from '../engine/props';\nimport { loadHeldDeviceAsset } from './heldDevices';"
          if old in s and "loadHeldDeviceAsset" not in s:
              s = s.replace(old, new, 1)

          anchor = "  const byeoliShotAt = useRef(0);"
          insert = """  const heldCameraRef = useRef<THREE.Group | null>(null);\n  const heldPhoneRef = useRef<THREE.Group | null>(null);\n  const heldDeviceTimer = useRef<number | null>(null);\n  const showHeldDevice = (kind: 'camera' | 'phone', durationSec: number) => {\n    const cameraProp = heldCameraRef.current;\n    const phoneProp = heldPhoneRef.current;\n    if (cameraProp) cameraProp.visible = kind === 'camera';\n    if (phoneProp) phoneProp.visible = kind === 'phone';\n    if (heldDeviceTimer.current !== null) window.clearTimeout(heldDeviceTimer.current);\n    heldDeviceTimer.current = window.setTimeout(() => {\n      if (cameraProp) cameraProp.visible = false;\n      if (phoneProp) phoneProp.visible = false;\n      heldDeviceTimer.current = null;\n    }, Math.max(700, durationSec * 1000 + 250));\n  };"""
          if anchor in s and "const heldCameraRef" not in s:
              s = s.replace(anchor, anchor + "\n" + insert, 1)

          old = "    const totalSec = rigRef.current?.playAction?.('SitCamera', repeats) ?? 0;"
          new = old + "\n    if (totalSec > 0) showHeldDevice('camera', totalSec);"
          if old in s and "showHeldDevice('camera'" not in s:
              s = s.replace(old, new, 1)

          old = "    const d = rig.playAction?.('Writing', 1) ?? 0; return { dur: d > 0 ? d + 0.3 : 2.5, sustained: false };"
          new = "    const d = rig.playAction?.('Writing', 1) ?? 0;\n    if (d > 0) showHeldDevice('phone', d);\n    return { dur: d > 0 ? d + 0.3 : 2.5, sustained: false };"
          if old in s:
              s = s.replace(old, new, 1)

          marker = "      // BUILD 258: 밤 랜턴 — 본토 방식(손 뼈 진자 매달기)을 행성 캐릭터에 이식. 랜덤으로 이 산책자가 든다."
          device_block = """      // BUILD 392: 사진/글쓰기 동작의 빈손 해결 — 오른손 뼈에 카메라·휴대폰을 미리 달고, 해당 동작 중에만 보인다.\n      let deviceHand: THREE.Object3D | null = null;\n      group.traverse((n) => { if ((n as THREE.Bone).isBone && /RightHand$/i.test(n.name) && !deviceHand) deviceHand = n; });\n      if (!deviceHand) group.traverse((n) => { if ((n as THREE.Bone).isBone && /LeftHand$/i.test(n.name) && !deviceHand) deviceHand = n; });\n      if (!deviceHand) group.traverse((n) => { if ((n as THREE.Bone).isBone && /hand/i.test(n.name) && !deviceHand) deviceHand = n; });\n      if (deviceHand) {\n        const h = deviceHand as THREE.Object3D;\n        group.updateMatrixWorld(true);\n        const ws = new THREE.Vector3(); h.getWorldScale(ws);\n        const mountDevice = (kind: 'camera' | 'phone') => {\n          const wrapper = new THREE.Group();\n          wrapper.scale.setScalar(1 / Math.max(ws.x, 1e-6));\n          wrapper.visible = false;\n          h.add(wrapper);\n          if (kind === 'camera') {\n            wrapper.position.set(0.015, -0.035, -0.035);\n            wrapper.rotation.set(Math.PI / 2, 0, Math.PI);\n            heldCameraRef.current = wrapper;\n          } else {\n            wrapper.position.set(0.01, -0.025, -0.02);\n            wrapper.rotation.set(Math.PI / 2, 0, Math.PI / 2);\n            heldPhoneRef.current = wrapper;\n          }\n          void loadHeldDeviceAsset(kind).then((device) => {\n            if (!alive) return;\n            wrapper.add(device);\n          }).catch(() => { /* 소품이 없으면 동작만 유지 */ });\n        };\n        mountDevice('camera');\n        mountDevice('phone');\n      }\n"""
          if marker in s and "BUILD 392: 사진/글쓰기 동작의 빈손 해결" not in s:
              s = s.replace(marker, device_block + marker, 1)

          old = "    return () => { alive = false; };\n  }, [holder, walkerIdx]);"
          new = """    return () => {\n      alive = false;\n      if (heldDeviceTimer.current !== null) window.clearTimeout(heldDeviceTimer.current);\n      heldDeviceTimer.current = null;\n      heldCameraRef.current = null;\n      heldPhoneRef.current = null;\n    };\n  }, [holder, walkerIdx]);"""
          if old in s:
              s = s.replace(old, new, 1)

          p.write_text(s)

          a = Path('src/App.tsx')
          t = a.read_text()
          t = re.sub(r"const BUILD_LABEL = '[^']*BUILD 391[^']*';", "const BUILD_LABEL = 'v2.43.0 · BUILD 392 · 사진/글쓰기 빈손 해결 — 카메라·휴대폰 손 부착';", t, count=1)
          a.write_text(t)

          h = Path('src/scene/heldDevices.ts')
          h.write_text("""// BUILD 392: 별이의 손 소품 — 카메라와 휴대폰을 원본 비율로 정규화해 손 뼈에 붙인다.\nimport * as THREE from 'three';\nimport { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';\n\nexport type HeldDeviceKind = 'camera' | 'phone';\n\nfunction loadGlb(url: string): Promise<THREE.Group> {\n  return new Promise((resolve, reject) => {\n    new GLTFLoader().load(url, (gltf) => resolve(gltf.scene as THREE.Group), undefined, reject);\n  });\n}\n\nexport async function loadHeldDeviceAsset(kind: HeldDeviceKind): Promise<THREE.Group> {\n  const raw = await loadGlb(`/assets/props/${kind}.glb`);\n  raw.traverse((node) => {\n    const mesh = node as THREE.Mesh;\n    if (!mesh.isMesh) return;\n    mesh.castShadow = true;\n    mesh.receiveShadow = true;\n    mesh.frustumCulled = false;\n  });\n\n  raw.updateMatrixWorld(true);\n  const box = new THREE.Box3().setFromObject(raw);\n  const size = box.getSize(new THREE.Vector3());\n  const center = box.getCenter(new THREE.Vector3());\n  const longest = Math.max(size.x, size.y, size.z, 1e-6);\n  const target = kind === 'camera' ? 0.16 : 0.13;\n  raw.position.sub(center);\n  raw.scale.setScalar(target / longest);\n\n  const root = new THREE.Group();\n  root.add(raw);\n  return root;\n}\n""")
          PY
      - name: Install and build
        run: |
          npm ci
          npm run build
      - name: Commit BUILD 392
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/apply-build392.yml .build392-trigger
          git add src/scene/PlanetWorld.tsx src/scene/heldDevices.ts src/App.tsx
          git commit -m "BUILD 392: attach camera and phone during signature actions"
          git push
