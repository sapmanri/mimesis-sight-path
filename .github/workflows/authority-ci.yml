name: Authority CI

on:
  pull_request:
    paths:
      - 'authority/**'
      - '.github/workflows/authority-ci.yml'
  push:
    branches:
      - build-407a-single-authority
    paths:
      - 'authority/**'
      - '.github/workflows/authority-ci.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: authority
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: authority/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Validate Wrangler config and bundle
        run: npx wrangler deploy --dry-run --outdir /tmp/byeoli-authority-dist
