name: Apply BUILD 403 Becoming Byeoli

on:
  push:
    paths:
      - '.build403-trigger'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Patch Becoming Byeoli
        run: python3 scripts/apply-build403.py
      - name: Build check
        run: npm ci && npm run build
      - name: Commit BUILD 403
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/apply-build403.yml .build403-trigger scripts/apply-build403.py
          git add -A
          git commit -m "BUILD 403: Becoming Byeoli — habits become identity"
          git push
