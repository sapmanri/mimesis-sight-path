name: Migrate BUILD 404 hand mount

on:
  push:
    paths:
      - '.github/build404-hand-mount.trigger'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply one-time migration
        run: python3 scripts/migrate-build404-hand-mount.py
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Commit migrated source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/scene/PlanetWorld.tsx
          git diff --cached --quiet || git commit -m "BUILD 404: use shared hand mount for camera phone and lantern"
          git push
