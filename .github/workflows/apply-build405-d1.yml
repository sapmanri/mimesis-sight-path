name: Apply BUILD 405-D1

on:
  push:
    paths:
      - '.github/triggers/build405-d1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: python3 scripts/apply-build405-d1.py
      - run: npm ci
      - run: npm run build
      - name: Commit applied source
        run: |
          git config user.name "mimesis-build-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/scene/PlanetWorld.tsx
          if git diff --cached --quiet; then
            echo "No source changes"
          else
            git commit -m "BUILD 405-D1: record 3D habits in shadow mode"
            git push
          fi
