name: Apply BUILD 404 living motion

on:
  push:
    paths:
      - '.build404-trigger'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Patch living motion and hand mounts
        run: python3 scripts/apply-build404.py
      - name: Build check
        run: npm ci && npm run build
      - name: Commit BUILD 404
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/apply-build404.yml .build404-trigger scripts/apply-build404.py
          git add -A
          git commit -m "BUILD 404: living motion and lantern-derived hand mounts"
          git push
