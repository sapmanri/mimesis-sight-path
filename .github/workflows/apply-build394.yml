name: Apply BUILD 394 observation journal
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Patch observation journal
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path('src/App.tsx')
          s = p.read_text()

          s = s.replace(
            "import { TouchTrail } from './components/TouchTrail';",
            "import { TouchTrail } from './components/TouchTrail';\nimport { ObservationJournal, type ByeoliJournalEntry } from './components/ObservationJournal';",
            1,
          )
          s = s.replace(
            "const BUILD_LABEL = 'v2.44.0 · BUILD 393 · 관찰자 나레이션 — 별이의 생각과 행동을 조용히 기록';",
            "const BUILD_LABEL = 'v2.45.0 · BUILD 394 · 별이의 관찰일기 — 문장이 사각사각 써지고 오래된 기록은 흐려짐';",
            1,
          )
          old_state = """  // BUILD 393: 실제 상태 전환에 근거한 제3자 관찰자 나레이션.
          const [byeoliNarration, setByeoliNarration] = useState({ text: '별이는 천천히 주변을 살피며 걷고 있다.', key: 0 });
          const onByeoliNarration = (text: string) => setByeoliNarration({ text, key: Date.now() });"""
          new_state = """  // BUILD 394: 티커가 아니라 누적되는 관찰일기. 최근 기록은 또박또박 써지고 오래된 줄은 희미해진다.
          const [byeoliJournal, setByeoliJournal] = useState<ByeoliJournalEntry[]>([
            { id: 1, text: '별이는 천천히 주변을 살피며 걷고 있다.', at: Date.now() },
          ]);
          const onByeoliNarration = (text: string) => setByeoliJournal((prev) => {
            if (prev[prev.length - 1]?.text === text) return prev;
            return [...prev, { id: Date.now(), text, at: Date.now() }].slice(-12);
          });"""
          if old_state not in s:
            raise SystemExit('journal state anchor not found')
          s = s.replace(old_state, new_state, 1)

          pattern = re.compile(r"        <div key=\{byeoliNarration\.key\} style=\{\{.*?        </div>\n(?=        \{flagWhisper && \()", re.S)
          s, n = pattern.subn("        <ObservationJournal entries={byeoliJournal} />\n", s, count=1)
          if n != 1:
            raise SystemExit(f'old narration card replacement count={n}')

          p.write_text(s)
          PY
      - name: Build check
        run: npm ci && npm run build
      - name: Commit BUILD 394
        run: |
          rm -f .github/workflows/apply-build394.yml .build394-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "BUILD 394: turn observer ticker into a writing journal"
          git push
