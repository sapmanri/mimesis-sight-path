name: Apply architecture foundation

on:
  push:
    paths:
      - '.architecture-foundation-trigger'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install stable extension points
        run: python3 scripts/apply-architecture-foundation.py
      - name: Build check
        run: npm ci && npm run build
      - name: Commit architecture foundation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/apply-architecture-foundation.yml .architecture-foundation-trigger scripts/apply-architecture-foundation.py
          git add -A
          git commit -m "REFACTOR: stable MIMESIS module architecture"
          git push
