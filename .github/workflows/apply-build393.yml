name: Apply BUILD 393 observer narration
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Patch observer narration
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path('src/scene/PlanetWorld.tsx')
          s = p.read_text()

          old = "export function PlanetWorld({ spec, walkerIdx = -1, paused = false, onMemory, onFlag, onEvent, contactRef, apiRef, onByeoliCapture }: { spec: PlanetSpec; walkerIdx?: number; paused?: boolean; onMemory?: (m: PlanetMemory | null) => void; onFlag?: (name: string) => void; onEvent?: (e: PlanetEvent) => void; contactRef?: MutableRefObject<PlanetContact | null>; apiRef?: MutableRefObject<PlanetApi | null>; onByeoliCapture?: (dataUrl: string, reason: 'stage' | 'mood' | 'event') => void }) {"
          new = "export function PlanetWorld({ spec, walkerIdx = -1, paused = false, onMemory, onFlag, onEvent, contactRef, apiRef, onByeoliCapture, onNarration }: { spec: PlanetSpec; walkerIdx?: number; paused?: boolean; onMemory?: (m: PlanetMemory | null) => void; onFlag?: (name: string) => void; onEvent?: (e: PlanetEvent) => void; contactRef?: MutableRefObject<PlanetContact | null>; apiRef?: MutableRefObject<PlanetApi | null>; onByeoliCapture?: (dataUrl: string, reason: 'stage' | 'mood' | 'event') => void; onNarration?: (text: string) => void }) {"
          assert old in s, 'PlanetWorld signature not found'
          s = s.replace(old, new, 1)

          old = "  const onByeoliCaptureRef = useRef(onByeoliCapture);\n  onByeoliCaptureRef.current = onByeoliCapture;\n  const byeoliShotAt = useRef(0);"
          new = "  const onByeoliCaptureRef = useRef(onByeoliCapture);\n  onByeoliCaptureRef.current = onByeoliCapture;\n  const onNarrationRef = useRef(onNarration);\n  onNarrationRef.current = onNarration;\n  const narrationGuard = useRef({ text: '', at: 0 });\n  const narrate = (text: string, minGap = 900) => {\n    const now = performance.now();\n    const prev = narrationGuard.current;\n    if (prev.text === text && now - prev.at < 12000) return;\n    if (now - prev.at < minGap) return;\n    narrationGuard.current = { text, at: now };\n    onNarrationRef.current?.(text);\n  };\n  const propNarrationName = (id: string) => {\n    const prop = propMap.current.get(id);\n    const named = prop?.title?.trim();\n    if (named) return named;\n    const names: Record<string, string> = { chair: '의자', book: '책', 'rock-small': '작은 돌', 'rock-big': '큰 바위', tree: '나무', lighthouse: '등대' };\n    return names[prop?.obj ?? ''] ?? '눈앞의 무언가';\n  };\n  const byeoliShotAt = useRef(0);"
          assert old in s, 'narration ref anchor not found'
          s = s.replace(old, new, 1)

          old = "    const totalSec = rigRef.current?.playAction?.('SitCamera', repeats) ?? 0;\n    if (totalSec > 0) showHeldDevice('camera', totalSec);"
          new = "    const totalSec = rigRef.current?.playAction?.('SitCamera', repeats) ?? 0;\n    if (totalSec > 0) {\n      showHeldDevice('camera', totalSec);\n      narrate('그냥 지나치기에는 아까운 장면이었는지, 별이는 카메라를 들었다.');\n    }"
          assert old in s, 'camera narration anchor not found'
          s = s.replace(old, new, 1)

          old = "    const best = chooseDrive(D, F, stim, T2.restedOnce);\n    T2.acts += 1;"
          new = "    const best = chooseDrive(D, F, stim, T2.restedOnce);\n    const place = propNarrationName(T2.id);\n    const lines: Record<Drive, string> = {\n      observe: `별이는 ${place} 앞에서 작은 부분까지 찬찬히 살펴보고 있다.`,\n      record: `별이는 ${place} 앞에서 떠오른 것을 휴대폰에 적고 있다.`,\n      rest: `별이는 ${place} 곁에서 잠시 숨을 고르기로 했다.`,\n      wonder: `${place}가 자꾸 마음에 걸리는지, 별이는 한동안 시선을 떼지 못한다.`,\n    };\n    narrate(lines[best]);\n    T2.acts += 1;"
          assert old in s, 'drive narration anchor not found'
          s = s.replace(old, new, 1)

          old = "            attractTarget.current = createEncounter(pick.d, pick.id, pick.radius);"
          new = "            attractTarget.current = createEncounter(pick.d, pick.id, pick.radius);\n            narrate(`별이는 ${propNarrationName(pick.id)} 쪽으로 천천히 발걸음을 옮겼다.`);"
          assert old in s, 'destination narration anchor not found'
          s = s.replace(old, new, 1)

          old = "            attractCooldown.current.set(T2.id, 25); // 방금 논 소품 25초 억제(반복 방지)\n            attractTarget.current = null;"
          new = "            attractCooldown.current.set(T2.id, 25); // 방금 논 소품 25초 억제(반복 방지)\n            narrate(`별이는 ${propNarrationName(T2.id)} 곁에 충분히 머문 뒤, 다시 길을 나섰다.`);\n            attractTarget.current = null;"
          assert old in s, 'leave narration anchor not found'
          s = s.replace(old, new, 1)
          p.write_text(s)

          a = Path('src/App.tsx')
          s = a.read_text()
          old = "const BUILD_LABEL = 'v2.43.0 · BUILD 392 · 사진/글쓰기 빈손 해결 — 카메라·휴대폰 손 부착';"
          new = "const BUILD_LABEL = 'v2.44.0 · BUILD 393 · 관찰자 나레이션 — 별이의 생각과 행동을 조용히 기록';"
          assert old in s, 'build label not found'
          s = s.replace(old, new, 1)

          old = "  const [planetPaused, setPlanetPaused] = useState(false); // BUILD 224: 찍기의 평화"
          new = "  const [planetPaused, setPlanetPaused] = useState(false); // BUILD 224: 찍기의 평화\n  // BUILD 393: 실제 상태 전환에 근거한 제3자 관찰자 나레이션.\n  const [byeoliNarration, setByeoliNarration] = useState({ text: '별이는 천천히 주변을 살피며 걷고 있다.', key: 0 });\n  const onByeoliNarration = (text: string) => setByeoliNarration({ text, key: Date.now() });"
          assert old in s, 'planetPaused anchor not found'
          s = s.replace(old, new, 1)

          old = "<PlanetWorld spec={pSpec} walkerIdx={planetWalker} paused={planetPaused} onMemory={setMemCard} onFlag={onFlagPop} onEvent={onPlanetEvent} contactRef={planetContact} apiRef={planetApi} onByeoliCapture={onByeoliCapture} />"
          new = "<PlanetWorld spec={pSpec} walkerIdx={planetWalker} paused={planetPaused} onMemory={setMemCard} onFlag={onFlagPop} onEvent={onPlanetEvent} contactRef={planetContact} apiRef={planetApi} onByeoliCapture={onByeoliCapture} onNarration={onByeoliNarration} />"
          assert old in s, 'PlanetWorld invocation not found'
          s = s.replace(old, new, 1)

          old = "        {flagWhisper && ("
          new = "        <div key={byeoliNarration.key} style={{\n          position: 'fixed', left: '50%', bottom: 46, transform: 'translateX(-50%)', zIndex: 6,\n          width: 'min(620px, calc(100vw - 36px))', padding: '10px 18px 11px', borderRadius: 14,\n          color: '#f2eadb', background: 'rgba(18,24,26,0.68)', border: '1px solid rgba(216,178,110,0.25)',\n          boxShadow: '0 8px 30px rgba(0,0,0,0.18)', backdropFilter: 'blur(9px)', WebkitBackdropFilter: 'blur(9px)',\n          textAlign: 'center', pointerEvents: 'none', animation: 'byeoli-narration-in 0.55s ease-out',\n        }}>\n          <style>{'@keyframes byeoli-narration-in { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }'}</style>\n          <div style={{ fontSize: 9.5, letterSpacing: 2.2, color: '#d8b26e', opacity: 0.82, marginBottom: 4 }}>관찰자의 기록</div>\n          <div style={{ fontSize: 13.5, lineHeight: 1.55, letterSpacing: 0.15 }}>{byeoliNarration.text}</div>\n        </div>\n        {flagWhisper && ("
          assert old in s, 'overlay anchor not found'
          s = s.replace(old, new, 1)
          a.write_text(s)
          PY
      - name: Build check
        run: npm ci && npm run build
      - name: Commit BUILD 393
        run: |
          rm -f .github/workflows/apply-build393.yml .build393-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "BUILD 393: add observer narration ticker"
          git push
