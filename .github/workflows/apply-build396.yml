name: Apply BUILD 396 mobile editor

on:
  push:
    paths:
      - '.build396-trigger'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Patch mobile editor
        run: python3 scripts/apply-build396.py
      - name: Build check
        run: npm ci && npm run build
      - name: Commit BUILD 396
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/apply-build396.yml .build396-trigger scripts/apply-build396.py
          git add -A
          git commit -m "BUILD 396: make planet editor collapsible on mobile"
          git push
