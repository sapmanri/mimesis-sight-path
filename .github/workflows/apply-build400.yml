name: Apply BUILD 400 Life Archive

on:
  push:
    paths:
      - '.build400-trigger'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Patch Life Archive integration
        run: python3 scripts/apply-build400.py
      - name: Build check
        run: npm ci && npm run build
      - name: Commit BUILD 400
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/apply-build400.yml .build400-trigger scripts/apply-build400.py
          git add -A
          git commit -m "BUILD 400: Life Archive — memory before publication"
          git push
