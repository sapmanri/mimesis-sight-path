name: Apply BUILD 399 gaze and hand anchors

on:
  push:
    paths:
      - '.build399-trigger'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Patch gaze and held device anchors
        run: python3 scripts/apply-build399.py
      - name: Build check
        run: npm ci && npm run build
      - name: Commit BUILD 399
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/apply-build399.yml .build399-trigger scripts/apply-build399.py
          git add -A
          git commit -m "BUILD 399: give Byeoli gaze and reuse lantern hand anchor"
          git push
