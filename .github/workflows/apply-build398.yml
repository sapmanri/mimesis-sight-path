name: Apply BUILD 398 journal and held devices

on:
  push:
    paths:
      - '.build398-trigger'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Patch journal and held devices
        run: python3 scripts/apply-build398-devices.py
      - name: Build check
        run: npm ci && npm run build
      - name: Commit BUILD 398
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/apply-build398.yml .github/workflows/apply-build398-label.yml .build398-trigger scripts/apply-build398-devices.py
          git add -A
          git commit -m "BUILD 398: polish journal and stabilize held devices"
          git push
