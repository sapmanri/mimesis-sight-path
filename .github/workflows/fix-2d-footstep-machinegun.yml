name: Fix 2D footstep machinegun

on:
  push:
    branches:
      - fix-2d-footstep-machinegun

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-2d-footstep-machinegun
      - name: Replace oscillator footstep with soft filtered noise
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('public/byeoli-walk/index.html')
          s = p.read_text()
          old = "  step(){ this.blip(120+rng()*30,0.05,'sine',0.04); },       // 발소리"
          new = """  _lastStepAt:0,\n  step(){\n    if(!this.on||!this.ctx||this.ctx.state!=='running') return;\n    const now=performance.now();\n    if(now-this._lastStepAt<360) return;\n    this._lastStepAt=now;\n    const t=this.ctx.currentTime, n=220, buf=this.ctx.createBuffer(1,n,this.ctx.sampleRate), d=buf.getChannelData(0);\n    for(let i=0;i<n;i++){ const env=1-i/n; d[i]=(Math.random()*2-1)*env*env; }\n    const src=this.ctx.createBufferSource(), low=this.ctx.createBiquadFilter(), g=this.ctx.createGain();\n    src.buffer=buf; low.type='lowpass'; low.frequency.setValueAtTime(260+rng()*70,t); low.Q.value=0.7;\n    g.gain.setValueAtTime(0.028,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.045);\n    src.connect(low); low.connect(g); g.connect(this.ctx.destination); src.start(t); src.stop(t+0.05);\n  },       // 발소리: 짧은 저역 노이즈 한 번. tone 반복/중첩 금지"""
          if new in s:
              print('already patched')
          elif old not in s:
              raise SystemExit('target line not found')
          else:
              p.write_text(s.replace(old, new, 1))
              print('patched')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add public/byeoli-walk/index.html
          git commit -m "fix(2d): replace machinegun footstep tone with soft single thump"
          git push
