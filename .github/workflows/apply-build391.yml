name: Apply BUILD 391

on:
  push:
    paths:
      - '.github/BUILD391.patch'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply verified patch
        run: git apply -p1 .github/BUILD391.patch
      - name: Verify build
        run: npm install && npm run build
      - name: Commit BUILD 391
        run: |
          rm .github/BUILD391.patch
          rm .github/workflows/apply-build391.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "BUILD 391: split Byeoli encounter state transitions"
          git push
