<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Byeoli Walk</title>
<style>
  /* ---- MIMESIS pixel palette ---- */
  :root{
    --forest:#355743; --sage:#A7B49A; --beige:#F4F0E7;
    --sky:#dfe7d8; --ground:#3f5a45; --ink:#e6ede4;
    --panel:#12160f; --line:#2b352a; --dim:#5d6a5f;
    --amber:#d98a4a; --petal:#e0748a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0c0f0a;color:var(--ink);
    font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
    -webkit-font-smoothing:none; overflow:hidden;}
  /* 폰 한 화면: 세로로 게임 → 상태바 → 스트림, 전체 100dvh 안에 */
  #app{height:100dvh;max-width:520px;margin:0 auto;display:flex;flex-direction:column;
    background:#0c0f0a;}

  /* ---- 게임 ---- */
  .game-wrap{position:relative;width:100%;flex:0 0 auto;background:var(--sky);}
  canvas#game{image-rendering:pixelated;display:block;width:100%;height:auto;}
  .titlebar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;
    align-items:center;padding:5px 8px;font-size:10px;letter-spacing:.1em;
    color:rgba(255,255,255,.75);text-shadow:0 1px 0 rgba(0,0,0,.3);pointer-events:none;}
  .titlebar b{color:#fff}
  .ctrls{position:absolute;top:3px;right:6px;display:flex;gap:4px;pointer-events:auto;}
  .ctrls button{font:inherit;font-size:10px;background:rgba(18,22,15,.7);color:var(--ink);
    border:1px solid var(--line);padding:3px 7px;cursor:pointer;}
  .ctrls button:active{background:var(--forest)}

  /* ---- Drive 상태바 (항상 보임, 늘고 주는 재미) ---- */
  .drives{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
    padding:7px 9px;background:var(--panel);border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
  .dcell{font-size:9px;color:var(--dim);letter-spacing:.04em}
  .dcell .dl{display:flex;justify-content:space-between;margin-bottom:3px}
  .dcell .dv{color:var(--sage);font-variant-numeric:tabular-nums}
  .dtrack{height:6px;background:#080a07;border:1px solid var(--line);position:relative;overflow:hidden}
  .dfill{position:absolute;inset:0 auto 0 0;background:var(--sage);width:0;transition:width .15s linear}
  .dfill.win{background:var(--amber)}
  .fatline{padding:3px 9px 0;font-size:9px;color:var(--dim);display:flex;justify-content:space-between;background:var(--panel)}
  .fatline .fv{color:var(--petal)}

  /* ---- 별이의 취향 (BUILD 405 Habit) ---- */
  .taste{padding:5px 9px 6px;background:var(--panel);}
  .taste-head{font-size:9px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;margin-bottom:4px;
    display:flex;justify-content:space-between}
  .taste-head #tasteHint{color:var(--sage);text-transform:none;letter-spacing:0}
  .trow{display:grid;grid-template-columns:auto 1fr auto;gap:6px;align-items:center;margin:3px 0;font-size:10px}
  .trow .tk{color:var(--ink)}
  .trow .tk .em{margin-right:3px}
  .ttrack{height:5px;background:#080a07;border:1px solid var(--line);position:relative;overflow:hidden}
  .tfill{position:absolute;inset:0 auto 0 0;background:linear-gradient(90deg,#6c8a72,#A7B49A);width:0;transition:width .3s ease}
  .tfill.decay{background:linear-gradient(90deg,#7a6f52,#b89a6a)}
  .trow .tb{color:var(--sage);font-variant-numeric:tabular-nums;font-size:9px}
  .trow .tmeta{grid-column:1/-1;font-size:8px;color:var(--dim);margin:-1px 0 2px 2px}

  /* ---- 스트림 (두뇌활동 + 일기 통합, 채팅 시절) ---- */
  .stream-head{padding:6px 9px 4px;background:var(--panel);font-size:9px;
    letter-spacing:.14em;color:var(--dim);text-transform:uppercase;
    display:flex;justify-content:space-between;border-top:1px solid var(--line);}
  .stream-head .tally{color:var(--sage)}
  #stream{flex:1 1 auto;overflow:hidden;background:var(--panel);
    padding:2px 9px 10px;display:flex;flex-direction:column;gap:0;
    -webkit-mask-image:linear-gradient(to bottom,#000 62%,transparent 100%);
            mask-image:linear-gradient(to bottom,#000 62%,transparent 100%);}
  /* 최신이 위(맨 앞). 아래로 갈수록 mask로 희미 */
  .msg{font-size:12px;line-height:1.5;padding:2px 0;animation:pop .25s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .msg .em{margin-right:5px}
  .msg.act{color:var(--ink)}
  .msg.act .k{color:var(--sage)}
  .msg.pass{color:var(--dim)}
  .msg.diary{color:#e7dcc4}
  .msg.diary .k{color:var(--amber)}
  .msg.rare{color:#f0d98a}
  .msg.day{color:var(--sage);font-size:10px;letter-spacing:.1em;padding:5px 0 3px;border-top:1px dashed var(--line);margin-top:3px}
  .msg .sub{color:var(--dim);font-size:10px;margin-left:22px}
</style>
</head>
<body>
<div id="app">
  <div class="game-wrap">
    <canvas id="game" width="360" height="150"></canvas>
    <div class="titlebar">
      <span>🌿 <b>Byeoli Walk</b></span>
      <span id="daytag" style="pointer-events:none">별이력 9075.4.11</span>
    </div>
    <div class="ctrls">
      <button id="soundBtn">🔇</button>
      <button id="speedBtn">1×</button>
      <button id="pauseBtn">⏸</button>
      <button id="reseedBtn">↻</button>
    </div>
  </div>

  <div class="drives" id="driveBars"></div>
  <div class="fatline"><span>피로</span><span class="fv" id="fatVal">0.05</span></div>
  <div class="taste" id="taste">
    <div class="taste-head">별이의 취향 <span id="tasteHint">— 아직 없음</span></div>
    <div id="tasteList"></div>
  </div>

  <div class="stream-head">
    <span>별이의 산책</span>
    <span class="tally" id="tally">기억 0 · 일기 0</span>
  </div>
  <div id="stream"></div>
</div>

<script type="module">
import { HABIT_BIAS_MAX, capCombinedBias, createSharedHabitEngine, byeoliDayEpoch, formatByeoliDate } from '/byeoli-walk/brain.js';
/* ---- inlined catalog.mjs ---- */
// TownObject 카탈로그 24종 (Holmes BUILD 확장 스펙)
// stimulus/interactionTags/journalTags/rarity 제공. Brain이 Intent 결정.
const CATALOG = {
  // ---- 자연·관찰 (8) ----
  flower:      { emoji:'🌼', ko:'꽃',       cat:'nature', stim:{observe:.32,wonder:.12}, jtags:['예쁘다','조용','이름모름'], rarity:'common' },
  flowerbed:   { emoji:'🌷', ko:'꽃밭',     cat:'nature', stim:{observe:.30,wonder:.18,record:.10}, jtags:['잔뜩','색색'], rarity:'common' },
  dandelion:   { emoji:'🌱', ko:'홀씨',     cat:'nature', stim:{wonder:.30,observe:.16}, jtags:['후','날아감','소원'], rarity:'uncommon' },
  leaves:      { emoji:'🍂', ko:'낙엽',     cat:'nature', stim:{observe:.20,rest:.10,record:.12}, jtags:['바스락','가을'], rarity:'common' },
  sapling:     { emoji:'🌿', ko:'작은나무', cat:'nature', stim:{observe:.22,wonder:.14}, jtags:['자라는중','작다'], rarity:'common' },
  oldtree:     { emoji:'🌳', ko:'큰나무',   cat:'nature', stim:{observe:.24,rest:.16,wonder:.14}, jtags:['오래됨','그늘','든든'], rarity:'uncommon' },
  puddle:      { emoji:'💧', ko:'웅덩이',   cat:'nature', stim:{observe:.20,wonder:.24,record:.14}, jtags:['비온뒤','비침','첨벙'], rarity:'common' },
  stone:       { emoji:'🪨', ko:'돌멩이',   cat:'nature', stim:{observe:.16,wonder:.10}, jtags:['그냥돌','매끈'], rarity:'common' },
  // ---- 머무름·휴식 (5) ----
  bench:       { emoji:'🪑', ko:'벤치',     cat:'rest', stim:{rest:.38,observe:.10}, jtags:['앉음','누가앉았나','쉼'], rarity:'common' },
  busseat:     { emoji:'🚏', ko:'정류장',   cat:'rest', stim:{rest:.34,wonder:.12}, jtags:['기다림','아무도없음'], rarity:'common' },
  wall:        { emoji:'🧱', ko:'담장',     cat:'rest', stim:{rest:.24,observe:.16}, jtags:['낮다','걸터앉음'], rarity:'common' },
  stairs:      { emoji:'🪜', ko:'계단',     cat:'rest', stim:{rest:.28,observe:.14}, jtags:['그늘','한칸씩'], rarity:'uncommon' },
  platform:    { emoji:'🟫', ko:'평상',     cat:'rest', stim:{rest:.40,observe:.12}, jtags:['드러눕고싶다','시원'], rarity:'uncommon' },
  // ---- 동물·생명 (5) — 빼콩은 별도 타입 ----
  ppaekkong:   { emoji:'🐈‍⬛', ko:'빼콩이', cat:'animal', stim:{wonder:.30,record:.24,observe:.16}, jtags:['빼콩이다','우리집','따라가고싶다'], rarity:'uncommon', special:true },
  streetcat:   { emoji:'🐈', ko:'길고양이', cat:'animal', stim:{wonder:.26,observe:.18,record:.14}, jtags:['낯선','도망감','눈맞춤'], rarity:'common' },
  sparrow:     { emoji:'🐦', ko:'참새',     cat:'animal', stim:{observe:.22,wonder:.20,record:.12}, jtags:['포르르','짹짹','금방감'], rarity:'common' },
  butterfly:   { emoji:'🦋', ko:'나비',     cat:'animal', stim:{wonder:.28,observe:.20,record:.16}, jtags:['팔랑','쫓아감','예쁘다'], rarity:'common' },
  snail:       { emoji:'🐌', ko:'달팽이',   cat:'animal', stim:{observe:.26,wonder:.18}, jtags:['느리다','기다려줌'], rarity:'uncommon' },
  // ---- 동네 사물·기록 (6) ----
  mailbox:     { emoji:'📮', ko:'우체통',   cat:'thing', stim:{record:.26,observe:.10,wonder:.08}, jtags:['편지','기다림','안열림'], rarity:'uncommon' },
  sign:        { emoji:'🪧', ko:'표지판',   cat:'thing', stim:{record:.22,observe:.14}, jtags:['오래됨','글씨흐림'], rarity:'common' },
  board:       { emoji:'📋', ko:'게시판',   cat:'thing', stim:{record:.24,observe:.16,wonder:.10}, jtags:['공지','누가붙임'], rarity:'common' },
  bicycle:     { emoji:'🚲', ko:'자전거',   cat:'thing', stim:{observe:.16,record:.18,wonder:.10}, jtags:['세워둠','주인은'], rarity:'common' },
  window:      { emoji:'🪟', ko:'창문',     cat:'thing', stim:{observe:.18,wonder:.20,record:.12}, jtags:['불켜짐','안이궁금'], rarity:'common' },
  lamp:        { emoji:'💡', ko:'가로등',   cat:'thing', stim:{observe:.14,record:.14,rest:.10}, jtags:['저녁','노란빛'], rarity:'common' },
};

// variant 라벨 (일기 구체성용) — 타입별 몇 개
const VARIANTS = {
  flower:['','비온뒤','담벼락옆','시든'],
  puddle:['','하늘비친','작은'],
  streetcat:['','흰','얼룩','자는'],
  mailbox:['','빨간','녹슨'],
  window:['','불켜진','커튼친'],
};

const CATS = { nature:[], rest:[], animal:[], thing:[] };
for(const k in CATALOG) CATS[CATALOG[k].cat].push(k);

// 희귀 이벤트 4종 (rare, Signature Moment 후보)
const RARE = {
  rainbow:   { emoji:'🌈', ko:'무지개',   stim:{wonder:.5,observe:.3,record:.3}, jtags:['무지개다','오늘운좋다'] },
  shootstar: { emoji:'🌠', ko:'별똥별',   stim:{wonder:.6,record:.3}, jtags:['소원','순식간'] },
  letter:    { emoji:'✉️', ko:'길위편지', stim:{record:.5,wonder:.3,observe:.2}, jtags:['누가흘림','주울까'] },
  whitecat:  { emoji:'🐈', ko:'흰고양이', stim:{wonder:.5,observe:.3,record:.3}, jtags:['처음보는','새하얀'] },
};

// 배치 비율 (Holmes 스펙: 48개 전후)
const PLAN = {
  flower:6, flowerbed:2, sapling:2, oldtree:1, leaves:2, puddle:2, stone:2, dandelion:1,
  bench:3, busseat:1, wall:2, stairs:1, platform:1,
  ppaekkong:1, streetcat:2, sparrow:2, butterfly:2, snail:1,
  mailbox:2, sign:2, board:1, bicycle:3, window:3, lamp:2,
};

function buildTown(rng){
  const items=[];
  // 계획대로 목록 생성
  const pool=[];
  for(const type in PLAN){ for(let i=0;i<PLAN[type];i++) pool.push(type); }
  // 셔플
  for(let i=pool.length-1;i>0;i--){ const j=(rng()*(i+1))|0; [pool[i],pool[j]]=[pool[j],pool[i]]; }

  let x=150, idx=0;
  for(const type of pool){
    const def=CATALOG[type];
    const gap = def.cat==='animal' ? 300 + (rng()*160|0)
              : def.rarity==='uncommon' ? 160 + (rng()*100|0)
              : 100 + (rng()*70|0);
    x += gap;
    const vs=VARIANTS[type]; const variant = vs ? vs[(rng()*vs.length)|0] : '';
    items.push({
      id:`${type}-${variant||'a'}-${idx}`, type, variant,
      x, layer: def.cat==='thing'||type==='oldtree'?'middle':'front',
      phase:'unseen', reactedThisPass:false,
    });
    idx++;
  }
  // 희귀 이벤트: 5% 확률로 1개 삽입
  let rareItem=null;
  if(rng()<0.05){
    const keys=Object.keys(RARE); const rk=keys[(rng()*keys.length)|0];
    const rx=200+(rng()*(x-400))|0;
    rareItem={ id:`rare-${rk}-${idx}`, type:rk, variant:'', x:rx, layer:'middle',
      phase:'unseen', reactedThisPass:false, rare:true };
    items.push(rareItem); items.sort((a,b)=>a.x-b.x);
  }
  return { items, worldLen:x+200, rareItem };
}


const cv=document.getElementById('game'), ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;
const W=cv.width, H=cv.height, GROUND_Y=H-30;

/* ---- 시드 난수 (재현성) ---- */
function makeRNG(seed){let s=seed>>>0;return()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296;};}
let SEED=(Math.random()*1e9)|0, rng=makeRNG(SEED);
function clamp(v,a,b){return v<a?a:v>b?b:v;}

/* =====================================================================
   BRAIN — 임시 구현. ByeoliActionIntent 계약 준수.
   ===================================================================== */
const DRIVES=['observe','rest','record','wonder'];
const THRESHOLD=0.58;
let intentCounter=0;

function stimOf(item){
  if(item.rare) return RARE[item.type].stim;
  return CATALOG[item.type].stim;
}

/* =====================================================================
   HABIT ENGINE — BUILD 405-A(축적) / 405-B(감쇠)
   key = targetType:drive · strength = repetition × recency × consistency
   habitBias max +0.15 · combinedBias(habit+personality) max +0.18
   Memory는 불변, Habit strength만 산책 루프 단위로 감쇠.
   ===================================================================== */
let loopCount=0;   // 2D 산책 연출용 루프 수(취향 시간과 분리)
const habitEpoch=()=>byeoliDayEpoch();
const habitEngine=createSharedHabitEngine(habitEpoch());

const brain={
  drive:{observe:.30,rest:.22,record:.26,wonder:.34},
  fatigue:.05,
  tick(dt,walking){
    for(const d of DRIVES) this.drive[d]=clamp(this.drive[d]+(0.009+rng()*0.004)*dt,0,1);
    this.fatigue=clamp(this.fatigue+(walking?0.009:-0.03)*dt,0,1);
  },
  decide(item){
    const stim=stimOf(item);
    const rand=(rng()-0.5)*0.16;
    const type=item.type;
    let best=null,bestScore=-1,bestParts=null;
    for(const d of DRIVES){
      const cur=this.drive[d], objectStimulus=stim[d]||0;
      const habitBias = item.rare?0:habitEngine.bias(type,d,habitEpoch());
      const personalityBias=0;   // 405-C 자리
      const combined=capCombinedBias(habitBias,personalityBias);
      const score=cur+objectStimulus+combined-this.fatigue+rand;
      if(score>bestScore){ bestScore=score; best=d;
        bestParts={cur,objectStimulus,habitBias,personalityBias,combined}; }
    }
    const thr = item.rare ? 0.30 : THRESHOLD;
    const passed = bestScore<thr;
    if(!passed){ this.drive[best]=clamp(this.drive[best]-0.45,0,1);
                 this.fatigue=clamp(this.fatigue-0.16,0,1);
                 // 취향 기록: 행동한 것만 (pass는 취향 아님)
                 habitEngine.record(type,best,habitEpoch()); }
    const intent={
      id:'intent-'+(intentCounter++),
      action: passed?'pass':best,
      targetId:item.id, targetType:type,
      duration: passed?0:+(1.8+this.drive[best]*2.6+rng()*1.2).toFixed(1),
      drive:best, score:+bestScore.toFixed(3),
      reason:{ currentDrive:+bestParts.cur.toFixed(3), objectStimulus:+bestParts.objectStimulus.toFixed(3),
        habitBias:+bestParts.habitBias.toFixed(4), personalityBias:bestParts.personalityBias,
        fatiguePenalty:+this.fatigue.toFixed(3), randomness:+rand.toFixed(3) },
      context:{ worldType:'town-2d', timestamp:Date.now(), seed:SEED },
    };
    return { intent, passed, bestScore, best };
  }
};

/* =====================================================================
   SOUND — WebAudio 코드 생성음 (파일 없음, 8비트 톤)
   ===================================================================== */
// 무음 WAV (미디어 채널 승격용 — <audio> 루프로 재생하면 오디오 세션이 '벨소리'가 아닌 '미디어'가 됨)
const SILENT_WAV='data:audio/wav;base64,UklGRjIAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQ4AAAAAAAAAAAAAAAAAAAAAAAA=';
const Sound={
  ctx:null, on:false, _silentEl:null, _listenersInstalled:false,   // on:false로 시작 (버튼 🔇와 일치)
  ensure(){
    if(!this.ctx){ try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    if(!this.ctx) return;
    if(this.ctx.state!=='running') this.ctx.resume();   // 요청만 — 동기 결과 검사하지 않음
  },
  _blipEmpty(){
    if(!this.ctx) return;
    try{ const b=this.ctx.createBuffer(1,1,22050), s=this.ctx.createBufferSource();
      s.buffer=b; s.connect(this.ctx.destination); (s.start||s.noteOn).call(s,0); }catch(e){}
  },
  // iOS 3중 자물쇠 — 반드시 사용자 제스처 콜스택 안에서 동기 실행
  wake(){
    // ② 세션 승격 (iOS 16.4+): Web Audio를 '벨소리'가 아닌 '미디어' 채널로 → 무음 스위치 무시
    try{ const nav=navigator; if(nav.audioSession) nav.audioSession.type='playback'; }catch(e){}
    // ② 구형 커버: 무음 <audio> 루프가 세션을 미디어로 끌어올림
    // ⚠ 소리가 켜진 경우에만 루프 유지. (전역 제스처 리스너가 매 클릭 wake를 부르므로,
    //    on 가드 없으면 소리 꺼도 아무 탭에서 무음 루프가 되살아나 "안 꺼지는" 증상이 됨)
    if(this.on){
      if(!this._silentEl){
        try{ this._silentEl=new Audio(SILENT_WAV); this._silentEl.loop=true; this._silentEl.playsInline=true; }catch(e){ this._silentEl=null; }
      }
      if(this._silentEl && this._silentEl.paused) { this._silentEl.play().catch(()=>{}); }
    }
    // ③ 빈 버퍼 의식 + 컨텍스트 resume (제스처 안에서)
    this.ensure();
    this._blipEmpty();
  },
  // 소리 끌 때: 무음 미디어 루프를 멈춰 세션 점유 해제 (안 그러면 "꺼도 안 꺼진" 느낌 + 컨텍스트가 계속 살아있음)
  sleep(){
    if(this._silentEl && !this._silentEl.paused){ try{ this._silentEl.pause(); }catch(e){} }
    this.stopWeather();
  },
  // 소리 재생 직전: 이미 running이면 아무것도 안 한다 (매 발소리마다 resume을 때리면
  // 데스크톱에서 스케줄링이 꼬여 발소리가 빨라짐 — 아이폰 작업 전엔 없던 회귀).
  // suspended일 때만 resume 요청하고, running일 때만 true → 소리는 컨텍스트 열린 뒤부터 정상.
  _ready(){ if(!this.ctx) return false; if(this.ctx.state==='suspended') this.ctx.resume(); return this.ctx.state==='running'; },
  installGestureUnlock(){
    if(this._listenersInstalled) return;
    this._listenersInstalled=true;
    const wake=()=>this.wake();
    // touchend·click·pointerup이 진짜 열쇠 (구형 iOS는 touchstart/pointerdown 무효일 수 있음). 나머지는 조기 시도.
    ['touchend','click','pointerup','pointerdown','touchstart','keydown'].forEach(ev=>window.addEventListener(ev,wake,{passive:true}));
    // 백그라운드 갔다 오면 iOS가 컨텍스트를 정지 → 돌아올 때 되살리고, 켜져 있으면 무음 루프 재시도
    document.addEventListener('visibilitychange',()=>{
      if(!document.hidden){
        if(this.ctx && this.ctx.state!=='running') this.ctx.resume();
        if(this.on && this._silentEl && this._silentEl.paused) this._silentEl.play().catch(()=>{});
      }
    });
  },
  blip(freq, dur, type='square', vol=0.12){
    if(!this.on||!this.ctx||this.ctx.state!=='running') return;   // resume 호출 안 함 — currentTime 안정 유지(따발총 원인 제거)
    const t=this.ctx.currentTime, o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(this.ctx.destination); o.start(t); o.stop(t+dur);
  },
  // 카메라 셔터: 짧은 노이즈 클릭 + 고음 → "찰칵"
  shutter(){
    if(!this.on||!this._ready()) return;
    const t=this.ctx.currentTime;
    // 찰-칵: 두 번의 짧은 노이즈 클릭만 (톤음 없음 → 이벤트음처럼 안 들림)
    const click=(when,vol)=>{
      const buf=this.ctx.createBuffer(1,300,44100), d=buf.getChannelData(0);
      for(let i=0;i<300;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/300,4);
      const n=this.ctx.createBufferSource(); n.buffer=buf;
      const g=this.ctx.createGain(); g.gain.value=vol;
      const f=this.ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=2000;
      n.connect(f); f.connect(g); g.connect(this.ctx.destination); n.start(when);
    };
    click(t,0.20);           // 찰
    click(t+0.06,0.14);      // 칵
  },
  _lastStepAt:0,
  step(){
    if(!this.on||!this.ctx||this.ctx.state!=='running') return;
    const now=performance.now();
    if(now-this._lastStepAt<360) return;
    this._lastStepAt=now;
    const t=this.ctx.currentTime, n=220, buf=this.ctx.createBuffer(1,n,this.ctx.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++){ const env=1-i/n; d[i]=(Math.random()*2-1)*env*env; }
    const src=this.ctx.createBufferSource(), low=this.ctx.createBiquadFilter(), g=this.ctx.createGain();
    src.buffer=buf; low.type='lowpass'; low.frequency.setValueAtTime(260+rng()*70,t); low.Q.value=0.7;
    g.gain.setValueAtTime(0.028,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.045);
    src.connect(low); low.connect(g); g.connect(this.ctx.destination); src.start(t); src.stop(t+0.05);
  },       // 발소리: 짧은 저역 노이즈 한 번. tone 반복/중첩 금지
  act(drive){ // record는 여기서 소리 안 냄 (startAction이 셔터음 전담)
    const f={observe:520,rest:330,wonder:700}[drive];
    if(f) this.blip(f,0.12,'triangle',0.08); },
  rain(){ /* 빗소리는 루프 노이즈로 별도 */ },
  weatherLoop:null,
  startWeather(kind){
    if(!this.on||!this._ready()) return; this.stopWeather();
    // 화이트노이즈 루프 (비=쏴, 눈=거의 무음이라 생략)
    if(kind!=='rain') return;
    const bufSize=2*this.ctx.sampleRate, buf=this.ctx.createBuffer(1,bufSize,this.ctx.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++) d[i]=(Math.random()*2-1)*0.5;
    const src=this.ctx.createBufferSource(); src.buffer=buf; src.loop=true;
    const filt=this.ctx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=1200;
    const g=this.ctx.createGain(); g.gain.value=0.05;
    src.connect(filt); filt.connect(g); g.connect(this.ctx.destination); src.start();
    this.weatherLoop={src,g};
  },
  stopWeather(){ if(this.weatherLoop){ try{this.weatherLoop.src.stop();}catch(e){} this.weatherLoop=null; } },
};

const flash={ on:false, timer:0, trigger(){ this.on=true; this.timer=0.18; } };

  if(!flash || !flash.on) return;
  const a=clamp(flash.timer/0.18,0,1);
  ctx.fillStyle=`rgba(255,255,255,${a*0.7})`;

}

/* =====================================================================
   SKY & WEATHER — 임시 랜덤 순환.
   ⚠ 시간체계(별이력)는 나중에 3D와 동기화 예정. 지금은 이 블록만 랜덤.
   동기화 시 sky.phase / sky.t 를 외부 시계로 주입하면 됨.
   ===================================================================== */
const SKY_PHASES=['dawn','day','dusk','night'];
// 별이력 하루 = 현실 60초 (byeoliTime.ts의 BYEOLI_DAY_SECONDS와 일치, 연출용 상수).
// 하늘은 자체 시계가 아니라 '현재 별이력 시각'을 따라간다 → 탭을 내렸다 열어도
// rAF와 무관하게 항상 올바른 시간대가 즉시 나온다(절대시간 동기화).
const BYEOLI_DAY_MS=60*1000;
function skyProgressNow(){ return ((Date.now()%BYEOLI_DAY_MS)/BYEOLI_DAY_MS); } // 0~1 하루 진행도
const sky={
  t:0,               // 0~1 하루 진행도 (skyProgressNow로 매 tick 재계산)
  phase:'day',
  cloudDark:false,   // 먹구름 여부
  clouds:[],
  weather:'clear',   // clear | rain | snow
  weatherTimer:12,   // 다음 날씨 전환까지(초)
  particles:[],      // 비/눈 입자
  flybys:[],         // 하늘 이벤트 (비행기/새떼/헬기/고질라)
  flybyTimer:6,      // 다음 이벤트까지(초)
  reset(){
    this.t=skyProgressNow(); this.cloudDark=false;
    this.weather='clear'; this.weatherTimer=8+rng()*12; this.particles=[];
    this.clouds=[]; this.flybys=[]; this.flybyTimer=5+rng()*8;
    for(let i=0;i<4;i++) this.clouds.push({x:rng()*W, y:8+rng()*30, w:20+rng()*24, spd:2+rng()*4, dark:false});
  },
  tick(dt){
    this.t=skyProgressNow();   // 자체 증가가 아니라 절대시간에서 읽음
    // phase 판정
    this.phase = this.t<0.15?'dawn' : this.t<0.5?'day' : this.t<0.62?'dusk' : 'night';
    // 구름 이동
    for(const c of this.clouds){ c.x-=c.spd*dt; if(c.x<-c.w-10){ c.x=W+10; c.y=8+rng()*30; c.w=20+rng()*24; c.dark=this.cloudDark&&rng()<0.6; } }
    // 날씨 전환 (랜덤)
    this.weatherTimer-=dt;
    if(this.weatherTimer<=0){
      const r=rng();
      if(this.weather==='clear'){
        // 맑음 → 가끔 비/눈. 밤/추운 느낌이면 눈 확률 ↑ (임시로 랜덤)
        if(r<0.28){ this.weather = rng()<0.5?'rain':'snow'; this.cloudDark = this.weather==='rain';
                    for(const c of this.clouds) c.dark=this.cloudDark&&rng()<0.7;
                    Sound.startWeather(this.weather); }
        this.weatherTimer=10+rng()*14;
      }else{
        this.weather='clear'; this.cloudDark=false;
        for(const c of this.clouds) c.dark=false;
        Sound.stopWeather();
        this.weatherTimer=12+rng()*16;
      }
    }
    // 강수 입자 생성
    if(this.weather!=='clear'){
      const rate = this.weather==='rain'?3:1.6;
      for(let i=0;i<rate;i++) if(rng()<0.9) this.spawnDrop();
    }
    this.updateParticles(dt);
    // 하늘 이벤트 (비행기/새/헬기/고질라)
    this.flybyTimer-=dt;
    if(this.flybyTimer<=0){ this.spawnFlyby(); this.flybyTimer=8+rng()*14; }
    for(const f of this.flybys){
      f.x+=f.vx*dt; f.phase+=dt*f.flap;
      if(f.kind==='godzilla') f.stompT=(f.stompT||0)+dt;  // 걸음 타이밍
    }
    // 화면 밖으로 나간 것 제거 (방향에 따라)
    this.flybys=this.flybys.filter(f=> f.vx<0 ? f.x>-f.w-20 : f.x<W+f.w+20 );
  },
  spawnFlyby(){
    const roll=rng();
    // 확률: 새떼 40% / 비행기 28% / 헬기 22% / 고질라 10% (고질라는 레어)
    let kind = roll<0.40?'birds' : roll<0.68?'plane' : roll<0.90?'heli' : 'godzilla';
    const dir = rng()<0.5?-1:1;                 // 진행 방향
    const fromX = dir<0 ? W+30 : -30;
    if(kind==='birds'){
      // 새떼는 여러 마리를 살짝 흩어서
      const n=3+((rng()*4)|0), baseY=14+rng()*26;
      for(let i=0;i<n;i++) this.flybys.push({
        kind:'bird', x:fromX - dir*(i*10+rng()*8), y:baseY+(rng()*10-5),
        vx:dir*(26+rng()*10), w:6, phase:rng()*6, flap:9+rng()*4, dir });
    } else if(kind==='plane'){
      this.flybys.push({ kind:'plane', x:fromX, y:12+rng()*18, vx:dir*(42+rng()*14), w:22, phase:0, flap:0, dir, trail:[] });
    } else if(kind==='heli'){
      this.flybys.push({ kind:'heli', x:fromX, y:16+rng()*22, vx:dir*(30+rng()*10), w:16, phase:0, flap:40, dir });
    } else {
      // 고질라: 지평선 뒤로 큼직하게, 느리게. (희귀 이벤트)
      this.flybys.push({ kind:'godzilla', x:fromX, y:GROUND_Y, vx:dir*(14+rng()*6), w:34, phase:0, flap:0, dir, stompT:0 });
    }
  },
  spawnDrop(){
    const rainy=this.weather==='rain';
    this.particles.push({
      x:rng()*(W+40)-20, y:-4,
      vx: rainy? -18 : -6-rng()*6,
      vy: rainy? 150+rng()*40 : 34+rng()*16,
      kind: rainy?'rain':'snow', life:1, bounce:0,
      sway: rng()*Math.PI*2,
    });
  },
  updateParticles(dt){
    const bY=GROUND_Y, GRAV=520;
    const bx=byeoli.screenX, byTop=bY-27, byBot=bY, half=7;
    for(const p of this.particles){
      const isRain=p.kind==='rain';
      // 중력: 비는 튕긴 뒤, 눈은 항상 약하게 (부유감)
      if(isRain){ if(p.bounce>0) p.vy += GRAV*dt; }
      else { p.vy += 40*dt; }   // 눈은 늘 살살 내려앉음
      p.x+=p.vx*dt;
      if(!isRain && p.bounce===0){ p.sway+=dt*3; p.x+=Math.sin(p.sway)*0.4; }
      p.y+=p.vy*dt;
      // 캐릭터 충돌
      if(p.bounce<2 && p.x>bx-half && p.x<bx+half && p.y>byTop && p.y<byBot && p.vy>0){
        if(isRain){
          p.vy = -Math.abs(p.vy)*0.28;                 // 비: 살짝 튀어오름
          p.vx = (p.x<bx?-1:1)*(30+rng()*30);
        } else {
          p.vy = Math.abs(p.vy)*0.3;                   // 눈: 위로 안 감. 속도만 죽임
          p.vx = (p.x<bx?-1:1)*(12+rng()*10);          // 옆으로 스르륵
        }
        p.bounce++; p.life-=0.12;
      }
      // 바닥 충돌
      if(p.y>=bY){
        if(isRain && p.bounce<2 && Math.abs(p.vy)>40){
          p.vy=-Math.abs(p.vy)*0.3; p.vx*=0.4; p.bounce++; p.y=bY-1;   // 비만 통통
        } else { p.y=bY; p.vy=0; p.vx=0; p.life-=dt*(isRain?4:2.5); }  // 눈은 쌓였다 사라짐
      }
    }
    this.particles=this.particles.filter(p=>p.life>0 && p.y<H+10 && p.y>-20);
    if(this.particles.length>200) this.particles.splice(0, this.particles.length-200);
  }
};

const byeoli={ worldX:0, screenX:90, speed:62, baseSpeed:62,

/* =====================================================================
   빼콩이 — 흰 고양이 companion. 자유 로밍.
   별이 근처를 앞뒤로 마구 돌아다니다, 가끔 별이를 따라 걷다가, 또 제멋대로.
   화면좌표계에서 별이(screenX) 기준 상대 위치로 산다.
   ===================================================================== */
const ppae={
  x:130, y:GROUND_Y,        // 화면좌표
  vx:0, vy:0,
  facing:1, phase:0,
  mode:'roam',              // roam | follow | idle | dash
  modeTimer:1.5,
  targetX:130, targetY:GROUND_Y,
  reset(){ this.x=byeoli.screenX+40; this.y=GROUND_Y; this.mode='roam'; this.modeTimer=1+rng()*2; this.pickTarget(); },
  pickTarget(){
    const bx=byeoli.screenX;
    if(this.mode==='follow'){ this.targetX=bx-10-rng()*20; this.targetY=GROUND_Y; }
    else if(this.mode==='dash'){ this.targetX=clamp(bx + (rng()<0.5?-1:1)*(50+rng()*70), 20, W-20); this.targetY=GROUND_Y; }
    else if(this.mode==='idle'){ this.targetX=this.x; this.targetY=GROUND_Y; }
    else { // roam: 별이 주변 아무데나 (앞뒤, 살짝 위아래=폴짝)
      this.targetX=clamp(bx + (rng()*160-80), 20, W-20);
      this.targetY=GROUND_Y - (rng()<0.3?(8+rng()*12):0); // 가끔 폴짝
    }
  },
  tick(dt){
    this.modeTimer-=dt;
    if(this.modeTimer<=0){
      // 모드 전환: 고양이답게 변덕
      const r=rng();
      this.mode = r<0.34?'roam' : r<0.55?'follow' : r<0.72?'idle' : 'dash';
      this.modeTimer = this.mode==='idle'?(0.6+rng()*1.4)
                     : this.mode==='dash'?(0.3+rng()*0.4)
                     : (0.8+rng()*1.8);
      this.pickTarget();
    }
    // 목표로 이동 (dash는 빠르게)
    const sp = this.mode==='dash'?150 : this.mode==='follow'?70 : 48;
    const dx=this.targetX-this.x, dy=this.targetY-this.y;
    if(Math.abs(dx)>1) this.x += Math.sign(dx)*Math.min(Math.abs(dx), sp*dt), this.facing=dx<0?-1:1;
    // 위아래 폴짝 (부드럽게 복귀)
    if(Math.abs(dy)>0.5) this.y += Math.sign(dy)*Math.min(Math.abs(dy), 60*dt);
    else this.y += (GROUND_Y-this.y)*Math.min(1,dt*6);
    // 목표 도달하면 roam은 새 목표
    if(this.mode==='roam' && Math.abs(dx)<3 && rng()<0.04) this.pickTarget();
    // 별이한테서 너무 멀어지면 따라오기
    if(Math.abs(this.x-byeoli.screenX)>150){ this.mode='follow'; this.pickTarget(); }
    this.phase+=dt*(this.mode==='dash'?16:8);
  }
};

const SEEN_D=190, INTEREST_D=110, ENCOUNTER_D=42;
let currentTarget=null, lastWinDrive=null;
const seenKindsToday=new Set();
let walkClock=0, lastDiaryAt=-999;
const tally={ memories:0, diary:0 };

function updateEncounters(dt){
  const bx=byeoli.worldX;
  let nearest=null,nd=1e9;
  for(const p of props){
    const dist=p.x-bx;
    if(dist<-30){ p.reactedThisPass=false; p.phase='unseen'; continue; }
    if(dist<nd && dist>-30){ nd=dist; nearest=p; }
  }
  currentTarget=nearest;
  if(!nearest){ byeoli.speed=byeoli.baseSpeed; return; }
  const dist=nd, def=nearest.rare?RARE[nearest.type]:CATALOG[nearest.type];

  if(dist<=SEEN_D && nearest.phase==='unseen'){
    nearest.phase='seen';
    const stim=stimOf(nearest);
    for(const d in stim) brain.drive[d]=clamp(brain.drive[d]+stim[d]*0.05,0,1);
  }
  if(dist<=INTEREST_D && dist>ENCOUNTER_D && (nearest.phase==='seen'||nearest.phase==='interested')){
    nearest.phase='interested'; byeoli.speed=byeoli.baseSpeed*0.9;
  }
  if(dist<=ENCOUNTER_D && !nearest.reactedThisPass && byeoli.state==='walk'){
    nearest.phase='encountered'; nearest.reactedThisPass=true;
    const dec=brain.decide(nearest);
    const intent=dec.intent;
    const firstOfKind=!seenKindsToday.has(nearest.type);
    seenKindsToday.add(nearest.type);

    if(nearest.rare){
      // 희귀 = Signature Moment 후보
      pushMsg('rare', `${def.emoji} ${def.ko}! 오늘 운 좋다`, null, def.ko);
      diaryFor(intent, nearest, def, {rare:true, firstOfKind});
      if(!dec.passed) startAction(intent);
    } else if(dec.passed){
      pushMsg('pass', `${def.emoji} ${def.ko} 그냥 지나침`, null);
      maybeDiary(intent, nearest, def, {passed:true, firstOfKind});
    } else {
      startAction(intent);
      pushMsg('act', `${def.emoji} <span class="k">${actKo(intent.action)}</span> · ${def.ko}`, `${intent.duration}초`);
      tally.memories++; lastWinDrive=intent.action;
      maybeDiary(intent, nearest, def, {passed:false, firstOfKind});
    }
    updateTally();
  }
}
function startAction(intent){
  byeoli.state='acting'; byeoli.actAction=intent.action;
  byeoli.actTarget=intent.targetId; byeoli.actTimer=intent.duration;
  // 사운드 + 카메라
  if(intent.action==='record'){
    // 별이는 사진 찍는 걸 좋아한다 — 잠깐 뜸 들였다 번쩍+찰칵
    setTimeout(()=>{ flash.trigger(); Sound.shutter(); }, 260);
  } else {
    Sound.act(intent.action);
  }
}
const actKo=a=>({observe:'관찰',rest:'쉼',record:'사진',wonder:'궁금'}[a]||a);

/* =====================================================================
   DIARY — 채팅 시절 톤. 짧게 + 이모지.
   ===================================================================== */
// drive별 짧은 반응 조각 (variant/journalTags로 구체화)
const D={
  observe:['한참 봄','오래 들여다봄','가만히 봤다','눈이 갔다'],
  rest:['잠깐 앉음','쉬어감','다리 쉬었다','좀 앉았다'],
  record:['찰칵 📸','한 장 찍음','사진에 담음','번쩍, 찍었다','이건 남겨야 해'],
  wonder:['뭐지 싶었다','궁금','신기하다','어디서 왔지'],
};
function pickA(a){ return a[(rng()*a.length)|0]; }

function maybeDiary(intent, item, def, meta){
  if(walkClock-lastDiaryAt<5) return;
  let write=false;
  if(!meta.passed){ if(intent.duration>=3.2||meta.firstOfKind) write=true; }
  else { if(item.phase!=='unseen' && rng()<0.4) write=true; }
  if(!write) return;
  diaryFor(intent, item, def, meta);
}
function diaryFor(intent, item, def, meta){
  lastDiaryAt=walkClock;
  const tag = def.jtags ? pickA(def.jtags) : '';
  let line;
  if(meta.rare){
    line = `${def.emoji} ${def.ko}!! ${tag}`;
  } else if(meta.passed){
    line = `${def.emoji} ${def.ko}.. ${rng()<0.5?'그냥 지나감':'오늘은 안 멈췄다'}`;
  } else {
    const r=pickA(D[intent.drive]||['음..']);
    const vtxt = item.variant ? item.variant+' ' : '';
    line = `${def.emoji} ${vtxt}${def.ko} ${r}. ${tag}`;
  }
  pushMsg('diary', line, null);
  tally.diary++;
  archive.unshift({ line, intent, date:formatByeoliDate(), epoch:byeoliDayEpoch() }); // Life Archive(별이력 날짜 포함)
  updateTally();
}

function renderTaste(){
  const rows=habitEngine.list(habitEpoch()).filter(r=>r.strength>=0.02);
  const top=rows.slice(0,4);
  if(top.length===0){ tasteHintEl.textContent='— 아직 없음'; tasteListEl.innerHTML=''; return; }
  tasteHintEl.textContent = `${formatByeoliDate()} · 취향 ${rows.length}개 형성 중`;
  tasteListEl.innerHTML = top.map(r=>{
    const def=CATALOG[r.targetType]||RARE[r.targetType]||{emoji:'·',ko:r.targetType};
    const decaying = (prevStrength[r.key]!==undefined && r.strength < prevStrength[r.key]-0.001);
    prevStrength[r.key]=r.strength;
    const meta = r.inactiveLoops===0 ? `count ${r.count} · 방금`
      : `count ${r.count} · ${r.inactiveLoops}별이일 전${decaying?' · 옅어지는 중':''}`;
    return `<div class="trow">
      <span class="tk"><span class="em">${def.emoji}</span>${def.ko} <span style="color:var(--dim)">${actKo(r.drive)}</span></span>

      <span class="tb">+${r.bias.toFixed(3)}</span>
      <span class="tmeta">${meta}</span>
    </div>`;
  }).join('');
}

let paused=false,lastT=0,acc=0,speedMul=1,stepTimer=0.42;
function update(dt){
  sky.tick(dt);            // 시간·날씨는 별이가 뭘 하든 흐른다
  ppae.tick(dt);           // 빼콩이도 항상 제멋대로 돌아다닌다
  if(flash.on) flash.timer-=dt, flash.timer<=0 && (flash.on=false);
  if(byeoli.state==='acting'){
    byeoli.actTimer-=dt; brain.tick(dt,false);
    if(byeoli.actTimer<=0){ byeoli.state='walk'; byeoli.actAction=null; }
    return;
  }
  brain.tick(dt,true);
  walkClock+=dt;
  byeoli.worldX+=byeoli.speed*dt;
  byeoli.walkPhase+=dt*8;
  // 발소리: 실제 걸음 간격(약 0.42초마다 한 걸음). 배속 1일 때만.
  stepTimer-=dt;
  if(stepTimer<=0){ if(speedMul===1) Sound.step(); stepTimer=0.42; }
  if(byeoli.worldX>worldLen){
    byeoli.worldX=0; loopCount++;
    for(const p of props){ p.phase='unseen'; p.reactedThisPass=false; }
    seenKindsToday.clear();
    updateDayTag();
    pushMsg('day', `— ${formatByeoliDate()} · 동네 한 바퀴 —`, null);
  }
  updateEncounters(dt);
}
function updateDayTag(){ document.getElementById('daytag').textContent=formatByeoliDate(); }

/* =====================================================================
   BUILD 406 — State Provider (Brain ↔ Renderer 분리)
   ---------------------------------------------------------------------
   렌더러는 "누가 상태를 만드는지" 모른다. state 스냅샷만 그린다.
   - LocalStateProvider(sandbox): 내부에서 로컬 두뇌(update)를 돌려 state 생성
   - RemoteStateProvider(live)  : 나중에 /api/byeoli/state 구독 (지금은 stub)
   Authority가 나오면 provider만 교체하면 되고 render()는 안 바뀐다.
   ===================================================================== */

// 현재 세계를 하나의 완결 스냅샷으로 묶는다 (렌더러가 요구하는 모든 값 포함).
// renderer는 이 스냅샷 외의 전역을 절대 읽지 않는다 → 전역 fallback 금지.
// 방송에서 "모두 같은 순간"이 되려면 action 종류뿐 아니라 애니메이션 프레임까지 담아야 한다.
function snapshotByeoliState(){
  const camShift = byeoli.worldX - byeoli.screenX;
  return {
    byeoli: {
      worldX:byeoli.worldX, screenX:byeoli.screenX,
      state:byeoli.state,                 // walk | acting
      actAction:byeoli.actAction,         // observe/rest/record/wonder | null
      actTarget:byeoli.actTarget,         // 현재 행동 대상 id
      actTimer:byeoli.actTimer,           // 행동 남은 시간(종료 시각)
      speed:byeoli.speed,
      walkPhase:byeoli.walkPhase,         // 걷기 애니메이션 프레임
    },
    ppae: { x:ppae.x, y:ppae.y, facing:ppae.facing, phase:ppae.phase, mode:ppae.mode },
    sky: { t:sky.t, phase:sky.phase, weather:sky.weather, clouds:sky.clouds,
           cloudDark:sky.cloudDark, particles:sky.particles, flybys:sky.flybys },
    props,                                // 소품 배치·type·rare·phase·variant
    camera: { camShift, worldX:byeoli.worldX, screenX:byeoli.screenX, worldLen },
    flash: { on:flash.on, timer:flash.timer },  // 카메라 플래시
    speedMul,                             // 배속(연출 맥락)
    epoch: byeoliDayEpoch(),              // 별이력 시각
    updatedAt: Date.now(),
  };
}

const LocalStateProvider = {
  mode:'sandbox',
  step(dt){ update(dt); },                 // 로컬 두뇌로 세계를 진행 (전역 변이는 여기 내부에서만)
  getCurrentByeoliState(){ return snapshotByeoliState(); },
};

// live 모드용 — 지금은 인터페이스만. Authority(/api/byeoli/state) 나오면 채운다.
// ⚠ step()은 절대 update()/brain.decide()를 부르지 않는다. 오직 서버 상태 수신만.
const RemoteStateProvider = {
  mode:'live',
  _last:null,
  step(dt){ /* TODO(407): fetch/구독으로 this._last 갱신. 로컬 두뇌 실행 금지. */ },
  setState(s){ this._last = s; },          // (테스트/구독) 서버 스냅샷 주입
  getCurrentByeoliState(){ return this._last; },  // 전역 fallback 없음 — 받은 state만
};

// 현재 활성 provider (기본 sandbox). Authority 준비되면 여기만 바꾼다.
let stateProvider = LocalStateProvider;


/* =====================================================================
   RENDER (도트)
   ===================================================================== */
function px(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x|0,y|0,w|0,h|0); }
// 시간대별 하늘 팔레트 (위→아래 4밴드) + 지상 톤 배율
const SKY_COLORS={
  dawn:  { bands:['#e9c9a8','#e4c2b0','#dcc6c0','#d2cfc4'], sun:'#f3d19a', tone:0.86 },
  day:   { bands:['#cfe0d8','#d7e1cf','#dfe7d8','#e4ebdd'], sun:'#fbf3d0', tone:1.0 },
  dusk:  { bands:['#3f4a6a','#7a5f78','#c47a6a','#e0a06a'], sun:'#f0a45a', tone:0.72 },
  night: { bands:['#0e1526','#141d33','#1c2740','#26324d'], sun:'#e8ecff', tone:0.5 },
};
function drawBackground(sky, camera){
  const S=SKY_COLORS[sky.phase];
  const bandH=Math.ceil(GROUND_Y/S.bands.length);
  for(let i=0;i<S.bands.length;i++) px(0,i*bandH,W,bandH,S.bands[i]);
  const isNight=sky.phase==='night', isDusk=sky.phase==='dusk';

  // ---- 별 (밤/노을) ----
  if(isNight||isDusk){
    // 결정적 별 배치 (반짝임만 시간에)
    for(let i=0;i<40;i++){
      const sx=((i*79+13)%W), sy=(i*53+7)%(GROUND_Y-40);
      const tw=(Math.sin(sky.t*40+i)*0.5+0.5);
      if(tw>0.35){ ctx.fillStyle=isNight?`rgba(255,255,255,${0.4+tw*0.6})`:`rgba(255,240,220,${tw*0.4})`;
        ctx.fillRect(sx, sy, 1, 1); if(tw>0.8) ctx.fillRect(sx, sy, tw>0.9?2:1, 1); }
    }
  }
  // ---- 해 / 달 (t로 궤도) ----
  const arcX = 30 + sky.t*(W-60);
  const arcY = 44 - Math.sin(sky.t*Math.PI)*30;   // 낮에 높이
  if(sky.phase==='day'||sky.phase==='dawn'){
    // 해
    ctx.fillStyle=S.sun; disc(arcX, arcY, 7);
    ctx.fillStyle='rgba(251,243,208,.35)'; disc(arcX, arcY, 10);
  } else if(isNight){
    // 달 (초승 표현)
    const mx=W-40 - (sky.t-0.62)/0.38*(W-80), my=30+Math.sin((sky.t-0.62)/0.38*Math.PI)*-14+30;
    ctx.fillStyle='#e8ecff'; disc(mx, my, 6);
    ctx.fillStyle=S.bands[1]; disc(mx+2.5, my-1.5, 6); // 그믐 깎기
  }

  // ---- 구름 (흰/먹) ----
  for(const c of sky.clouds){
    const col = c.dark? (isNight?'#2a2f42':'#8a8f9a') : (isNight?'#3a4560':'#f2f0e8');
    cloud(c.x, c.y, c.w, col);
  }
  // ---- 하늘 이벤트: 비행기/새/헬기 (하늘에) ----
  if(sky.flybys) for(const f of sky.flybys){ if(f.kind!=='godzilla') drawFlyby(f, isNight); }

  const cam=camera.worldX;
  // 먼 언덕 (밤엔 어둡게)
  const hillCol = shade('#b7c6ad', S.tone);
  const o1=-(cam*0.15)%180; ctx.fillStyle=hillCol;
  for(let bx=o1-180;bx<W+180;bx+=180){ hill(bx+45,GROUND_Y,90,22); hill(bx+130,GROUND_Y,64,16); }
  // ---- 고질라 (지평선 뒤, 언덕과 나무 사이) ----
  if(sky.flybys) for(const f of sky.flybys){ if(f.kind==='godzilla') drawFlyby(f, isNight); }
  // 중간 나무/집
  const o2=-(cam*0.4)%150;
  for(let bx=o2-150;bx<W+150;bx+=150){ tree(bx+26,GROUND_Y-2,shade('#8ba286',S.tone)); house(bx+86,GROUND_Y-2); }
  // 땅
  px(0,GROUND_Y,W,H-GROUND_Y,shade('#3f5a45',S.tone)); px(0,GROUND_Y,W,2,shade('#4d6b52',S.tone));
  const o3=-(cam*1.0)%8; 
  for(let bx=o3;bx<W;bx+=8){ px(bx,GROUND_Y+7,2,2,shade('#365040',S.tone)); px(bx+4,GROUND_Y+14,2,2,shade('#2f4738',S.tone)); }
}
// 색을 tone배율로 어둡게 (밤 표현)
function shade(hex, tone){
  if(tone>=1) return hex;
  const r=parseInt(hex.slice(1,3),16)*tone|0, g=parseInt(hex.slice(3,5),16)*tone|0, b=parseInt(hex.slice(5,7),16)*tone|0;
  return `rgb(${r},${g},${b})`;
}
function disc(cx,cy,r){ for(let y=-r;y<=r;y++){ const w=Math.sqrt(r*r-y*y)|0; ctx.fillRect((cx-w)|0,(cy+y)|0,w*2,1); } }
function cloud(x,y,w,col){ ctx.fillStyle=col; const h=w*0.4;
  px(x,y,w,h,col); px(x+w*0.2,y-h*0.5,w*0.5,h*0.7,col); px(x+w*0.5,y-h*0.3,w*0.4,h*0.6,col); }

// 하늘 이벤트 도트 렌더 (state slice f만 읽음 — 전역 참조 없음)
function drawFlyby(f, isNight){
  const x=Math.round(f.x), y=Math.round(f.y), d=f.dir;
  if(f.kind==='bird'){
    // 갈매기 — 날갯짓 V자
    const up=Math.sin(f.phase)>0;
    ctx.fillStyle=isNight?'#2b3550':'#404a44';
    if(up){ px(x-2,y-1,2,1); px(x,y,1,1); px(x+1,y-1,2,1); }
    else  { px(x-2,y,2,1); px(x,y-1,1,1); px(x+1,y,2,1); }
  } else if(f.kind==='plane'){
    // 비행기 — 몸통 + 꼬리 + 비행운
    const body=isNight?'#8890a0':'#e8ebf0', wing=isNight?'#6a7284':'#c2c8d2';
    // 진행 반대쪽으로 비행운
    ctx.fillStyle='rgba(255,255,255,.5)';
    for(let i=1;i<=6;i++) ctx.fillRect(x - d*(f.w*0.5 + i*4), y+1, 2, 1);
    px(x-6,y,14,3,body);              // 몸통
    px(x + (d>0?8:-2), y-1, 2, 2, body);  // 기수
    px(x-1,y-3,4,3,wing);             // 수직날개
    px(x-3,y+1,7,2,wing);             // 주날개
  } else if(f.kind==='heli'){
    // 헬기 — 몸통 + 회전 로터(깜빡)
    const body=isNight?'#3a4250':'#5a6472';
    px(x-5,y,10,4,body);              // 몸통
    px(x + (d>0?-7:5), y+1, 2, 2, body);  // 꼬리쪽
    px(x + (d>0?4:-6), y-1, 3, 2, body);  // 앞
    // 꼬리붐
    px(x - d*9, y+1, d>0?5:5, 1, body);
    // 로터 (빠른 회전 = 가로선 깜빡)
    ctx.fillStyle=isNight?'#6a7280':'#8a94a2';
    const spin=Math.floor(f.phase)%2;
    if(spin) ctx.fillRect(x-8,y-2,16,1); else ctx.fillRect(x-4,y-2,8,1);
    ctx.fillRect(x-1,y-2,2,2);        // 로터축
  } else if(f.kind==='godzilla'){
    // 고질라 — 지평선 뒤로 큼직한 실루엣, 쿵쿵 걸음
    const bob=Math.round(Math.sin(f.stompT*3)*1.5);
    const gy=y-28-bob;                // 등 높이
    ctx.fillStyle=isNight?'#1a2422':'#2b3a33';  // 어두운 실루엣
    // 몸통
    px(x-7, gy+6, 14, 20);
    // 목/머리 (진행방향)
    const hx = d>0 ? x+5 : x-11;
    px(hx, gy-2, 7, 9);              // 머리
    px(x + (d>0?2:-4), gy+2, 4, 8);  // 목
    // 등 지느러미 (톱니)
    for(let i=0;i<4;i++) px(x-5+i*3, gy+2+ (i%2), 2, 3);
    // 꼬리 (반대쪽)
    px(x - d*10, gy+16, 8, 4);
    px(x - d*15, gy+18, 6, 3);
    // 다리
    px(x-5, gy+24, 4, 6+bob); px(x+2, gy+24, 4, 6-bob);
    // 눈 (빨강, 밤엔 더 또렷)
    ctx.fillStyle=isNight?'#ff5a4a':'#d84438';
    px(hx + (d>0?4:1), gy+1, 1, 1);
  }
}

// 강수 파티클 렌더
function drawWeather(sky){
  for(const p of sky.particles){
    if(p.kind==='rain'){
      ctx.fillStyle=`rgba(160,190,210,${0.5*p.life})`;
      ctx.fillRect(p.x|0, p.y|0, 1, p.bounce?1:3);
    } else {
      ctx.fillStyle=`rgba(245,248,255,${0.85*p.life})`;
      ctx.fillRect(p.x|0, p.y|0, 2, 2);
    }
  }
}
function hill(cx,by,w,h){ for(let i=0;i<h;i++){const ww=w*(i/h); ctx.fillRect((cx-ww/2)|0,(by-h+i)|0,ww|0,1);} }
function tree(x,by,c){ px(x-1,by-11,2,11,'#5c4a38'); ctx.fillStyle=c; px(x-6,by-20,13,8,c); px(x-4,by-25,9,6,c); }
function house(x,by){ px(x-10,by-14,20,14,'#c9b79c'); px(x-10,by-14,20,2,'#a58e70');
  ctx.fillStyle='#7d5a44'; for(let i=0;i<7;i++) ctx.fillRect((x-12+i)|0,(by-14-7+i)|0,(24-i*2)|0,1);
  px(x-2,by-7,5,7,'#6f5540'); }

// 오브젝트를 이모지 대신 간단 도트로 (타입별 대표 형태)
function drawProp(p,sx){
  const y=GROUND_Y;
  const def=p.rare?RARE[p.type]:CATALOG[p.type];
  const t=p.type;
  ctx.fillStyle='#2b3a30';
  // 카테고리별 러프 도트 (진짜 아트는 나중에 교체)
  if(t==='flower'||t==='flowerbed'||t==='dandelion'){
    px(sx,y-7,1,7,'#4f6b4f');
    const c = t==='dandelion'?'#e7e2c8':'#e0748a';
    px(sx-2,y-10,5,3,c); px(sx-1,y-12,3,2, t==='dandelion'?'#f2eeda':'#ed97a6');
    if(t==='flowerbed'){ px(sx-6,y-8,3,3,'#d98aa0'); px(sx+4,y-9,3,3,'#e6b36a'); }
  } else if(t==='sapling'||t==='oldtree'){
    const big=t==='oldtree';
    px(sx-1,y-(big?16:9),2,(big?16:9),'#5c4a38');
    ctx.fillStyle='#7e9a7c';
    if(big){ px(sx-9,y-28,20,13,'#7e9a7c'); px(sx-6,y-34,14,8,'#8ba286'); }
    else { px(sx-5,y-15,10,7,'#8ba286'); }
  } else if(t==='leaves'){ px(sx-6,y-3,12,3,'#b5843f'); px(sx-3,y-5,7,2,'#c99a52'); }

  else if(t==='umbrella'){ px(sx-1,y-16,2,16,'#5a6a66'); px(sx-7,y-18,14,3,'#4a7ac9'); px(sx-5,y-20,10,2,'#5a8ad9'); px(sx-1,y-2,3,2,'#5a6a66'); }
  else if(t==='raincoat'){ px(sx-5,y-14,10,3,'#d9c04a'); px(sx-6,y-11,12,11,'#e6cd5a'); px(sx-6,y-14,3,3,'#d9c04a'); px(sx+3,y-14,3,3,'#d9c04a'); }
  else if(t==='thermos'){ px(sx-3,y-14,6,14,'#4a7a76'); px(sx-3,y-14,6,3,'#5a8a86'); px(sx-3,y-4,6,1,'#3a6a66'); }
  else if(t==='radio'){ px(sx-6,y-9,12,9,'#8a7f6a'); px(sx-4,y-7,5,5,'#5c5448'); px(sx+2,y-7,3,1,'#c9c0a6'); px(sx+2,y-5,3,1,'#c9c0a6'); px(sx+4,y-13,1,4,'#6a5f4a'); }
  else if(t==='stool'){ px(sx-5,y-6,10,3,'#c98a4a'); px(sx-4,y-3,2,3,'#a56a3a'); px(sx+3,y-3,2,3,'#a56a3a'); }
  else if(t==='doormat'){ px(sx-8,y-2,16,3,'#9a7f5a'); px(sx-8,y-2,16,1,'#a58f6a'); ctx.fillStyle='#7a6244'; for(let i=-8;i<8;i+=3)px(sx+i,y-1,1,2,'#7a6244'); }
  else { px(sx-3,y-6,6,6,'#8a8f88'); } // fallback

  // 단계 오라(개발 표시)
  if(p.phase==='interested') aura(sx,y-30,'#A7B49A');
  else if(p.phase==='encountered') aura(sx,y-30,'#d98a4a');
}
function aura(x,y,c){ ctx.fillStyle=c; px(x-1,y,3,1,c); px(x,y-1,1,3,c); }

function drawByeoli(byeoli){
  const x=byeoli.screenX, y=GROUND_Y, acting=byeoli.state==='acting';
  const bob=acting?0:Math.round(Math.sin(byeoli.walkPhase));
  const legF=Math.floor(byeoli.walkPhase)%2, yy=y+bob;
  ctx.fillStyle='rgba(20,30,24,.25)'; ctx.fillRect(x-6,y-1,14,2);
  const cloth='#5b6f57',cloth2='#6f8469',skin='#e8c9a8',hair='#3a2c22',leg='#3f4a3a';
  if(!acting){ px(x-3,yy-7,3,7,leg); px(x+1,yy-7,3,7,leg);
    if(legF)px(x-4,yy-1,3,1,leg); else px(x+2,yy-1,3,1,leg); }
  else { px(x-3,yy-6,3,6,leg); px(x+1,yy-6,3,6,leg); }
  px(x-5,yy-18,11,12,cloth); px(x-5,yy-18,11,2,cloth2);
  if(acting&&byeoli.actAction==='record'){
    // 카메라를 두 손으로 얼굴 앞에 들기
    px(x+3,yy-20,7,5,'#2b2b2b');          // 카메라 몸체
    px(x+9,yy-19,2,3,'#4a4a4a');          // 렌즈
    px(x+4,yy-21,3,2,'#555');             // 상단
    px(x-3,yy-17,4,3,cloth); px(x+3,yy-17,4,3,cloth); // 양팔
  }
  else if(acting&&byeoli.actAction==='wonder'){ px(x+5,yy-21,3,6,cloth); px(x+7,yy-24,2,2,'#f4d06a'); }
  else if(acting&&byeoli.actAction==='rest'){ px(x-5,yy-13,11,7,cloth); }
  else { px(x-7,yy-17,3,7,cloth); px(x+5,yy-17,3,7,cloth); }
  px(x-4,yy-27,9,9,skin);
  px(x-5,yy-29,11,4,hair); px(x-5,yy-27,2,6,hair); px(x+4,yy-27,2,6,hair);
  px(x+1,yy-24,2,2,'#2b2b2b');
  if(acting){ const ic={observe:'#A7B49A',rest:'#8fa9d9',record:'#d98a4a',wonder:'#f4d06a'}[byeoli.actAction];
    px(x-2,yy-36,7,5,'#f4f0e7'); ctx.fillStyle=ic; px(x,yy-34,3,2,ic); }
}
function render(state){
  drawBackground(state.sky, state.camera);
  const camShift=state.camera.camShift;
  for(const p of state.props){ const sx=p.x-camShift; if(sx>-30&&sx<W+30) drawProp(p,sx); }
  drawPpae(state.ppae);
  drawByeoli(state.byeoli);
  drawWeather(state.sky);
  drawFlash(state.flash);
}
// 빼콩이 — 흰 고양이 도트
function drawPpae(ppae){
  const x=Math.round(ppae.x), y=Math.round(ppae.y), f=ppae.facing;
  const bounce=ppae.mode==='dash'?Math.round(Math.sin(ppae.phase)*1.5):Math.round(Math.abs(Math.sin(ppae.phase))*1);
  const yy=y-bounce;
  // 그림자
  ctx.fillStyle='rgba(20,30,24,.2)'; ctx.fillRect(x-6,y-1,13,2);
  const c='#ecebe6', cs='#d6d4cc';   // 흰색 몸/그늘
  // 몸
  px(x-6,yy-6,12,6,c);
  // 머리 (진행방향)
  const hx = f>0 ? x+4 : x-10;
  px(hx,yy-9,7,6,c);
  px(hx+ (f>0?4:0),yy-11,2,3,c); px(hx+(f>0?0:4),yy-11,2,3,c); // 귀 두 개
  // 눈
  px(hx+(f>0?4:1),yy-7,1,1,'#8fbf6f');
  // 꼬리 (반대쪽, 위로 살랑)
  const tx = f>0 ? x-7 : x+6;
  const tphase=Math.sin(ppae.phase*0.7)*2;
  px(tx,yy-8-Math.abs(tphase),2,6,c);
  // 다리 (움직임)
  const legF=Math.floor(ppae.phase)%2;
  if(ppae.mode!=='idle'){
    px(x-4,yy,2,2,cs); px(x+3,yy,2,2,cs);
    if(legF) px(x-5,yy,2,1,cs); else px(x+4,yy,2,1,cs);
  } else { px(x-4,yy,2,2,cs); px(x+3,yy,2,2,cs); }
}


/* =====================================================================
   LOOP
   ===================================================================== */
const FPS=14, FRAME=1000/FPS;
function loop(t){
  if(!lastT)lastT=t; let dt=t-lastT; lastT=t;
  if(dt>200)dt=FRAME;
  if(!paused){
    acc+=dt;
    while(acc>=FRAME){ for(let s=0;s<speedMul;s++) stateProvider.step(FRAME/1000); acc-=FRAME; }
    // provider가 만든/받은 완결 스냅샷만 렌더로 넘긴다. 전역 주입 없음.
    const state = stateProvider.getCurrentByeoliState();
    if(state) render(state);
    renderDrives(); renderTaste();   // Observatory/sandbox UI — 캔버스 렌더 경로와 분리 (live: TODO authority telemetry)
  }
  requestAnimationFrame(loop);
}

/* ---- 캔버스 해상도: 폰 폭에 맞춰 게임 높이 결정 ---- */
function fitCanvas(){
  // 게임 영역은 화면의 약 42%만 차지 (나머지는 상태바+스트림)
  const appW=Math.min(520,window.innerWidth);
  const scale=appW/W;
  cv.style.height=(H*scale)+'px';
}
window.addEventListener('resize',fitCanvas);

function boot(){
  rng=makeRNG(SEED);
  brain.drive={observe:.30,rest:.22,record:.26,wonder:.34}; brain.fatigue=.05;
  byeoli.worldX=0; byeoli.state='walk'; byeoli.speed=byeoli.baseSpeed;
  walkClock=0; lastDiaryAt=-999; loopCount=0;
  habitEngine.reset();
  tally.memories=0; tally.diary=0; archive.length=0;
  seenKindsToday.clear(); currentTarget=null;
  streamEl.innerHTML='';
  buildWorld(); sky.reset(); ppae.reset(); Sound.stopWeather(); updateDayTag(); updateTally(); fitCanvas();
  pushMsg('day', `— ${formatByeoliDate()} · 산책 시작 —`, null);
}
document.getElementById('pauseBtn').onclick=e=>{ paused=!paused; e.target.textContent=paused?'▶':'⏸'; };
document.getElementById('speedBtn').onclick=e=>{ speedMul = speedMul===1?2:speedMul===2?4:1; e.target.textContent=speedMul+'×'; };
document.getElementById('soundBtn').onclick=e=>{
  Sound.on=!Sound.on;
  if(Sound.on){
    Sound.wake();                        // 켤 때만 제스처 안에서 3중 자물쇠 (iOS 필수)
    if(sky.weather==='rain') Sound.startWeather('rain');
  } else {
    Sound.sleep();                       // 끌 때: 무음 루프+날씨 루프 정지 → 확실히 조용
  }
  e.target.textContent=Sound.on?'🔊':'🔇';
};
// 첫 사용자 제스처에서 오디오 잠금 해제 (touchend/click/pointerup이 진짜 열쇠 + visibility 복구)
Sound.installGestureUnlock();
document.getElementById('reseedBtn').onclick=()=>{ SEED=(Math.random()*1e9)|0; boot(); };

/* =====================================================================
   탭 복귀 처리 (BUILD 405-E 연출)
   - 별이력·Habit 감쇠는 절대시간(Date.now)이라 탭 상태와 무관하게 이미 흘렀다.
   - 여기서는 '며칠 흘렀는지' 연출과 하늘/화면 재동기화만 한다.
   - ⚠ 백그라운드 동안의 행동·Memory는 소급 생성하지 않는다(시간만 흐르고 삶은 멈춰 있었다).
   ===================================================================== */
let awayEpoch=byeoliDayEpoch();       // 탭을 떠날 때의 별이력 일수
document.addEventListener('visibilitychange', ()=>{
  if(document.hidden){
    awayEpoch=byeoliDayEpoch();        // 떠나는 순간 기록
  } else {
    const now=byeoliDayEpoch();
    const daysPassed=now-awayEpoch;
    // rAF가 멈춰있던 시간을 dt로 잘못 소비하지 않도록 시계 리셋
    lastT=0; acc=0;
    // 하늘·날씨·날짜 즉시 재동기화 (절대시간 기준으로 다시 그림)
    sky.t=skyProgressNow();
    sky.phase = sky.t<0.15?'dawn' : sky.t<0.5?'day' : sky.t<0.62?'dusk' : 'night';
    updateDayTag();
    // 복귀 즉시 1프레임 다시 그림 (provider 스냅샷 기준)
    const state = stateProvider.getCurrentByeoliState();
    if(state) render(state);
    renderDrives(); renderTaste();
    // 복귀 연출: 별이력으로 며칠 흘렀으면 알려준다 (Memory는 안 만듦)
    if(daysPassed>=1){
      pushMsg('day', `— ${formatByeoliDate()} · 그새 ${daysPassed}일이 흘렀다 —`, null);
      if(daysPassed>=3) pushMsg('diary', `🌙 오랜만이다. 별이는 그동안 조용히 지냈다`, null);
    }
  }
});
boot();
requestAnimationFrame(loop);
</script>
